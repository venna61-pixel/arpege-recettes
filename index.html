    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>
          <meta charset="UTF-8" />
          <title>${escapeHtml(printTitle)}</title>
          <style>
            body { font-family: Inter, Arial, sans-serif; color: #111827; margin: 24px; }
            h1 { margin: 0 0 8px 0; color: #1A3A4A; }
            h2 { margin: 0 0 10px 0; color: #1A3A4A; font-size: 18px; }
            h3 { margin: 0 0 8px 0; color: #1A3A4A; font-size: 15px; }
            .meta { color: #4b5563; margin: 0 0 10px 0; }
            .subrecipe-block { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin: 0 0 16px 0; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
            table { width: 100%; border-collapse: collapse; margin-top: 6px; }
            th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 13px; text-align: left; }
            th { background: #f9fafb; font-weight: 600; }
            .procedure { background: #fffbeb; border-left: 4px solid #C8956C; padding: 10px; min-height: 60px; }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(adaptedRecipe.name)} (adaptée)</h1>
          <p class="meta"><strong>Couverts adaptés :</strong> ${escapeHtml((adaptedRecipe.covers || 0).toFixed(2))}</p>
          ${baseBlocks}
          <section class="subrecipe-block">
            <h2>Montage / finition</h2>
            <div class="procedure">${buildProcedureHtml(adaptedRecipe.procedure)}</div>
          </section>
        </body>
      </html>
    `;

    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) {
      alert("Impossible d'ouvrir l'impression PDF. Vérifiez les paramètres de votre navigateur.");
      iframe.remove();
      return;
    }

    iframeWindow.document.open();
    iframeWindow.document.write(content);
    iframeWindow.document.close();
    iframeWindow.document.title = printTitle;
    iframeWindow.focus();
    iframeWindow.print();
    setTimeout(() => iframe.remove(), 1000);
  };
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto slide-in relative">
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2 z-10">✕</button>
        <div className="p-6 border-b border-gray-200 pr-12"><h3 className="text-xl font-bold text-[#1A3A4A]">Adapter : {normalized.name}</h3><p className="text-sm text-gray-500 mt-1">La recette entière se recalculera proportionnellement.</p></div>
        <div className="p-6 space-y-6">
          <div className="bg-gray-50 rounded-xl p-4 border border-gray-200">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Type de pivot</label>
                <select value={pivotType} onChange={(e) => { const t = e.target.value; setPivotType(t); setPivotValue(String(t === "covers" ? normalized.covers || 1 : t === "globalQuantity" ? totalDirectQty || 1 : t === "budget" ? baseCost || 1 : ingredientPivotSource?.quantity || 1)); }} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                  <option value="covers">Nombre de couverts</option>
                  <option value="globalQuantity">Quantité globale</option>
                  <option value="budget">Budget cible</option>
                  <option value="ingredientQuantity">Quantité d'une ligne</option>
                </select>
              </div>
              {pivotType === "ingredientQuantity" && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Ligne pivot</label>
                  <select value={selectedIngredientIndex} onChange={(e) => { const idx = parseInt(e.target.value); setSelectedIngredientIndex(idx); const source = window.ArpegeRecipeScaling.getPivotSourceLine(normalized, idx); setPivotValue(String(source?.usageMode === "portion" ? source?.portionCount : source?.quantity || 1)); }} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                    {[...normalized.directIngredients, ...normalized.baseComponents].map((line, idx) => <option key={idx} value={idx}>{line.name} ({line.usageMode === "portion" ? `${line.portionCount} portions/couverts` : `${line.quantity} ${line.unit}`})</option>)}
                  </select>
                </div>
              )}
            </div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Valeur cible</label><input type="number" step="0.01" min="0.01" value={pivotValue} onChange={(e) => setPivotValue(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
          </div>
          <div className="bg-[#C8956C] bg-opacity-10 rounded-xl p-4 border border-[#C8956C] border-opacity-30">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
              <div className="flex justify-between"><span className="font-medium text-[#1A3A4A]">Coefficient :</span><span>{multiplier.toFixed(4)}</span></div>
              <div className="flex justify-between"><span className="font-medium text-[#1A3A4A]">Couverts recalculés :</span><span>{(normalized.covers * multiplier).toFixed(2)}</span></div>
              {isChef && <div className="flex justify-between"><span className="font-medium text-[#1A3A4A]">Coût recalculé :</span><span>{adaptedCost == null ? "N/A" : `${adaptedCost.toFixed(2)}€`}</span></div>}
            </div>
            <div className="mt-4 flex flex-wrap gap-2">
              <button onClick={handlePrintAdaptedSheet} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#2A4A5A]">Imprimer la fiche adaptée (PDF)</button>
              {normalized.recipeType !== "base" && (
                <button onClick={handlePrintAdaptedProductionSheet} className="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-800">Imprimer fiche complète adaptée</button>
              )}
            </div>
          </div>
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Lignes adaptées</h4>
            <div className="bg-gray-50 rounded-lg p-4 space-y-2 max-h-72 overflow-y-auto">
              {adaptedDirectIngredients.map((ing, idx) => <div key={`i-${idx}`} className="flex justify-between items-center py-3 border-b border-gray-200"><div><div className="font-medium text-[#1A3A4A]">{ing.name}</div><div className="text-xs text-gray-500">Base : {ing.quantity} {ing.unit}</div></div><div className="text-right text-gray-700 bg-white px-3 py-1 rounded-full text-sm border border-gray-200">{ing.adaptedQuantity.toFixed(2)} {ing.unit}</div></div>)}
              {adaptedBaseComponents.map((c, idx) => <div key={`c-${idx}`} className="flex justify-between items-center py-3 border-b border-gray-200"><div><div className="font-medium text-[#1A3A4A]">{c.name} <span className="text-xs text-gray-500">(recette de base)</span></div><div className="text-xs text-gray-500">Base : {c.usageMode === "portion" ? `${c.portionCount} portions/couverts` : `${c.quantity} ${c.unit}`}</div></div><div className="text-right text-gray-700 bg-white px-3 py-1 rounded-full text-sm border border-gray-200">{c.usageMode === "portion" ? `${Number((adaptedRecipe.baseComponents?.[idx]?.portionCount ?? c.adaptedPortionCount ?? c.portionCount) || 0).toFixed(2)} portions/couverts` : `${c.adaptedQuantity.toFixed(2)} ${c.unit}`}</div></div>)}
            </div>
          </div>
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Procédé / Préparation</h4>
            <div className="bg-amber-50 rounded-lg p-4 border-l-4 border-[#C8956C]">{normalized.procedure ? normalized.procedure.split("\n").map((step, idx) => <p key={idx} className="mb-2 last:mb-0">{step}</p>) : <p className="text-gray-500 italic">Aucun procédé renseigné</p>}</div>
          </div>
        </div>
      </div>
    </div>
  );
};

const RecipesManager = ({ ingredients, setIngredients, recipes, setRecipes, isChef, sectionType = "base" }) => {
  const normalizedRecipes = useMemo(() => recipes.map(normalizeRecipe), [recipes]);
  const procedureTextareaRef = React.useRef(null);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [categoryFilter, setCategoryFilter] = useState(null);
  const [detailRecipe, setDetailRecipe] = useState(null);
  const [adaptRecipe, setAdaptRecipe] = useState(null);
  const [showAddIngredientModal, setShowAddIngredientModal] = useState(false);
  const [editingDirectIndex, setEditingDirectIndex] = useState(null);
  const [editingBaseIndex, setEditingBaseIndex] = useState(null);
  const [directSnapshot, setDirectSnapshot] = useState(null);
  const [baseSnapshot, setBaseSnapshot] = useState(null);
  const parseLocalizedNumber = (rawValue, fallback = 1) => {
    const normalized = String(rawValue ?? "").trim().replace(",", ".");
    if (!normalized) return fallback;
    const parsed = parseFloat(normalized);
    return Number.isFinite(parsed) ? parsed : fallback;
  };

  const emptyForm = {
    recipeType: sectionType,
    categories: ["Entrée"],
    name: "",
    covers: 4,
    outputQuantity: 1,
    outputUnit: "Kg",
    directIngredients: [],
    baseComponents: [],
    procedure: "",
    wasteCoeff: 1.05,
  };

  const [formData, setFormData] = useState(emptyForm);
  const [currentIng, setCurrentIng] = useState({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
  const [currentBase, setCurrentBase] = useState({ baseRecipeId: "", quantity: "", unit: "Gramme", usageMode: "quantity", portionCount: "", searchText: "", categoryFilter: "Tous" });

  const filteredBaseRecipesForPicker = filterBaseRecipesForPicker({
    recipes: normalizedRecipes,
    searchText: currentBase.searchText,
    categoryFilter: currentBase.categoryFilter,
  });

  const filteredIngredientsForSearch = filterIngredientsForPicker({
    ingredients,
    searchText: currentIng.searchText,
  });
  const supplierSuggestions = useMemo(() => (
    Array.from(new Set(
      (ingredients || [])
        .map((ing) => String(ing?.supplier || "").trim())
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b, "fr"))
  ), [ingredients]);

  const hasCategorySelection = categoryFilter !== null;

  const filteredRecipes = hasCategorySelection
    ? filterRecipesForList({
      recipes: normalizedRecipes,
      searchTerm,
      sectionType,
      categoryFilter,
    })
    : [];
  const theoreticalYield = useMemo(
    () => computeTheoreticalYieldFromDirectIngredients({ directIngredients: formData.directIngredients || [] }),
    [formData.directIngredients]
  );
  const selectedBaseRecipeForUsage = useMemo(
    () => normalizedRecipes.find((r) => Number(r.id) === Number(currentBase.baseRecipeId) && r.recipeType === "base") || null,
    [normalizedRecipes, currentBase.baseRecipeId]
  );
  const baseYieldReferenceUnit = useMemo(() => {
    if (!selectedBaseRecipeForUsage) return null;
    const effectiveYield = resolveEffectiveYield(selectedBaseRecipeForUsage);
    return effectiveYield?.unit || selectedBaseRecipeForUsage.outputUnit || null;
  }, [selectedBaseRecipeForUsage]);
  const baseYieldGroup = baseYieldReferenceUnit ? getUnitGroup(baseYieldReferenceUnit) : "unknown";
  const compatibleBaseUnits = useMemo(() => {
    if (baseYieldGroup === "mass") return BASE_QUANTITY_UNITS_MASS;
    if (baseYieldGroup === "volume") return BASE_QUANTITY_UNITS_VOLUME;
    return [...BASE_QUANTITY_UNITS_MASS, ...BASE_QUANTITY_UNITS_VOLUME];
  }, [baseYieldGroup]);
  const baseUnitOptions = Array.from(new Set([...compatibleBaseUnits, currentBase.unit].filter(Boolean)));
  const canAddBase = Boolean(
    currentBase.baseRecipeId &&
    (currentBase.usageMode === "portion" ? currentBase.portionCount : currentBase.quantity)
  );

  const resetForm = () => {
    setFormData({ ...emptyForm, recipeType: sectionType });
    setEditingId(null);
    setShowForm(false);
    setEditingDirectIndex(null);
    setEditingBaseIndex(null);
    setDirectSnapshot(null);
    setBaseSnapshot(null);
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
    setCurrentBase({ baseRecipeId: "", quantity: "", unit: "Gramme", usageMode: "quantity", portionCount: "", searchText: "", categoryFilter: "Tous" });
  };

  const toggleRecipeCategory = (category) => {
    const alreadySelected = formData.categories.includes(category);
    const nextCategories = alreadySelected ? formData.categories.filter(c => c !== category) : [...formData.categories, category];
    setFormData({ ...formData, categories: nextCategories.length ? nextCategories : [category] });
  };

  const addIngredientToRecipe = (ingredientId = null) => {
    const finalIngredientId = ingredientId || currentIng.ingredientId;
    if (!finalIngredientId || !currentIng.quantity) return;
    const ing = ingredients.find(i => Number(i.id) === Number(finalIngredientId));
    if (!ing) return;
    const line = buildDirectIngredientLine({
      ingredient: ing,
      ingredientId: finalIngredientId,
      quantity: parseLocalizedNumber(currentIng.quantity, 1),
      unit: currentIng.unit,
      wasteCoeff: parseLocalizedNumber(currentIng.wasteCoeff, 1),
    });
    if (!line) return;
    setFormData({
      ...formData,
      directIngredients: [...formData.directIngredients, line]
    });
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
  };

  const addBaseComponentToRecipe = (baseRecipeId = null) => {
    const finalBaseRecipeId = baseRecipeId || currentBase.baseRecipeId;
    if (!finalBaseRecipeId) return;
    if (currentBase.usageMode === "portion" && !currentBase.portionCount) return;
    if (currentBase.usageMode !== "portion" && !currentBase.quantity) return;
    const baseRecipe = normalizedRecipes.find(r => Number(r.id) === Number(finalBaseRecipeId) && r.recipeType === "base");
    if (!baseRecipe) return;
    const line = buildBaseComponentLine({
      baseRecipe,
      baseRecipeId: finalBaseRecipeId,
      quantity: currentBase.usageMode === "portion" ? 0 : parseLocalizedNumber(currentBase.quantity, 1),
      unit: currentBase.unit,
      usageMode: currentBase.usageMode,
      portionCount: currentBase.usageMode === "portion" ? parseLocalizedNumber(currentBase.portionCount, 1) : undefined,
    });
    if (!line) return;
    setFormData({
      ...formData,
      baseComponents: [...formData.baseComponents, line]
    });
    setCurrentBase({ baseRecipeId: "", quantity: "", unit: "Gramme", usageMode: currentBase.usageMode, portionCount: "", searchText: "", categoryFilter: currentBase.categoryFilter });
  };

  const handleAddNewIngredient = (payload) => {
    const newIngredient = payload?.ingredient || payload;
    if (!newIngredient || newIngredient.id == null) return;
    const usage = payload?.recipeUsage || {};
    const normalizedQuantity = parseLocalizedNumber(usage.recipeQuantity, NaN);
    const normalizedWasteCoeff = parseLocalizedNumber(usage.recipeWasteCoeff, NaN);
    const resolvedQuantity = Number.isFinite(normalizedQuantity) && normalizedQuantity > 0 ? normalizedQuantity : parseLocalizedNumber(currentIng.quantity, 1);
    const resolvedWasteCoeff = Number.isFinite(normalizedWasteCoeff) && normalizedWasteCoeff > 0 ? normalizedWasteCoeff : parseLocalizedNumber(currentIng.wasteCoeff, 1);
    setIngredients([...ingredients, newIngredient]);
    const line = buildDirectIngredientLine({
      ingredient: newIngredient,
      ingredientId: newIngredient.id,
      quantity: resolvedQuantity,
      unit: usage.recipeUnit || newIngredient.unit || currentIng.unit || "Gramme",
      wasteCoeff: resolvedWasteCoeff,
    });
    if (!line) return;
    setFormData({
      ...formData,
      directIngredients: [...formData.directIngredients, line]
    });
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const normalizedFormData = {
      ...formData,
      covers: parseLocalizedNumber(formData.covers, 1),
      outputQuantity: parseLocalizedNumber(formData.outputQuantity, 1),
      wasteCoeff: parseLocalizedNumber(formData.wasteCoeff, 1),
      directIngredients: (formData.directIngredients || []).map((line) => ({
        ...line,
        quantity: parseLocalizedNumber(line?.quantity, 1),
        wasteCoeff: parseLocalizedNumber(line?.wasteCoeff, 1),
      })),
      baseComponents: (formData.baseComponents || []).map((line) => ({
        ...line,
        quantity: parseLocalizedNumber(line?.quantity, 0),
        portionCount: line?.usageMode === "portion" ? parseLocalizedNumber(line?.portionCount, 1) : line?.portionCount,
      })),
    };
    const validation = validateRecipeDraft(normalizedFormData);
    if (!validation.valid) {
      alert(validation.message);
      return;
    }
    const payload = buildRecipePayload(normalizedFormData, normalizeRecipe);
    setRecipes(upsertRecipe(recipes, payload, editingId));
    resetForm();
  };

  const updateDirectIngredientLine = (idx, patch) => {
    setFormData({
      ...formData,
      directIngredients: formData.directIngredients.map((line, i) => (i === idx ? { ...line, ...patch } : line)),
    });
  };

  const updateBaseComponentLine = (idx, patch) => {
    setFormData({
      ...formData,
      baseComponents: formData.baseComponents.map((line, i) => (i === idx ? { ...line, ...patch } : line)),
    });
  };
  const getInlineBaseComponentUnitOptions = (component) => {
    const linkedBaseRecipe = normalizedRecipes.find((r) => Number(r.id) === Number(component?.baseRecipeId) && r.recipeType === "base") || null;
    const effectiveYield = linkedBaseRecipe ? resolveEffectiveYield(linkedBaseRecipe) : null;
    const referenceUnit = effectiveYield?.unit || linkedBaseRecipe?.outputUnit || null;
    const group = referenceUnit ? getUnitGroup(referenceUnit) : "unknown";
    const compatibleUnits = group === "mass"
      ? BASE_QUANTITY_UNITS_MASS
      : group === "volume"
        ? BASE_QUANTITY_UNITS_VOLUME
        : [...BASE_QUANTITY_UNITS_MASS, ...BASE_QUANTITY_UNITS_VOLUME];
    return Array.from(new Set([...compatibleUnits, component?.unit].filter(Boolean)));
  };

  const handleEdit = (recipe) => {
    const normalized = normalizeRecipe(recipe);
    setFormData(normalized);
    setEditingId(normalized.id);
    setShowForm(true);
    setDetailRecipe(null);
    setEditingDirectIndex(null);
    setEditingBaseIndex(null);
    setDirectSnapshot(null);
    setBaseSnapshot(null);
  };

  const replaceProcedureSelection = ({ prefix = "", suffix = "", placeholder = "" }) => {
    const textarea = procedureTextareaRef.current;
    const currentValue = String(formData.procedure || "");
    const start = textarea ? textarea.selectionStart : currentValue.length;
    const end = textarea ? textarea.selectionEnd : currentValue.length;
    const selectedText = currentValue.slice(start, end);
    const fallbackText = selectedText || placeholder;
    const inserted = `${prefix}${fallbackText}${suffix}`;
    const nextValue = `${currentValue.slice(0, start)}${inserted}${currentValue.slice(end)}`;
    setFormData({ ...formData, procedure: nextValue });

    const nextCursorStart = start + prefix.length;
    const nextCursorEnd = nextCursorStart + fallbackText.length;
    window.setTimeout(() => {
      if (!procedureTextareaRef.current) return;
      procedureTextareaRef.current.focus();
      procedureTextareaRef.current.setSelectionRange(nextCursorStart, nextCursorEnd);
    }, 0);
  };

  const applyProcedureBulletList = () => {
    const textarea = procedureTextareaRef.current;
    const currentValue = String(formData.procedure || "");
    const start = textarea ? textarea.selectionStart : currentValue.length;
    const end = textarea ? textarea.selectionEnd : currentValue.length;
    const lineStart = currentValue.lastIndexOf("\n", Math.max(0, start - 1)) + 1;
    const lineEndIndex = currentValue.indexOf("\n", end);
    const blockEnd = lineEndIndex === -1 ? currentValue.length : lineEndIndex;
    const block = currentValue.slice(lineStart, blockEnd);
    const target = block || "Nouvel élément";
    const transformed = target.split("\n").map((line) => line.startsWith("- ") ? line : `- ${line}`).join("\n");
    const nextValue = `${currentValue.slice(0, lineStart)}${transformed}${currentValue.slice(blockEnd)}`;
    setFormData({ ...formData, procedure: nextValue });
    const selectionStart = lineStart;
    const selectionEnd = lineStart + transformed.length;
    window.setTimeout(() => {
      if (!procedureTextareaRef.current) return;
      procedureTextareaRef.current.focus();
      procedureTextareaRef.current.setSelectionRange(selectionStart, selectionEnd);
    }, 0);
  };

  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <AddIngredientModal isOpen={showAddIngredientModal} onClose={() => setShowAddIngredientModal(false)} onAdd={handleAddNewIngredient} suggestedName={currentIng.searchText} supplierSuggestions={supplierSuggestions} />
      <RecipeDetailModal recipe={detailRecipe} allRecipes={normalizedRecipes} ingredients={ingredients} isOpen={!!detailRecipe} onClose={() => setDetailRecipe(null)} isChef={isChef} />
      <AdaptModal recipe={adaptRecipe} recipes={normalizedRecipes} ingredients={ingredients} isOpen={!!adaptRecipe} onClose={() => setAdaptRecipe(null)} isChef={isChef} />

      <div className="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 mb-6">
        <div>
          <h2 className="text-2xl font-bold text-[#1A3A4A]">{sectionType === "base" ? "Recettes de base" : "Recettes finales"}</h2>
          <p className="text-sm text-gray-500 mt-1">{sectionType === "base" ? "Création et gestion des préparations techniques." : "Création et gestion des plats finaux assemblés."}</p>
        </div>
        {isChef && <button onClick={() => setShowForm(!showForm)} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg">{sectionType === "base" ? "+ Nouvelle recette de base" : "+ Nouvelle recette finale"}</button>}
      </div>

      {!showForm && (
        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-6 space-y-4">
          <input type="text" placeholder={`Rechercher ${sectionType === "base" ? "une recette de base" : "une recette finale"}...`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-3 rounded-lg border border-gray-300" />
          <div className="flex flex-wrap gap-2">
          {["Tous", ...SERVICE_CATEGORIES].map(cat => (
            <button key={cat} onClick={() => setCategoryFilter(cat)} className={`px-3 py-2 rounded-full text-sm ${categoryFilter === cat ? "bg-[#C8956C] text-white" : "bg-amber-50 text-[#7b5a42]"}`}>{cat}</button>
          ))}
          </div>
        </div>
      )}

      {showForm && (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-slate-100 space-y-6">
          <h3 className="text-lg font-semibold text-[#1A3A4A]">{editingId ? (sectionType === "base" ? "Modifier la recette de base" : "Modifier la recette finale") : (sectionType === "base" ? "Nouvelle recette de base" : "Nouvelle recette finale")}</h3>
          <p className="text-sm text-gray-500">{sectionType === "base" ? "Ce formulaire est dédié aux recettes de base." : "Ce formulaire est dédié aux recettes finales et permet d'ajouter des recettes de base."}</p>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Type</label>
              <select value={formData.recipeType} onChange={(e) => setFormData({ ...formData, recipeType: e.target.value, baseComponents: e.target.value === "base" ? [] : formData.baseComponents, outputUnit: e.target.value === "final" ? "Portion" : formData.outputUnit })} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                {RECIPE_TYPE_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
              </select>
            </div>
            <div className="md:col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Nom</label><input type="text" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
          </div>

          <div className={`grid grid-cols-1 ${formData.recipeType === "base" ? "md:grid-cols-2" : "md:grid-cols-1"} gap-4`}>
            {formData.recipeType === "base" && (
              <div className="bg-amber-50/40 border border-amber-100 rounded-lg p-4">
                <h4 className="text-sm font-semibold text-[#1A3A4A] mb-3">Rendement quantité</h4>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div><label className="block text-sm font-medium text-gray-700 mb-1">Rendement produit</label><input type="text" inputMode="decimal" value={formData.outputQuantity} onChange={(e) => setFormData({ ...formData, outputQuantity: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
                  <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité de rendement</label><select value={formData.outputUnit} onChange={(e) => setFormData({ ...formData, outputUnit: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300">{Array.from(new Set([...YIELD_UNITS, formData.outputUnit].filter(Boolean))).map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
                </div>
                <div className="mt-3 text-sm">
                  {theoreticalYield ? (
                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                      <span className="text-[#1A3A4A]">Rendement théorique calculé : {formatDecimal(theoreticalYield.quantity)} {theoreticalYield.unit}</span>
                      <button
                        type="button"
                        onClick={() => setFormData({ ...formData, outputQuantity: Number(theoreticalYield.quantity), outputUnit: theoreticalYield.unit })}
                        className="px-3 py-1.5 rounded-lg bg-[#1A3A4A] text-white text-xs font-medium hover:bg-[#16303d]"
                      >
                        Utiliser ce rendement
                      </button>
                    </div>
                  ) : (
                    <span className="text-gray-600">Rendement théorique non calculable automatiquement : unités incompatibles</span>
                  )}
                </div>
              </div>
            )}
            <div className="bg-slate-50 border border-slate-200 rounded-lg p-4">
              <h4 className="text-sm font-semibold text-[#1A3A4A] mb-3">Rendement portions/couverts</h4>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Couverts (1 couvert = 1 portion)</label><input type="text" inputMode="decimal" value={formData.covers} onChange={(e) => setFormData({ ...formData, covers: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">Sous-catégories d'affichage</label>
            <div className="flex flex-wrap gap-3">
              {SERVICE_CATEGORIES.map(cat => (
                <label key={cat} className={`px-3 py-2 rounded-lg border cursor-pointer ${formData.categories.includes(cat) ? "bg-[#C8956C] text-white border-[#C8956C]" : "bg-white text-gray-700 border-gray-300"}`}>
                  <input type="checkbox" className="hidden" checked={formData.categories.includes(cat)} onChange={() => toggleRecipeCategory(cat)} />
                  {cat}
                </label>
              ))}
            </div>
          </div>

          <div className="bg-gray-50 rounded-lg p-4 border border-gray-200">
            <h4 className="font-medium text-gray-700 mb-3">Ingrédients directs</h4>
            <div className="relative mb-3">
              <label className="block text-sm font-medium text-gray-700 mb-1">Rechercher un ingrédient</label>
              <input type="text" value={currentIng.searchText} onChange={(e) => setCurrentIng({ ...currentIng, searchText: e.target.value, ingredientId: "" })} placeholder="Tapez pour chercher..." className="w-full px-3 py-2 rounded-lg border border-gray-300" />
              {currentIng.searchText && !currentIng.ingredientId && (
                <div className="absolute z-10 w-full mt-1 bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">
                  {filteredIngredientsForSearch.length > 0 ? filteredIngredientsForSearch.map(ing => (
                    <button key={ing.id} type="button" onClick={() => setCurrentIng({ ...currentIng, ingredientId: ing.id, searchText: ing.name })} className="w-full text-left px-4 py-2 hover:bg-amber-50 flex justify-between"><span>{ing.name}</span><span className="text-sm text-gray-500">{Number.isFinite(Number(ing.price)) && Number(ing.price) > 0 ? `${formatDecimal(ing.price)}€/${ing.unit}` : `Prix inconnu/${ing.unit}`}</span></button>
                  )) : <div className="p-4 text-center"><p className="text-gray-500 text-sm mb-2">Aucun ingrédient trouvé</p><button type="button" onClick={() => setShowAddIngredientModal(true)} className="text-[#1A3A4A] font-medium text-sm">Créer "{currentIng.searchText}"</button></div>}
                </div>
              )}
            </div>
            <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Quantité</label><input type="text" inputMode="decimal" value={currentIng.quantity} onChange={(e) => setCurrentIng({ ...currentIng, quantity: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité recette</label><select value={currentIng.unit} onChange={(e) => setCurrentIng({ ...currentIng, unit: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300">{UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Coeff. perte</label><input type="text" inputMode="decimal" value={currentIng.wasteCoeff} onChange={(e) => setCurrentIng({ ...currentIng, wasteCoeff: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>

                    {currentBase.searchText && !currentBase.baseRecipeId && (

                              <div><label className="block text-xs text-gray-600 mb-1">Mode</label><select value={component.usageMode || "quantity"} onChange={(e) => updateBaseComponentLine(idx, { usageMode: e.target.value === "portion" ? "portion" : "quantity" })} className="w-full px-2 py-1 rounded border border-gray-300 bg-white"><option value="quantity">Quantité</option><option value="portion">Portions / couverts</option></select></div>
                              {(component.usageMode || "quantity") === "portion" ? (
                                <div><label className="block text-xs text-gray-600 mb-1">Portions / couverts</label><input type="number" step="any" value={component.portionCount ?? ""} onChange={(e) => updateBaseComponentLine(idx, { portionCount: parseFloat(e.target.value) || 0 })} className="w-full px-2 py-1 rounded border border-gray-300 bg-white" /></div>
                              ) : (
                                <>
                                  <div><label className="block text-xs text-gray-600 mb-1">Quantité</label><input type="number" step="any" value={component.quantity} onChange={(e) => updateBaseComponentLine(idx, { quantity: parseFloat(e.target.value) || 0 })} className="w-full px-2 py-1 rounded border border-gray-300 bg-white" /></div>
                                  <div><label className="block text-xs text-gray-600 mb-1">Unité</label><select value={component.unit} onChange={(e) => updateBaseComponentLine(idx, { unit: e.target.value })} className="w-full px-2 py-1 rounded border border-gray-300 bg-white">{getInlineBaseComponentUnitOptions(component).map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
                                </>
                              )}
                            </div>
                          </>
                        ) : (
                          <div className="flex items-center justify-between">
                            <div>
                              <div className="font-medium text-[#1A3A4A]">{component.name}</div>
                              <div className="text-xs text-gray-600">{(component.usageMode || "quantity") === "portion" ? `${component.portionCount || 0} portions/couverts` : `${component.quantity} ${component.unit}`}</div>
                            </div>
                            <div className="flex gap-2">
                              <button type="button" onClick={() => { setEditingBaseIndex(idx); setBaseSnapshot({ usageMode: component.usageMode || "quantity", quantity: component.quantity, unit: component.unit, portionCount: component.portionCount }); }} className="text-xs px-2 py-1 rounded bg-slate-700 text-white">Modifier</button>
                              <button type="button" onClick={() => setFormData({ ...formData, baseComponents: formData.baseComponents.filter((_, i) => i !== idx) })} className="text-xs px-2 py-1 rounded bg-red-100 text-red-700">Supprimer</button>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}

          <div className="bg-amber-50 rounded-lg p-4 border-l-4 border-[#C8956C]">
            <h4 className="font-medium text-gray-700 mb-3">Procédé / Préparation</h4>
            <div className="flex flex-wrap gap-2 mb-3">
              <button type="button" onClick={() => replaceProcedureSelection({ prefix: "**", suffix: "**", placeholder: "texte" })} className="px-3 py-1.5 rounded-lg border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50">Gras</button>
              <button type="button" onClick={() => replaceProcedureSelection({ prefix: "*", suffix: "*", placeholder: "texte" })} className="px-3 py-1.5 rounded-lg border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50">Italique</button>
              <button type="button" onClick={() => replaceProcedureSelection({ prefix: "__", suffix: "__", placeholder: "texte" })} className="px-3 py-1.5 rounded-lg border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50">Souligné</button>
              <button type="button" onClick={() => replaceProcedureSelection({ prefix: "[red]", suffix: "[/red]", placeholder: "texte" })} className="px-3 py-1.5 rounded-lg border border-gray-300 bg-white text-sm text-red-700 hover:bg-red-50">Rouge</button>
              <button type="button" onClick={applyProcedureBulletList} className="px-3 py-1.5 rounded-lg border border-gray-300 bg-white text-sm text-gray-700 hover:bg-gray-50">Puce</button>
            </div>
            <textarea ref={procedureTextareaRef} value={formData.procedure} onChange={(e) => setFormData({ ...formData, procedure: e.target.value })} placeholder="Décrivez les étapes de préparation..." className="w-full h-32 px-4 py-3 rounded-lg border border-gray-300 resize-none" />
          </div>
          <div className="flex items-center space-x-4"><label className="text-sm font-medium text-gray-700">Coeff. perte global :</label><input type="text" inputMode="decimal" value={formData.wasteCoeff} onChange={(e) => setFormData({ ...formData, wasteCoeff: e.target.value })} className="w-24 px-3 py-2 rounded-lg border border-gray-300" /></div>
          <div className="flex space-x-3"><button type="submit" className="bg-[#1A3A4A] text-white px-6 py-2 rounded-lg font-medium">{editingId ? "Mettre à jour" : "Créer la recette"}</button><button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg">Annuler</button></div>
        </form>
      )}

      {!showForm && !hasCategorySelection && (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 px-6 py-8 text-center text-gray-500">
          Sélectionnez une catégorie pour afficher les recettes.
        </div>
      )}

      {!showForm && hasCategorySelection && (
        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
          {filteredRecipes.map(recipe => {
          const totalCost = calculateRecipeTotalCost(recipe, normalizedRecipes, new Set(), ingredients);
          const costStatus = getCostStatus(recipe, normalizedRecipes, ingredients);
          return (
            <div key={recipe.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
              <div className="p-6">
                <div className="flex justify-between items-start mb-4 gap-2">
                  <div className="flex flex-wrap gap-2">
                    <span className={`px-3 py-1 rounded-full text-xs font-semibold ${recipe.recipeType === "base" ? "bg-slate-700 text-white" : "bg-[#1A3A4A] text-white"}`}>{recipe.recipeType === "base" ? "Base" : "Finale"}</span>
                    {recipe.categories.map(cat => <span key={cat} className="px-3 py-1 rounded-full text-xs font-semibold bg-[#C8956C] text-white">{cat}</span>)}
                  </div>
                  <span className="text-sm text-gray-500">{recipe.covers} couverts</span>
                </div>
                <h3 className="text-lg font-bold text-[#1A3A4A] mb-2 cursor-pointer hover:text-[#C8956C]" onClick={() => setDetailRecipe(recipe)}>{recipe.name}</h3>
                <div className="space-y-1 mb-4 text-sm text-gray-600">
                  <p>{recipe.directIngredients.length} ingrédient(s) direct(s)</p>
                  {recipe.recipeType === "final" && <p>{recipe.baseComponents.length} recette(s) de base liée(s)</p>}
                  <p>{recipe.recipeType === "base" ? `Rendement : ${recipe.outputQuantity} ${recipe.outputUnit} • ${recipe.covers} couverts` : `${recipe.covers} couverts`}</p>
                  {isChef && (costStatus.valid ? <p className="text-lg font-bold text-[#C8956C]">{Number(totalCost || 0).toFixed(2)}€ <span className="text-sm font-normal text-gray-500 ml-2">({recipe.covers > 0 ? (Number(totalCost || 0) / recipe.covers).toFixed(2) : "0.00"}€/couvert)</span></p> : <p className="text-sm text-red-600 font-medium">Coût indisponible</p>)}
                </div>
                <div className="flex space-x-2">
                  <button onClick={() => setDetailRecipe(recipe)} className="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium">Voir détail</button>
                  <button onClick={() => setAdaptRecipe(recipe)} className="flex-1 bg-[#C8956C] bg-opacity-10 text-[#C8956C] py-2 rounded-lg text-sm font-medium">Adapter</button>
                  {isChef && <><button onClick={() => handleEdit(recipe)} className="p-2 text-gray-600 bg-gray-50 rounded-lg">✎</button><button onClick={() => window.confirm("Supprimer cette recette ?") && setRecipes(recipes.filter(r => Number(r.id) !== Number(recipe.id)))} className="p-2 text-gray-600 bg-gray-50 rounded-lg">🗑</button></>}
                </div>
              </div>
            </div>
          );
          })}
        </div>
      )}
    </div>
  );
};


const ProducersView = ({ ingredients, setIngredients, suppliersRuntime, suppliers, setSuppliers, isChef }) => {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const emptySupplierForm = { name: "", phone: "", email: "", address: "", contact: "", notes: "" };
  const [formData, setFormData] = useState(emptySupplierForm);

  const runtimeSuppliers = suppliersRuntime?.canaryActive
    ? (suppliersRuntime.data || [])
    : Array.from(new Set((ingredients || []).map((ing) => (ing.supplier || "").trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b, "fr"));

  const normalizedSuppliers = useMemo(() => {
    const existing = Array.isArray(suppliers) ? suppliers : [];
    const mappedExisting = existing.map((s, idx) => {
      if (typeof s === "string") {
        return { id: `legacy-${idx}-${s}`, name: s.trim(), phone: "", email: "", address: "", contact: "", notes: "", source: "legacy_list" };
      }
      return {
        id: s.id ?? `supplier-${idx}`,
        name: String(s.name || s.nom || "").trim(),
        phone: String(s.phone || "").trim(),
        email: String(s.email || "").trim(),
        address: String(s.address || "").trim(),
        contact: String(s.contact || "").trim(),
        notes: String(s.notes || "").trim(),
        source: "managed",
      };
    }).filter((s) => s.name);

    const merged = new Map(mappedExisting.map((s) => [s.name.toLocaleLowerCase("fr"), s]));
    for (const runtimeName of runtimeSuppliers) {
      const trimmed = String(runtimeName || "").trim();
      if (!trimmed) continue;
      const key = trimmed.toLocaleLowerCase("fr");
      if (!merged.has(key)) {
        merged.set(key, { id: `runtime-${key}`, name: trimmed, phone: "", email: "", address: "", contact: "", notes: "", source: "runtime" });
      }
    }

    return Array.from(merged.values()).sort((a, b) => a.name.localeCompare(b.name, "fr"));
  }, [suppliers, runtimeSuppliers]);

  const resetForm = () => {
    setFormData(emptySupplierForm);
    setEditingId(null);
    setShowForm(false);
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const payload = {
      id: editingId || Date.now(),
      name: String(formData.name || "").trim(),
      phone: String(formData.phone || "").trim(),
      email: String(formData.email || "").trim(),
      address: String(formData.address || "").trim(),
      contact: String(formData.contact || "").trim(),
      notes: String(formData.notes || "").trim(),
    };
    if (!payload.name) return;

    const managedSuppliers = (Array.isArray(suppliers) ? suppliers : []).map((s, idx) => (
      typeof s === "string"
        ? { id: `legacy-${idx}-${s}`, name: s.trim(), phone: "", email: "", address: "", contact: "", notes: "" }
        : {
          id: s.id ?? `supplier-${idx}`,
          name: String(s.name || s.nom || "").trim(),
          phone: String(s.phone || "").trim(),
          email: String(s.email || "").trim(),
          address: String(s.address || "").trim(),
          contact: String(s.contact || "").trim(),
          notes: String(s.notes || "").trim(),
        }
    )).filter((s) => s.name);

    const hasExisting = managedSuppliers.some((s) => String(s.id) === String(editingId));
    const next = editingId
      ? (hasExisting
        ? managedSuppliers.map((s) => String(s.id) === String(editingId) ? payload : s)
        : [...managedSuppliers, payload])
      : [...managedSuppliers, payload];

    setSuppliers(next);
    resetForm();
  };

  const handleEdit = (supplier) => {
    if (!isChef) return;
    setEditingId(supplier.id);
    setFormData({
      name: supplier.name || "",
      phone: supplier.phone || "",
      email: supplier.email || "",
      address: supplier.address || "",
      contact: supplier.contact || "",
      notes: supplier.notes || "",
    });
    setShowForm(true);
  };

  const handleDelete = (supplier) => {
    if (!isChef) return;
    if (!window.confirm("Supprimer ce fournisseur ?")) return;
    const managedSuppliers = (Array.isArray(suppliers) ? suppliers : []).map((s, idx) => (
      typeof s === "string" ? { id: `legacy-${idx}-${s}`, name: s.trim() } : s
    ));
    setSuppliers(managedSuppliers.filter((s) => String(s.id) !== String(supplier.id)));
    setIngredients((ingredients || []).map((ing) => String(ing?.supplier || "").trim() === String(supplier?.name || "").trim() ? { ...ing, supplier: "" } : ing));
  };

  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <div className="flex justify-between items-center mb-6">
        <div>
          <h2 className="text-2xl font-bold text-[#1A3A4A]">Fournisseurs</h2>
          <p className="text-sm text-gray-500 mt-1">Gestion des fiches fournisseurs (compatibles avec les noms historiques des ingrédients).</p>
        </div>
        {isChef && <button onClick={() => setShowForm(!showForm)} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg">+ Nouveau fournisseur</button>}
      </div>

      {showForm && isChef && (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6 space-y-4">
          <h3 className="text-lg font-semibold text-[#1A3A4A]">{editingId ? "Modifier le fournisseur" : "Nouveau fournisseur"}</h3>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div><label className="block text-sm text-gray-700 mb-1">Nom du fournisseur *</label><input type="text" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
            <div><label className="block text-sm text-gray-700 mb-1">Téléphone</label><input type="text" value={formData.phone} onChange={(e) => setFormData({ ...formData, phone: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
            <div><label className="block text-sm text-gray-700 mb-1">Email</label><input type="email" value={formData.email} onChange={(e) => setFormData({ ...formData, email: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
            <div><label className="block text-sm text-gray-700 mb-1">Personne de contact</label><input type="text" value={formData.contact} onChange={(e) => setFormData({ ...formData, contact: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
            <div className="md:col-span-2"><label className="block text-sm text-gray-700 mb-1">Adresse</label><input type="text" value={formData.address} onChange={(e) => setFormData({ ...formData, address: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
            <div className="md:col-span-2"><label className="block text-sm text-gray-700 mb-1">Notes</label><textarea value={formData.notes} onChange={(e) => setFormData({ ...formData, notes: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300 h-24 resize-none" /></div>
          </div>
          <div className="flex gap-3"><button type="submit" className="bg-[#1A3A4A] text-white px-5 py-2 rounded-lg">{editingId ? "Mettre à jour" : "Créer"}</button><button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-5 py-2 rounded-lg">Annuler</button></div>
        </form>
      )}

      <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        {normalizedSuppliers.length === 0 ? (
          <div className="p-6 text-gray-500">Aucun fournisseur renseigné pour le moment.</div>
        ) : (
          <table className="w-full">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr>
                <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Téléphone</th>
                <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Email</th>
                <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Adresse</th>
                <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Contact</th>
                <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Notes</th>
                {isChef && <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-200">
              {normalizedSuppliers.map((supplier) => (
                <tr key={supplier.id} className="hover:bg-gray-50">
                  <td className="px-4 py-4 font-medium text-[#1A3A4A]">{supplier.name}</td>
                  <td className="px-4 py-4 text-gray-600">{supplier.phone || "—"}</td>
                  <td className="px-4 py-4 text-gray-600">{supplier.email || "—"}</td>
                  <td className="px-4 py-4 text-gray-600">{supplier.address || "—"}</td>
                  <td className="px-4 py-4 text-gray-600">{supplier.contact || "—"}</td>
                  <td className="px-4 py-4 text-gray-600">{supplier.notes || "—"}</td>
                  {isChef && <td className="px-4 py-4 text-sm"><button onClick={() => handleEdit(supplier)} className="text-[#1A3A4A] hover:text-[#C8956C] mr-3">Modifier</button><button onClick={() => handleDelete(supplier)} className="text-red-600 hover:text-red-800">Supprimer</button></td>}
                </tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
};

const CostsView = ({ recipes, ingredients }) => {
  const normalizedRecipes = recipes.map(normalizeRecipe);
  const enriched = normalizedRecipes.map(recipe => ({ ...recipe, totalCost: calculateRecipeTotalCost(recipe, normalizedRecipes, new Set(), ingredients), status: getCostStatus(recipe, normalizedRecipes, ingredients) }));
  const validRecipes = enriched.filter(r => r.status.valid && r.totalCost != null);
  const avgCostPerRecipe = validRecipes.length ? validRecipes.reduce((sum, r) => sum + Number(r.totalCost || 0), 0) / validRecipes.length : 0;
  const mostExpensive = validRecipes.length ? validRecipes.reduce((max, r) => Number(r.totalCost || 0) > Number(max.totalCost || 0) ? r : max, validRecipes[0]) : null;
  const cheapest = validRecipes.length ? validRecipes.reduce((min, r) => Number(r.totalCost || 0) < Number(min.totalCost || 0) ? r : min, validRecipes[0]) : null;
  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <h2 className="text-2xl font-bold text-[#1A3A4A] mb-6">Analyse des Coûts</h2>
      <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Coût moyen</h3><p className="text-3xl font-bold text-[#1A3A4A]">{avgCostPerRecipe.toFixed(2)}€</p></div>
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Plus chère</h3><p className="text-lg font-bold truncate text-[#1A3A4A]">{mostExpensive?.name || "-"}</p><p className="text-2xl font-bold text-red-600">{mostExpensive ? Number(mostExpensive.totalCost || 0).toFixed(2) : "0.00"}€</p></div>
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Moins chère</h3><p className="text-lg font-bold truncate text-[#1A3A4A]">{cheapest?.name || "-"}</p><p className="text-2xl font-bold text-green-600">{cheapest ? Number(cheapest.totalCost || 0).toFixed(2) : "0.00"}€</p></div>
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Ingrédients</h3><p className="text-3xl font-bold text-[#1A3A4A]">{ingredients.length}</p></div>
      </div>
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-gray-200"><h3 className="text-lg font-semibold text-[#1A3A4A]">Détail des coûts</h3></div>
        <table className="w-full">
          <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Recette</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sous-catégories</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût total</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût/couvert</th></tr></thead>
          <tbody className="divide-y divide-gray-200">{enriched.map(recipe => <tr key={recipe.id} className="hover:bg-gray-50"><td className="px-6 py-4 font-medium text-[#1A3A4A]">{recipe.name}</td><td className="px-6 py-4 text-gray-600">{recipe.recipeType === "base" ? "Base" : "Finale"}</td><td className="px-6 py-4 text-gray-600">{recipe.categories.join(", ")}</td><td className="px-6 py-4 font-bold text-[#C8956C]">{recipe.status.valid ? `${Number(recipe.totalCost || 0).toFixed(2)}€` : "N/A"}</td><td className="px-6 py-4 text-gray-600">{recipe.status.valid && recipe.covers > 0 ? `${(Number(recipe.totalCost || 0) / recipe.covers).toFixed(2)}€` : "N/A"}</td></tr>)}</tbody>
        </table>
      </div>
    </div>
  );
};

const App = () => {
  const [user, setUser] = useLocalStorage("arpege_user", null);
  const [ingredients, setIngredients] = useLocalStorage("arpege_ingredients", INITIAL_INGREDIENTS);
  const [recipes, setRecipes] = useLocalStorage("arpege_recipes", INITIAL_RECIPES);
  const [suppliers, setSuppliers] = useLocalStorage("arpege_suppliers", []);
  const [activeTab, setActiveTab] = useState("ingredients");

  useEffect(() => {
    if (!window.ArpegeLegacyMigration || !window.ArpegeMigrationReport || !window.ArpegeVersionedStorage || !window.ArpegeParallelRead) return;
    try {
      const result = window.ArpegeLegacyMigration.migrateLegacyData({ ingredients, recipes });
      const shadowReport = window.ArpegeMigrationReport.buildMigrationReport(result);
      window.ArpegeMigrationReport.printMigrationReport(shadowReport);
      const persistResult = window.ArpegeVersionedStorage.persistVersionedData({ migrationResult: result, storage: window.localStorage });
      const writeReport = window.ArpegeVersionedStorage.buildWriteReport({ migrationResult: result, persistResult });
      const v1Data = window.ArpegeParallelRead.readV1Data(window.localStorage);
      const crossCheckReport = window.ArpegeParallelRead.buildCrossCheckReport({ legacyData: { ingredients, recipes }, migrationResult: result, v1Data });
      const switchReadiness = window.ArpegeParallelRead.evaluateSwitchReadiness(crossCheckReport);
      const featureFlags = window.ArpegeParallelRead.getFeatureFlags(window.localStorage);
      window.__ARPEGE_SHADOW_MIGRATION__ = { result, shadowReport };
      window.__ARPEGE_V1_WRITE_REPORT__ = writeReport;
      window.__ARPEGE_V1_CROSS_CHECK_REPORT__ = crossCheckReport;
      window.__ARPEGE_V1_SWITCH_READINESS__ = switchReadiness;
      window.__ARPEGE_FEATURE_FLAGS__ = featureFlags;
    } catch (error) {
      console.error("[Shadow Migration] Échec de la migration en mémoire", error);
    }
  }, [ingredients, recipes]);

  if (!user) return <Login onLogin={setUser} />;
  const isChef = user.role === "chef";
  const suppliersRuntime = window.ArpegeRuntimeDataSource
    ? window.ArpegeRuntimeDataSource.resolveDataSourcesRuntime({
        legacyIngredients: ingredients,
        storage: window.localStorage,
        crossCheckReport: window.__ARPEGE_V1_CROSS_CHECK_REPORT__ || null,
        switchReadiness: window.__ARPEGE_V1_SWITCH_READINESS__ || { ready: false },
      }).suppliers
    : { source: "legacy", canaryActive: false, reason: "RUNTIME_DATA_SOURCE_UNAVAILABLE", data: [] };
  return (
    <div className="min-h-screen bg-gray-50">
      <Header user={user} onLogout={() => setUser(null)} activeTab={activeTab} setActiveTab={setActiveTab} />
      <main className="pb-12">
        {activeTab === "ingredients" && <IngredientsManager ingredients={ingredients} setIngredients={setIngredients} suppliers={suppliers} setSuppliers={setSuppliers} isChef={isChef} />}
        {activeTab === "baseRecipes" && <RecipesManager ingredients={ingredients} setIngredients={setIngredients} recipes={recipes} setRecipes={setRecipes} isChef={isChef} sectionType="base" />}
        {activeTab === "finalRecipes" && <RecipesManager ingredients={ingredients} setIngredients={setIngredients} recipes={recipes} setRecipes={setRecipes} isChef={isChef} sectionType="final" />}
        {activeTab === "producers" && <ProducersView ingredients={ingredients} setIngredients={setIngredients} suppliersRuntime={suppliersRuntime} suppliers={suppliers} setSuppliers={setSuppliers} isChef={isChef} />}
        {activeTab === "couts" && isChef && <CostsView recipes={recipes} ingredients={ingredients} />}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
