const formatDecimal = (value, maxDigits = 6) => {
  const n = Number(value);
  if (!Number.isFinite(n)) return "0";
  return n.toLocaleString("fr-FR", { minimumFractionDigits: 0, maximumFractionDigits: maxDigits, useGrouping: false });
};

};

const useLocalStorage = (key, initialValue) => {
  const [storedValue, setStoredValue] = useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item ? JSON.parse(item) : initialValue;
    } catch {
      return initialValue;
    }
  });

  const setValue = (value) => {
    try {
      const valueToStore = value instanceof Function ? value(storedValue) : value;
      setStoredValue(valueToStore);
      window.localStorage.setItem(key, JSON.stringify(valueToStore));
    } catch (error) {
      console.error(error);
    }
  };

  return [storedValue, setValue];
};

// Chiffrement SHA-256 via l'API Web Crypto du navigateur (pas de lib externe nécessaire).
// Le mot de passe n'est jamais stocké en clair — seulement son empreinte irréversible.
const hashPassword = async (password) => {
  const encoder = new TextEncoder();
  const data = encoder.encode("formula-arpege-2024:" + password);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map((b) => b.toString(16).padStart(2, "0")).join("");
};

const computeRecipeAllergeneSummary = (recipe, allIngredients, allRecipes = []) => {
  const allergenSet = new Set();
  const incompleteIngredients = [];

  const normName = s => (s || "").trim().toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "");
  const processLine = ({ ingredientId, name }, fromBaseRecipe = null) => {
    let ing = allIngredients.find(i => Number(i.id) === Number(ingredientId));
    if (!ing && name) {
      const target = normName(name);
      ing = allIngredients.find(i => normName(i.name) === target);
    }
    if (ing && Array.isArray(ing.allergenes)) {
      ing.allergenes.forEach(a => allergenSet.add(a));
    } else {
      detectAllergenes(name).forEach(a => allergenSet.add(a));
      if (!ing || ing.allergenes == null) {
        const entry = { ingredientId: ing ? Number(ing.id) : Number(ingredientId), name: (ing && ing.name) || name || "?" };
        if (fromBaseRecipe) entry.fromBaseRecipe = fromBaseRecipe;
        incompleteIngredients.push(entry);
      }
    }
  };

  (recipe.directIngredients || []).forEach(line => processLine(line, null));

  (recipe.baseComponents || []).forEach(({ baseRecipeId }) => {
    const base = allRecipes.find(r => Number(r.id) === Number(baseRecipeId));
    if (base) (base.directIngredients || []).forEach(line => processLine(line, base.name));
  });

  return { allergens: Array.from(allergenSet).sort(), hasIncomplete: incompleteIngredients.length > 0, incompleteIngredients };
};

const IngredientAllergenesModal = ({ ingredient, isOpen, onClose, onSave }) => {
  const [step, setStep] = useState("idle");
  const [allergenesSelected, setAllergenesSelected] = useState([]);
  useEffect(() => {
    if (isOpen && ingredient) {
      const detected = detectAllergenes(ingredient.name);
      if (detected.length > 0) { setAllergenesSelected(detected); setStep("auto"); }
      else { setAllergenesSelected([]); setStep("prompt"); }
    }
  }, [isOpen, ingredient]);
  useEffect(() => {
    const handleEsc = (e) => e.key === "Escape" && onClose();
    if (isOpen) { window.addEventListener("keydown", handleEsc); return () => window.removeEventListener("keydown", handleEsc); }
  }, [isOpen, onClose]);
  if (!isOpen || !ingredient) return null;
  const handleConfirm = (allergenes) => { onSave({ ...ingredient, allergenes }); onClose(); };
  const handleConfirmNone = () => { onSave({ ...ingredient, allergenes: [] }); onClose(); };
  const handleToggle = (a) => setAllergenesSelected(prev => prev.includes(a) ? prev.filter(x => x !== a) : [...prev, a]);
  return (
    <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md">
        <div className="p-6">
          <div className="flex justify-between items-center mb-4">
            <h3 className="text-lg font-semibold text-[#1A3A4A]">Allergènes — {ingredient.name}</h3>
            <button type="button" onClick={onClose} className="text-gray-400 hover:text-gray-600 text-xl font-bold">✕</button>
          </div>
          <AllergenesFormSection step={step} allergenesSelected={allergenesSelected} onStep={setStep} onToggle={handleToggle} onConfirm={handleConfirm} onConfirmNone={handleConfirmNone} />
        </div>
      </div>
    </div>
  );
};

// Formulaire de configuration initiale (nom, email, mots de passe)
// Le code de récupération est généré à la demande et envoyé par email — plus besoin de l'afficher ici.
const SetupScreen = ({ onComplete }) => {
  const [restaurantName, setRestaurantName] = useState("");
  const [chefEmail, setChefEmail] = useState("");
  const [chefPassword, setChefPassword] = useState("");
  const [chefPasswordConfirm, setChefPasswordConfirm] = useState("");
  const [employePassword, setEmployePassword] = useState("");
  const [employePasswordConfirm, setEmployePasswordConfirm] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);

  const handleSubmitForm = async (e) => {
    e.preventDefault();
    setError("");
    if (!restaurantName.trim()) { setError("Le nom du restaurant est obligatoire."); return; }
    if (!chefEmail.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(chefEmail.trim())) { setError("Veuillez entrer une adresse email valide pour le compte chef."); return; }
    if (chefPassword.length < 6) { setError("Le mot de passe Chef doit contenir au moins 6 caractères."); return; }
    if (chefPassword !== chefPasswordConfirm) { setError("Les deux mots de passe Chef ne correspondent pas."); return; }
    if (employePassword.length < 6) { setError("Le mot de passe Employé doit contenir au moins 6 caractères."); return; }
    if (employePassword !== employePasswordConfirm) { setError("Les deux mots de passe Employé ne correspondent pas."); return; }
    setLoading(true);
    try {
      const [chefHash, employeHash] = await Promise.all([
        hashPassword(chefPassword),
        hashPassword(employePassword),
      ]);
      const newConfig = { restaurantName: restaurantName.trim(), chefEmail: chefEmail.trim().toLowerCase(), chefPasswordHash: chefHash, employePasswordHash: employeHash };
      saveConfig(newConfig);
      onComplete(newConfig);
    } catch {
      setError("Une erreur est survenue. Réessayez.");
    } finally {
      setLoading(false);
    }
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-amber-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-lg fade-in border border-slate-100">
        <div className="text-center mb-8">
          <FormulaLogo className="mb-4" />
          <h2 className="text-xl font-bold text-[#1A3A4A]">Bienvenue ! Configurez votre espace</h2>
          <p className="text-sm text-gray-500 mt-2">Cette étape n'a lieu qu'une seule fois.</p>
        </div>
        <form onSubmit={handleSubmitForm} className="space-y-5">
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">Nom du restaurant *</label>
            <input type="text" value={restaurantName} onChange={(e) => setRestaurantName(e.target.value)}
              className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent"
              placeholder="Ex : Le Petit Bistro" autoFocus />
          </div>
          <div>
            <label className="block text-sm font-medium text-gray-700 mb-1">Email du chef *</label>
            <p className="text-xs text-gray-400 mb-2">Utilisé pour recevoir le code de récupération en cas d'oubli du mot de passe.</p>
            <input type="email" value={chefEmail} onChange={(e) => setChefEmail(e.target.value)}
              className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent"
              placeholder="chef@monrestaurant.fr" />
          </div>
          <div className="border-t border-gray-100 pt-4">
            <p className="text-sm font-semibold text-[#1A3A4A] mb-3">👨‍🍳 Compte Chef — accès complet</p>
            <div className="space-y-3">
              <input type="password" value={chefPassword} onChange={(e) => setChefPassword(e.target.value)}
                className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                placeholder="Mot de passe chef (min. 6 caractères)" />
              <input type="password" value={chefPasswordConfirm} onChange={(e) => setChefPasswordConfirm(e.target.value)}
                className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                placeholder="Confirmer le mot de passe chef" />
            </div>
          </div>
          <div>
            <p className="text-sm font-semibold text-[#1A3A4A] mb-3">👤 Compte Employé — accès limité</p>
            <div className="space-y-3">
              <input type="password" value={employePassword} onChange={(e) => setEmployePassword(e.target.value)}

                placeholder="Mot de passe employé (min. 6 caractères)" />
              <input type="password" value={employePasswordConfirm} onChange={(e) => setEmployePasswordConfirm(e.target.value)}
                className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"

            </div>
          </div>
          {error && <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">{error}</div>}
          <button type="submit" disabled={loading}
            className="w-full bg-gradient-to-r from-[#1A3A4A] to-[#2A4A5A] text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all disabled:opacity-50">
            {loading ? "Création en cours…" : "Créer mon espace →"}
          </button>
        </form>
      </div>
    </div>
  );
};

// ─── Écran de connexion ───────────────────────────────────────────────────────
const Login = ({ onLogin, restaurantName }) => {
  const [mode, setMode] = useState("login"); // "login" | "forgot-code" | "forgot-reset"
  const [role, setRole] = useState("chef");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [loading, setLoading] = useState(false);
  // Flux "mot de passe oublié"
  const [recoveryInput, setRecoveryInput] = useState("");
  const [newPassword, setNewPassword] = useState("");
  const [newPasswordConfirm, setNewPasswordConfirm] = useState("");
  const [resetSuccess, setResetSuccess] = useState(false);
  const [emailSent, setEmailSent] = useState(false);
  const [maskedEmail, setMaskedEmail] = useState("");

  const handleLogin = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      const config = getConfig();
      if (!config) { setError("Configuration introuvable. Rechargez la page."); return; }
      const hash = await hashPassword(password);
      if (role === "chef" && hash === config.chefPasswordHash) onLogin({ role: "chef", name: "Chef" });
      else if (role === "employe" && hash === config.employePasswordHash) onLogin({ role: "employe", name: "Employé" });
      else setError("Mot de passe incorrect.");
    } catch { setError("Erreur lors de la connexion. Réessayez."); }
    finally { setLoading(false); }
  };

  const handleForgotPassword = async () => {
    setError(""); setEmailSent(false); setRecoveryInput(""); setLoading(true);
    setMode("forgot-code");
    try {
      const config = getConfig();
      if (!config?.chefEmail) { setError("Aucun email n'est enregistré pour ce compte. Contactez votre administrateur."); return; }
      // Générer un nouveau code et le sauvegarder haché
      const code = generateRecoveryCode();
      const hash = await hashPassword(normalizeRecoveryCode(code));
      saveConfig({ ...config, recoveryCodeHash: hash });
      // Envoyer l'email via EmailJS
      await emailjs.send("service_ahhkkys", "template_ozfybad", {
        recovery_code: code,
        to_email: config.chefEmail,
      }, "iNShFqmc3XcxXBnyU");
      // Masquer partiellement l'email pour l'affichage
      const [local, domain] = config.chefEmail.split("@");
      setMaskedEmail(local.substring(0, 2) + "***@" + domain);
      setEmailSent(true);
    } catch { setError("Impossible d'envoyer l'email. Vérifiez votre connexion internet et réessayez."); }
    finally { setLoading(false); }
  };

  const handleVerifyRecoveryCode = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      const config = getConfig();
      if (!config?.recoveryCodeHash) { setError("Aucun code de secours configuré pour ce compte."); return; }
      const normalized = normalizeRecoveryCode(recoveryInput);
      if (!isValidRecoveryCodeFormat(normalized)) { setError("Format invalide. Le code ressemble à XXXX-XXXX-XXXX."); return; }
      const hash = await hashPassword(normalized);
      if (hash !== config.recoveryCodeHash) { setError("Code incorrect. Vérifiez l'email reçu."); return; }
      setMode("forgot-reset");
    } catch { setError("Erreur. Réessayez."); }
    finally { setLoading(false); }
  };

  const handleResetPassword = async (e) => {
    e.preventDefault();
    setError(""); setLoading(true);
    try {
      if (newPassword.length < 6) { setError("Le nouveau mot de passe doit contenir au moins 6 caractères."); return; }
      if (newPassword !== newPasswordConfirm) { setError("Les deux mots de passe ne correspondent pas."); return; }
      const newHash = await hashPassword(newPassword);
      const config = getConfig();
      const { recoveryCodeHash: _used, ...configWithoutCode } = config;
      saveConfig({ ...configWithoutCode, chefPasswordHash: newHash });
      setResetSuccess(true);
      setTimeout(() => { setMode("login"); setResetSuccess(false); setNewPassword(""); setNewPasswordConfirm(""); }, 2500);
    } catch { setError("Erreur. Réessayez."); }
    finally { setLoading(false); }
  };

  const goBack = () => { setMode("login"); setError(""); setRecoveryInput(""); setNewPassword(""); setNewPasswordConfirm(""); setEmailSent(false); setMaskedEmail(""); };

  return (
    <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-amber-50 flex items-center justify-center p-4">
      <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in border border-slate-100">
        <div className="text-center mb-8">
          <FormulaLogo className="mb-4" />
          {restaurantName && <p className="text-lg font-semibold text-[#1A3A4A] mt-2">{restaurantName}</p>}
        </div>

        {/* Connexion normale */}
        {mode === "login" && (
          <form onSubmit={handleLogin} className="space-y-6">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">Rôle</label>
              <div className="flex gap-3">
                <button type="button" onClick={() => setRole("chef")}
                  className={`flex-1 py-3 rounded-lg font-medium transition-all ${role === "chef" ? "bg-[#1A3A4A] text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                  👨‍🍳 Chef
                </button>
                <button type="button" onClick={() => setRole("employe")}
                  className={`flex-1 py-3 rounded-lg font-medium transition-all ${role === "employe" ? "bg-[#1A3A4A] text-white" : "bg-gray-100 text-gray-600 hover:bg-gray-200"}`}>
                  👤 Employé
                </button>
              </div>
            </div>
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
              <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent"
                placeholder="••••••••" required autoFocus />
            </div>
            {error && <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">{error}</div>}
            <button type="submit" disabled={loading}
              className="w-full bg-gradient-to-r from-[#1A3A4A] to-[#2A4A5A] text-white py-3 rounded-lg font-semibold hover:shadow-lg transition-all disabled:opacity-50">
              {loading ? "Connexion…" : "Se connecter"}
            </button>
            <p className="text-center">
              <button type="button" onClick={handleForgotPassword}
                className="text-sm text-gray-400 hover:text-[#C8956C] transition-colors underline">
                Mot de passe chef oublié ?
              </button>
            </p>
          </form>
        )}

        {/* Réinitialisation par email */}
        {mode === "forgot-code" && (
          <div className="space-y-5">
            <div>
              <h3 className="text-base font-semibold text-[#1A3A4A] mb-1">Réinitialisation du mot de passe</h3>
            </div>

            {/* En cours d'envoi */}
            {loading && (
              <div className="text-center py-6 text-gray-500 text-sm">
                📨 Envoi de l'email en cours…
              </div>
            )}

            {/* Email envoyé avec succès */}
            {!loading && emailSent && (
              <>
                <div className="bg-green-50 border border-green-200 rounded-lg px-4 py-3 text-sm text-green-800">
                  ✉️ Un email avec votre code de récupération a été envoyé à <strong>{maskedEmail}</strong>.<br />
                  <span className="text-xs text-green-600 mt-1 block">Vérifiez aussi vos spams si vous ne le trouvez pas.</span>
                </div>
                <form onSubmit={handleVerifyRecoveryCode} className="space-y-3">
                  <label className="block text-sm text-gray-600">Saisissez le code reçu par email :</label>
                  <input type="text" value={recoveryInput} onChange={(e) => setRecoveryInput(e.target.value)}
                    className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] font-mono text-center tracking-widest text-lg uppercase"
                    placeholder="XXXX-XXXX-XXXX" autoFocus />
                  {error && <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">{error}</div>}
                  <button type="submit" disabled={loading}
                    className="w-full bg-[#1A3A4A] text-white py-3 rounded-lg font-semibold hover:bg-[#2A4A5A] transition-all disabled:opacity-50">
                    {loading ? "Vérification…" : "Vérifier le code"}
                  </button>
                </form>
                <p className="text-center text-xs text-gray-400">
                  Vous n'avez pas reçu l'email ?{" "}
                  <button type="button" onClick={handleForgotPassword} className="underline hover:text-gray-600">
                    Renvoyer
                  </button>
                </p>
              </>
            )}

            {/* Erreur d'envoi */}
            {!loading && !emailSent && error && (
              <>
                <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">{error}</div>
                <button type="button" onClick={handleForgotPassword}
                  className="w-full bg-[#1A3A4A] text-white py-3 rounded-lg font-semibold hover:bg-[#2A4A5A] transition-all">
                  Réessayer
                </button>
              </>
            )}

            <p className="text-center">
              <button type="button" onClick={goBack} className="text-sm text-gray-400 hover:text-gray-600 underline">
                ← Retour à la connexion
              </button>
            </p>
          </div>
        )}

        {/* Étape 2 : nouveau mot de passe */}
        {mode === "forgot-reset" && (
          <form onSubmit={handleResetPassword} className="space-y-5">
            <div>
              <h3 className="text-base font-semibold text-[#1A3A4A] mb-1">Nouveau mot de passe chef</h3>
              <p className="text-sm text-gray-500 mb-4">Code de secours validé ✓ Choisissez un nouveau mot de passe.</p>
              <div className="space-y-3">
                <input type="password" value={newPassword} onChange={(e) => setNewPassword(e.target.value)}
                  className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                  placeholder="Nouveau mot de passe (min. 6 caractères)" autoFocus />
                <input type="password" value={newPasswordConfirm} onChange={(e) => setNewPasswordConfirm(e.target.value)}
                  className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                  placeholder="Confirmer le nouveau mot de passe" />
              </div>
            </div>
            {error && <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">{error}</div>}
            {resetSuccess && <div className="bg-green-50 text-green-700 px-4 py-3 rounded-lg text-sm">✓ Mot de passe mis à jour. Redirection…</div>}
            <button type="submit" disabled={loading || resetSuccess}
              className="w-full bg-[#1A3A4A] text-white py-3 rounded-lg font-semibold hover:bg-[#2A4A5A] transition-all disabled:opacity-50">
              {loading ? "Mise à jour…" : "Enregistrer le nouveau mot de passe"}
            </button>
          </form>
        )}
      </div>
    </div>
  );
};

const IngredientsManager = ({ ingredients, setIngredients, suppliers, setSuppliers, isChef }) => {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [categoryFilter, setCategoryFilter] = useState(null);
  const [formData, setFormData] = useState({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "", allergenes: null });
  const [allergenesStep, setAllergenesStep] = useState("idle");
  const [allergenesSelected, setAllergenesSelected] = useState([]);

  const availableCategories = useMemo(() => {
    const categories = Array.from(new Set(
      ingredients
        .map((ing) => String(ing?.category || "").trim() || "Non classé")
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b, "fr"));
    return ["Tous", ...categories];
  }, [ingredients]);

  const ingredientSupplierSuggestions = useMemo(() => (
    Array.from(new Set(
      (ingredients || [])
        .map((ing) => String(ing?.supplier || "").trim())
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b, "fr"))
  ), [ingredients]);
  const filteredSupplierSuggestions = useMemo(() => {
    const query = String(formData.supplier || "").trim().toLocaleLowerCase("fr");
    if (!query) return [];
    return ingredientSupplierSuggestions.filter((supplierName) => {
      const normalizedSupplier = String(supplierName || "").trim();
      if (!normalizedSupplier) return false;
      if (normalizedSupplier.toLocaleLowerCase("fr") === query) return false;
      return normalizedSupplier.toLocaleLowerCase("fr").includes(query);
    });
  }, [ingredientSupplierSuggestions, formData.supplier]);


  const hasCategorySelection = categoryFilter !== null;

  const filteredIngredients = useMemo(() => {
    if (!hasCategorySelection) return [];
    const lowerSearch = searchTerm.toLowerCase();
    return ingredients
      .filter((ing) => {
        const normalizedCategory = String(ing?.category || "").trim() || "Non classé";
        const categoryMatch = categoryFilter === "Tous" || normalizedCategory === categoryFilter;
        const searchMatch = String(ing?.name || "").toLowerCase().includes(lowerSearch) || normalizedCategory.toLowerCase().includes(lowerSearch);
        return categoryMatch && searchMatch;
      })
      .sort((a, b) => String(a?.name || "").localeCompare(String(b?.name || ""), "fr"));
  }, [ingredients, hasCategorySelection, categoryFilter, searchTerm]);

  useEffect(() => {
    if (!showForm || allergenesStep === "done") return;
    const name = String(formData.name || "").trim();
    if (!name) { setAllergenesStep("idle"); return; }
    const detected = detectAllergenes(name);
    if (detected.length > 0) { setAllergenesStep("auto"); setAllergenesSelected(detected); }
    else setAllergenesStep("prompt");
  }, [formData.name, showForm]);

  const resetForm = () => {
    setFormData({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "", allergenes: null });
    setAllergenesStep("idle");
    setAllergenesSelected([]);
    setEditingId(null); setShowForm(false);
  };
  const startEdit = (ing) => {
    setFormData({ ...ing, allergenes: ing.allergenes !== undefined ? ing.allergenes : null });
    setEditingId(ing.id);
    setShowForm(true);
    if (ing.allergenes != null) { setAllergenesStep("done"); setAllergenesSelected(Array.isArray(ing.allergenes) ? ing.allergenes : []); }
    else { setAllergenesStep("idle"); setAllergenesSelected([]); }
  };
  const handleSubmit = (e) => {
    e.preventDefault();
    const normalizedSupplier = String(formData.supplier || "").trim();
    const allergenesValue = allergenesStep === "done" ? allergenesSelected : null;
    const normalized = { ...formData, supplier: normalizedSupplier, price: normalizeUnknownPrice(formData.price), allergenes: allergenesValue };
    if (editingId) setIngredients(ingredients.map(ing => ing.id === editingId ? { ...normalized, id: editingId } : ing));
    else setIngredients([...ingredients, { ...normalized, id: ingredients.reduce((max, i) => Math.max(max, Number(i.id) || 0), 0) + 1 }]);

    if (normalizedSupplier) {
      const existingSuppliers = (Array.isArray(suppliers) ? suppliers : []).map((s, idx) => (
        typeof s === "string"
          ? { id: `legacy-${idx}-${s}`, name: String(s || "").trim(), phone: "", email: "", address: "", contact: "", notes: "" }
          : {
            id: s.id ?? `supplier-${idx}`,
            name: String(s.name || s.nom || "").trim(),
            phone: String(s.phone || "").trim(),
            email: String(s.email || "").trim(),
            address: String(s.address || "").trim(),
            contact: String(s.contact || "").trim(),
            notes: String(s.notes || "").trim(),
          }
      )).filter((s) => s.name);

      const exists = existingSuppliers.some((s) => s.name.toLocaleLowerCase("fr") === normalizedSupplier.toLocaleLowerCase("fr"));
      if (!exists) {
        setSuppliers([
          ...existingSuppliers,
          { id: Date.now(), name: normalizedSupplier, phone: "", email: "", address: "", contact: "", notes: "" },
        ]);
      }
    }

    resetForm();
  };

  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <div className="flex justify-between items-center mb-6">
        <h2 className="text-2xl font-bold text-[#1A3A4A]">Gestion des Ingrédients</h2>
        {isChef && <button onClick={() => setShowForm(!showForm)} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg">+ Nouvel ingrédient</button>}
      </div>
      {!showForm && (
        <div className="mb-6"><input type="text" placeholder="Rechercher un ingrédient..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]" /></div>
      )}
      {!showForm && (
        <div className="mb-6 overflow-x-auto">
          <div className="flex gap-2 min-w-max">
            {availableCategories.map((category) => (
              <button
                key={category}
                type="button"
                onClick={() => setCategoryFilter(category)}
                className={`px-3 py-2 rounded-full text-sm transition-colors ${categoryFilter === category ? "bg-[#C8956C] text-white" : "bg-amber-50 text-[#7b5a42]"}`}
              >
                {category}
              </button>
            ))}
          </div>
        </div>
      )}
      {showForm && (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-slate-100">
          <h3 className="text-lg font-semibold mb-4 text-[#1A3A4A]">{editingId ? "Modifier" : "Nouvel ingrédient"}</h3>
          <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Catégorie</label><select value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300">{CATEGORIES_ING.map(cat => <option key={cat} value={cat}>{cat}</option>)}</select></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Nom</label><input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Prix (€)</label><input type="number" step="any" value={formData.price} onChange={(e) => setFormData({...formData, price: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité d'achat</label><select value={formData.unit} onChange={(e) => setFormData({...formData, unit: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300">{DISPLAY_UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
            <div className="relative"><label className="block text-sm font-medium text-gray-700 mb-1">Fournisseur</label><input type="text" value={formData.supplier} onChange={(e) => setFormData({...formData, supplier: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" placeholder="Choisir ou saisir un fournisseur" />{filteredSupplierSuggestions.length > 0 && (<div className="absolute z-10 w-full mt-1 bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">{filteredSupplierSuggestions.map((supplierName) => (<button key={supplierName} type="button" onClick={() => setFormData({ ...formData, supplier: supplierName })} className="w-full text-left px-4 py-2 hover:bg-amber-50">{supplierName}</button>))}</div>)}</div>
          </div>
          <AllergenesFormSection
            step={allergenesStep}
            allergenesSelected={allergenesSelected}
            onStep={setAllergenesStep}
            onToggle={(a) => setAllergenesSelected(prev => prev.includes(a) ? prev.filter(x => x !== a) : [...prev, a])}
            onConfirm={(selected) => { setAllergenesSelected(selected); setFormData(fd => ({ ...fd, allergenes: selected })); setAllergenesStep("done"); }}
            onConfirmNone={() => { setAllergenesSelected([]); setFormData(fd => ({ ...fd, allergenes: [] })); setAllergenesStep("done"); }}
          />
          <div className="mt-4 flex space-x-3"><button type="submit" className="bg-[#1A3A4A] text-white px-6 py-2 rounded-lg">{editingId ? "Mettre à jour" : "Ajouter"}</button><button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg">Annuler</button></div>
        </form>
      )}
      {!showForm && !hasCategorySelection && (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 px-6 py-8 text-center text-gray-500">
          Sélectionnez une catégorie pour afficher les ingrédients.
        </div>
      )}
      {!showForm && hasCategorySelection && (
        <div className="space-y-4">
          <div className="block sm:hidden space-y-3">
            {filteredIngredients.map(ing => {
              const normalizedCategory = String(ing?.category || "").trim() || "Non classé";
              return (
                <div key={ing.id} className="bg-white rounded-xl shadow-sm border border-gray-200 p-4">

const formatProcedureLine = (rawLine) => {
  let html = String(rawLine || "")
    .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;");
  html = html.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
  html = html.replace(/\*(.+?)\*/g, "<em>$1</em>");
  html = html.replace(/__(.+?)__/g, "<u>$1</u>");
  html = html.replace(/\[red\](.+?)\[\/red\]/g, '<span style="color:#dc2626">$1</span>');
  if (html.startsWith("- ")) html = "• " + html.slice(2);
  return html;
};

const migrateProcedureMarkdownToHtml = (text) => {
  if (!text) return "";
  if (/<[a-z][\s\S]*>/i.test(text)) return text;
  return text.split("\n").map(line => `<p>${formatProcedureLine(line) || "<br>"}</p>`).join("");
};

  }, [isOpen, onClose]);
  if (!isOpen || !recipe) return null;
  const normalized = normalizeRecipe(recipe);
  const costStatus = getCostStatus(normalized, allRecipes, ingredients);
  const totalCost = calculateRecipeTotalCost(normalized, allRecipes, new Set(), ingredients);

  const buildProcedureHtml = (procedure) => {
    if (!procedure) return "<p style='color:#6b7280;font-style:italic;'>Aucun procédé renseigné</p>";
    return migrateProcedureMarkdownToHtml(procedure);
  };

  const escapeHtml = (value) => String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
  const sanitizePrintTitle = (value, suffix) => {
    const invalidChars = ["/", "\\", ":", "*", "?", "\"", "<", ">", "|"];
    let cleanedName = String(value || "Recette");
    invalidChars.forEach((char) => {
      cleanedName = cleanedName.split(char).join(" ");
    });
    cleanedName = cleanedName.replace(/\s+/g, " ").trim();
    return `${cleanedName || "Recette"} - ${suffix}`;
  };

  const handlePrintPdf = () => {
    const printTitle = sanitizePrintTitle(normalized.name, "Fiche");
    const { allergens: pdfAllergens, hasIncomplete: pdfAllergenesIncomplete } = computeRecipeAllergeneSummary(normalized, ingredients, allRecipes);
    const allergenesSection = `
      <section>
        <h2>Allergènes</h2>
        ${pdfAllergens.length > 0
          ? `<p style="color:#991b1b;font-weight:600;">${escapeHtml(pdfAllergens.join(" · "))}</p>`
          : `<p style="color:#166534;font-weight:600;">Aucun allergène</p>`
        }
        ${pdfAllergenesIncomplete ? `<p style="color:#b45309;font-size:13px;font-style:italic;">⚠ La liste peut être incomplète</p>` : ""}
      </section>
    `;
    const directRows = normalized.directIngredients.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
      : normalized.directIngredients.map((ing) => {
          const ingredientCost = calculateIngredientCost(ing, ingredients);
          return `
            <tr>
              <td>${escapeHtml(ing.name)}</td>
              <td>${escapeHtml(ing.quantity)} ${escapeHtml(ing.unit)}</td>
              ${isChef ? `<td style="text-align:right;">${ingredientCost == null ? "N/A" : `${ingredientCost.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseRows = normalized.baseComponents.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucune recette de base liée</td></tr>`
      : normalized.baseComponents.map((component) => {
          const baseRecipe = normalizeRecipe(getRecipeById(allRecipes, component.baseRecipeId) || {});
          const baseCost = baseRecipe.id ? calculateRecipeTotalCost(baseRecipe, allRecipes, new Set(), ingredients) : null;
          const prorated = (baseCost != null && baseRecipe.id)
            ? computeBaseComponentCost({ component, baseRecipe, baseCost })
            : null;
          const usageLabel = component.usageMode === "portion"
            ? `${Number(component.portionCount || 0).toFixed(2)} portions/couverts`
            : `${escapeHtml(component.quantity)} ${escapeHtml(component.unit)}`;
          return `
            <tr>
              <td>${escapeHtml(component.name)}</td>
              <td>${usageLabel}</td>
              ${isChef ? `<td style="text-align:right;">${prorated == null ? "N/A" : `${prorated.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseSection = normalized.recipeType === "final" ? `
      <section>
        <h2>Recettes de base utilisées (${normalized.baseComponents.length})</h2>
        <table>
          <thead>
            <tr>
              <th>Recette de base</th>
              <th>Quantité utilisée</th>
              ${isChef ? "<th style='text-align:right;'>Coût proratisé</th>" : ""}
            </tr>
          </thead>
          <tbody>${baseRows}</tbody>
        </table>
      </section>
    ` : "";

    const costSection = isChef ? `
      <section>
        <h2>Synthèse des coûts</h2>
        ${
          !costStatus.valid
            ? `<p style="color:#991b1b;font-weight:600;">${escapeHtml(costStatus.message)}</p>`
            : `
              <p><strong>Coût total :</strong> ${Number(totalCost || 0).toFixed(2)}€</p>
              <p><strong>Coût par couvert :</strong> ${normalized.covers > 0 ? (Number(totalCost || 0) / normalized.covers).toFixed(2) : "0.00"}€</p>
            `
        }
      </section>
    ` : "";

    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>${escapeHtml(printTitle)}</title>
          <style>
            @page { size: A4 portrait; margin: 15mm; }
            * { box-sizing: border-box; }
            body { font-family: Inter, Arial, sans-serif; color: #111827; margin: 0; }
            h1 { margin: 0 0 8px 0; color: #1A3A4A; break-after: avoid; page-break-after: avoid; }
            h2 { margin: 18px 0 8px 0; color: #1A3A4A; font-size: 17px; break-after: avoid; page-break-after: avoid; }
            .meta { color: #4b5563; margin-bottom: 6px; }
            .badges { margin: 10px 0 14px 0; }
            .badge { display: inline-block; background: #f3f4f6; border-radius: 999px; padding: 4px 10px; margin-right: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 600; }
            section { break-inside: avoid; page-break-inside: avoid; margin-bottom: 12px; }
            table { width: 100%; border-collapse: collapse; margin-top: 8px; }
            th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 13px; }
            th { text-align: left; background: #f9fafb; font-weight: 600; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            .procedure { background: #fffbeb; border-left: 4px solid #C8956C; padding: 12px; }
            .procedure p { margin: 0 0 5px 0; }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(normalized.name)}</h1>
          <p class="meta"><strong>Type :</strong> ${normalized.recipeType === "base" ? "Recette de base" : "Recette finale"}</p>
          <p class="meta"><strong>Couverts :</strong> ${escapeHtml(normalized.covers)}${normalized.recipeType === "base" ? ` • <strong>Rendement :</strong> ${escapeHtml(normalized.outputQuantity)} ${escapeHtml(normalized.outputUnit)}` : ""}</p>
          <div class="badges">${normalized.categories.map(cat => `<span class="badge">${escapeHtml(cat)}</span>`).join("")}</div>

          <section>
            <h2>Ingrédients directs (${normalized.directIngredients.length})</h2>
            <table>
              <thead>
                <tr>
                  <th>Ingrédient</th>
                  <th>Quantité</th>
                  ${isChef ? "<th style='text-align:right;'>Coût</th>" : ""}

              </thead>
              <tbody>${directRows}</tbody>

          </section>

          ${baseSection}

          <section>
            <h2>Procédé / Préparation</h2>
            <div class="procedure">${buildProcedureHtml(normalized.procedure)}</div>
          </section>

          ${allergenesSection}

          ${costSection}
        </body>
      </html>
    `;

    const printFromWindow = (targetWindow) => {
      targetWindow.document.open();
      targetWindow.document.write(content);
      targetWindow.document.close();
      targetWindow.document.title = printTitle;
      targetWindow.focus();
      targetWindow.print();
    };

    // Trigger printing from a hidden iframe to avoid opening an extra tab/window.
    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) {
      alert("Impossible d'ouvrir l'impression PDF. Vérifiez les paramètres de votre navigateur.");
      iframe.remove();
      return;
    }

    iframeWindow.document.open();
    iframeWindow.document.write(content);
    iframeWindow.document.close();
    iframeWindow.document.title = printTitle;
    setTimeout(() => {
      iframeWindow.focus();
      iframeWindow.print();
      setTimeout(() => iframe.remove(), 1000);
    }, 300);
  };

  const handlePrintProductionSheet = () => {
    if (normalized.recipeType === "base") return;
    const printTitle = sanitizePrintTitle(normalized.name, "Fiche complète");

    const baseBlocks = normalized.baseComponents.length === 0
      ? `<p style="color:#6b7280;font-style:italic;">Aucune sous-recette liée.</p>`

          const baseRecipe = normalizeRecipe(baseRecipeRaw);
          const effectiveYield = resolveEffectiveYield(baseRecipe);
          const usageMode = component.usageMode || "quantity";

          let multiplier = null;
          let invalidReason = null;

          if (usageMode === "portion") {
            const portionCount = Number(component.portionCount || 0);
            const baseCovers = Number(baseRecipe.covers || 0);
            if (!Number.isFinite(portionCount) || portionCount <= 0 || !Number.isFinite(baseCovers) || baseCovers <= 0) {
              invalidReason = "portions non calculables";
            } else {
              multiplier = portionCount / baseCovers;
            }
          } else {
            const sourceQty = Number(component.quantity || 0);
            const sourceUnit = component.unit;
            const targetUnit = effectiveYield?.unit;
            const converted = effectiveYield ? convertQuantity(sourceQty, sourceUnit, targetUnit) : null;
            if (!effectiveYield || converted == null || Number(effectiveYield.quantity || 0) <= 0) {
              invalidReason = "quantité non calculable";
            } else {
              multiplier = converted / Number(effectiveYield.quantity);
            }
          }

          const ingredientsRows = (baseRecipe.directIngredients || []).length === 0
            ? `<tr><td colspan="2" style="padding:8px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
            : baseRecipe.directIngredients.map((ing) => {
                if (multiplier == null) {
                  return `
                    <tr>
                      <td>${escapeHtml(ing.name)}</td>
                      <td>quantité non calculable</td>
                    </tr>
                  `;
                }
                const adaptedQty = Number(ing.quantity || 0) * multiplier;
                const qtyLabel = Number.isFinite(adaptedQty) ? `${adaptedQty.toFixed(2)} ${escapeHtml(ing.unit)}` : "quantité non calculable";
                return `
                  <tr>
                    <td>${escapeHtml(ing.name)}</td>
                    <td>${qtyLabel}</td>
                  </tr>
                `;
              }).join("");

          const usageLabel = usageMode === "portion"
            ? `${Number(component.portionCount || 0).toFixed(2)} portions/couverts`
            : `${escapeHtml(component.quantity)} ${escapeHtml(component.unit)}`;

          return `
            <section class="subrecipe-block">
              <h2>${idx + 1}. ${escapeHtml(baseRecipe.name)}</h2>
              <p class="meta"><strong>Utilisation dans la recette finale :</strong> ${usageLabel}${invalidReason ? ` • <span style="color:#991b1b;">${invalidReason}</span>` : ""}</p>
              <div class="grid">
                <div>
                  <h3>Ingrédients adaptés</h3>
                  <table>
                    <thead>
                      <tr>
                        <th>Ingrédient</th>
                        <th>Quantité adaptée</th>
                      </tr>
                    </thead>
                    <tbody>${ingredientsRows}</tbody>
                  </table>
                </div>
                <div>
                  <h3>Procédé</h3>
                  <div class="procedure">${buildProcedureHtml(baseRecipe.procedure)}</div>
                </div>
              </div>
            </section>
          `;
        }).join("");

    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>
          <meta charset="UTF-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>${escapeHtml(printTitle)}</title>
          <style>
            @page { size: A4 portrait; margin: 15mm; }
            * { box-sizing: border-box; }
            body { font-family: Inter, Arial, sans-serif; color: #111827; margin: 0; }
            h1 { margin: 0 0 8px 0; color: #1A3A4A; break-after: avoid; page-break-after: avoid; }
            h2 { margin: 12px 0 8px 0; color: #1A3A4A; font-size: 17px; break-after: avoid; page-break-after: avoid; }
            h3 { margin: 0 0 8px 0; color: #1A3A4A; font-size: 14px; break-after: avoid; page-break-after: avoid; }
            .meta { color: #4b5563; margin: 0 0 10px 0; }
            .subrecipe-block { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin: 0 0 16px 0; break-inside: avoid; page-break-inside: avoid; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
            table { width: 100%; border-collapse: collapse; margin-top: 6px; }
            th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 13px; text-align: left; }
            th { background: #f9fafb; font-weight: 600; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            .procedure { background: #fffbeb; border-left: 4px solid #C8956C; padding: 10px; }
            .procedure p { margin: 0 0 5px 0; }
            @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(normalized.name)}</h1>
          <p class="meta"><strong>Couverts :</strong> ${escapeHtml(normalized.covers)}</p>
          ${baseBlocks}
          <section class="subrecipe-block">
            <h2>Montage / finition</h2>
            <div class="procedure">${buildProcedureHtml(normalized.procedure)}</div>
          </section>
        </body>
      </html>
    `;

    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) {
      alert("Impossible d'ouvrir l'impression PDF. Vérifiez les paramètres de votre navigateur.");
      iframe.remove();
      return;
    }

    iframeWindow.document.open();
    iframeWindow.document.write(content);
    iframeWindow.document.close();
    iframeWindow.document.title = printTitle;
    setTimeout(() => {
      iframeWindow.focus();
      iframeWindow.print();
      setTimeout(() => iframe.remove(), 1000);
    }, 300);
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto slide-in relative">
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2 z-10">✕</button>
        <div className="p-6 border-b border-gray-200 pr-12">
          <div className="flex flex-wrap gap-2 mb-3">
            <span className={`px-3 py-1 rounded-full text-xs font-semibold ${normalized.recipeType === "base" ? "bg-slate-700 text-white" : "bg-[#1A3A4A] text-white"}`}>{normalized.recipeType === "base" ? "Recette de base" : "Recette finale"}</span>
            {normalized.categories.map(cat => <span key={cat} className="px-3 py-1 rounded-full text-xs font-semibold bg-[#C8956C] text-white">{cat}</span>)}
          </div>
          <h3 className="text-2xl font-bold text-[#1A3A4A]">{normalized.name}</h3>
          <p className="text-sm text-gray-500 mt-1">{normalized.covers} couverts{normalized.recipeType === "base" ? ` • Rendement : ${normalized.outputQuantity} ${normalized.outputUnit}` : ""}</p>
          <div className="mt-4 flex flex-wrap gap-2">
            <button onClick={handlePrintPdf} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#2A4A5A]">Imprimer la fiche (PDF)</button>
            {normalized.recipeType !== "base" && (
              <button onClick={handlePrintProductionSheet} className="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-800">Imprimer fiche complète de production</button>
            )}
          </div>
        </div>
        <div className="p-6 space-y-6">
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Ingrédients directs ({normalized.directIngredients.length})</h4>
            <div className="bg-gray-50 rounded-lg p-4">
              {normalized.directIngredients.length === 0 ? <p className="text-sm text-gray-500 italic">Aucun ingrédient direct</p> : (
                <table className="w-full"><thead><tr className="text-left text-xs font-medium text-gray-500 uppercase border-b border-gray-200"><th className="pb-2">Ingrédient</th><th className="pb-2">Quantité</th>{isChef && <th className="pb-2 text-right">Coût</th>}</tr></thead><tbody>{normalized.directIngredients.map((ing, idx) => { const ingredientCost = calculateIngredientCost(ing, ingredients); return <tr key={idx} className="border-b border-gray-100 last:border-0"><td className="py-3 font-medium">{ing.name}</td><td className="py-3 text-gray-600">{ing.quantity} {ing.unit}</td>{isChef && <td className="py-3 text-right text-[#C8956C] font-medium">{ingredientCost == null ? "N/A" : `${ingredientCost.toFixed(2)}€`}</td>}</tr>; })}</tbody></table>
              )}
            </div>
          </div>

          {normalized.recipeType === "final" && (
            <div>
              <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Recettes de base utilisées ({normalized.baseComponents.length})</h4>
              <div className="bg-gray-50 rounded-lg p-4">
                {normalized.baseComponents.length === 0 ? <p className="text-sm text-gray-500 italic">Aucune recette de base liée</p> : (
                  <table className="w-full"><thead><tr className="text-left text-xs font-medium text-gray-500 uppercase border-b border-gray-200"><th className="pb-2">Recette de base</th><th className="pb-2">Quantité utilisée</th>{isChef && <th className="pb-2 text-right">Coût proratisé</th>}</tr></thead><tbody>{normalized.baseComponents.map((component, idx) => { const baseRecipe = normalizeRecipe(getRecipeById(allRecipes, component.baseRecipeId) || {}); const baseCost = baseRecipe.id ? calculateRecipeTotalCost(baseRecipe, allRecipes, new Set(), ingredients) : null; const prorated = (baseCost != null && baseRecipe.id) ? computeBaseComponentCost({ component, baseRecipe, baseCost }) : null; const usageLabel = component.usageMode === "portion" ? `${component.portionCount} portions/couverts` : `${component.quantity} ${component.unit}`; return <tr key={idx} className="border-b border-gray-100 last:border-0"><td className="py-3 font-medium">{component.name}</td><td className="py-3 text-gray-600">{usageLabel}</td>{isChef && <td className="py-3 text-right text-[#C8956C] font-medium">{prorated == null ? "N/A" : `${prorated.toFixed(2)}€`}</td>}</tr>; })}</tbody></table>
                )}
              </div>
            </div>
          )}

          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Procédé / Préparation</h4>
            <div className="bg-amber-50 rounded-lg p-4 border-l-4 border-[#C8956C] procedure-text" dangerouslySetInnerHTML={{ __html: normalized.procedure ? migrateProcedureMarkdownToHtml(normalized.procedure) : "<p class='text-gray-500' style='font-style:italic'>Aucun procédé renseigné</p>" }} />
          </div>

          {isChef && (
            <div className="bg-[#C8956C] bg-opacity-10 rounded-lg p-4 border border-[#C8956C] border-opacity-30">
              {!costStatus.valid ? <div className="text-sm text-red-700 font-medium">{costStatus.message}</div> : <><div className="flex justify-between items-center mb-2"><span className="font-semibold text-[#1A3A4A]">Coût total :</span><span className="text-2xl font-bold text-[#C8956C]">{Number(totalCost || 0).toFixed(2)}€</span></div><div className="flex justify-between items-center text-sm text-[#1A3A4A]"><span>Coût par couvert :</span><span>{normalized.covers > 0 ? (Number(totalCost || 0) / normalized.covers).toFixed(2) : "0.00"}€</span></div></>}
            </div>
          )}
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Allergènes</h4>
            {(() => {
              const { allergens, hasIncomplete, incompleteIngredients } = computeRecipeAllergeneSummary(normalized, ingredients, allRecipes);
              return (
                <div className="rounded-lg p-4 border border-red-100 bg-red-50">
                  {allergens.length > 0
                    ? <p className="text-red-800 font-semibold">{allergens.join(" · ")}</p>

                  }
                  {hasIncomplete && (
                    <div className="mt-2">

                          <li key={i} className="flex items-center justify-between text-sm">
                            <span className="text-amber-700">{inc.name}{inc.fromBaseRecipe ? <span className="text-gray-500 ml-1">(via {inc.fromBaseRecipe})</span> : null}</span>

                              <button type="button" onClick={() => setAllergenesIngId(inc.ingredientId)} className="ml-3 text-xs px-2 py-1 rounded bg-[#1A3A4A] text-white flex-shrink-0">Compléter</button>
                            )}
                          </li>
                        ))}
                      </ul>
                    </div>
                  )}
                </div>
              );
            })()}
          </div>
        </div>
      </div>
      {onUpdateIngredient && (
        <IngredientAllergenesModal
          ingredient={ingredients.find(i => i.id === allergenesIngId) || null}
          isOpen={allergenesIngId !== null}
          onClose={() => setAllergenesIngId(null)}
          onSave={(updated) => { onUpdateIngredient(updated); setAllergenesIngId(null); }}
        />
      )}
    </div>
  );
};

const AdaptModal = ({ recipe, recipes, ingredients, isOpen, onClose, isChef }) => {
  const normalized = recipe ? normalizeRecipe(recipe) : null;
  const [pivotType, setPivotType] = useState("covers");
  const [pivotValue, setPivotValue] = useState("");
  const [selectedIngredientIndex, setSelectedIngredientIndex] = useState(0);
  useEffect(() => {
    if (normalized && isOpen) {
      setPivotType("covers");
      setPivotValue(String(normalized.covers || 1));
      setSelectedIngredientIndex(0);
    }
  }, [recipe, isOpen]);
  useEffect(() => {
    const handleEsc = (e) => e.key === "Escape" && onClose();
    if (isOpen) { window.addEventListener("keydown", handleEsc); return () => window.removeEventListener("keydown", handleEsc); }
  }, [isOpen, onClose]);
  if (!isOpen || !normalized) return null;

  const baseCost = calculateRecipeTotalCost(normalized, recipes, new Set(), ingredients);
  const scaling = window.ArpegeRecipeScaling.computePivotMultiplier({
    pivotType,
    pivotValue,
    normalizedRecipe: normalized,
    baseCost,
    selectedIngredientIndex,
  });
  const multiplier = scaling.multiplier;
  const ingredientPivotSource = scaling.ingredientPivotSource;
  const totalDirectQty = scaling.totalDirectQty;
  const { adaptedDirectIngredients, adaptedBaseComponents, adaptedRecipe } = window.ArpegeRecipeScaling.buildAdaptedRecipe({
    normalizedRecipe: normalized,
    multiplier,
  });
  const { adaptedCost, adaptedCostStatus } = window.ArpegeRecipeScaling.computeAdaptedMetrics({
    adaptedRecipe,
    recipes,
    calculateRecipeTotalCost: (recipeInput, recipesInput) => calculateRecipeTotalCost(recipeInput, recipesInput, new Set(), ingredients),
    getCostStatus: (recipeInput, recipesInput) => getCostStatus(recipeInput, recipesInput, ingredients),
  });

  const escapeHtml = (value) => String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
  const sanitizePrintTitle = (value, suffix) => {
    const invalidChars = ["/", "\\", ":", "*", "?", "\"", "<", ">", "|"];
    let cleanedName = String(value || "Recette");
    invalidChars.forEach((char) => {
      cleanedName = cleanedName.split(char).join(" ");
    });
    cleanedName = cleanedName.replace(/\s+/g, " ").trim();
    return `${cleanedName || "Recette"} - ${suffix}`;
  };

  const detectProcedureWarnings = (procedureText) => {
    const text = String(procedureText || "");
    const unique = (items) => [...new Set(items.map((item) => item.trim()).filter(Boolean))];
    const dimensionRegexes = [
      /\b\d+(?:[.,]\d+)?\s*[x×]\s*\d+(?:[.,]\d+)?(?:\s*[x×]\s*\d+(?:[.,]\d+)?)?(?:\s*(?:mm|cm|m))?\b/gi,
      /\b\d+(?:[.,]\d+)?\s*(?:mm|cm|m|mm²|cm²|m²|mm2|cm2|m2)\b/gi,
    ];
    const timeRegexes = [
      /\b\d+\s*h\s*\d{1,2}\b/gi,
      /\b\d+\s*h\b/gi,
      /\b\d+\s*(?:min|mins|minute|minutes)\b/gi,
      /\b\d+\s*(?:heure|heures)\b/gi,
    ];
    const collectMatches = (regexes) => unique(regexes.flatMap((regex) => text.match(regex) || []));
    const dimensions = collectMatches(dimensionRegexes);
    const cookingTimes = collectMatches(timeRegexes);
    return {
      dimensions,
      cookingTimes,
      hasWarnings: dimensions.length > 0 || cookingTimes.length > 0,
    };
  };

  const buildProcedureWarningHtml = ({ multiplierValue, dimensions, cookingTimes }) => {
    if (((!dimensions || dimensions.length === 0) && (!cookingTimes || cookingTimes.length === 0)) || multiplierValue === 1) return "";
    const dimensionsLine = dimensions.length > 0 ? `<p><strong>Dimensions détectées :</strong> ${escapeHtml(dimensions.join(", "))}</p>` : "";
    const timesLine = cookingTimes.length > 0 ? `<p><strong>Temps de cuisson détectés :</strong> ${escapeHtml(cookingTimes.join(", "))}</p>` : "";
    return `
      <div class="warning-box">
        <p><strong>⚠️ Vérification manuelle recommandée</strong></p>
        <p>Cette recette a été adaptée avec un coefficient de x${escapeHtml(multiplierValue.toFixed(2))}</p>
        <p>Les éléments suivants ne s'adaptent pas automatiquement :</p>
        ${dimensionsLine}
        ${timesLine}
      </div>
    `;
  };

  const buildProcedureHtml = (procedure) => {
    if (!procedure) return "<p style='color:#6b7280;font-style:italic;'>Aucun procédé renseigné</p>";
    return migrateProcedureMarkdownToHtml(procedure);
  };

  const handlePrintAdaptedSheet = () => {
    const printTitle = sanitizePrintTitle(adaptedRecipe.name, "Fiche adaptée");
    const { allergens: adaptedAllergens, hasIncomplete: adaptedAllergenesIncomplete } = computeRecipeAllergeneSummary(normalized, ingredients, recipes);
    const allergenesSection = `
      <section>
        <h2>Allergènes</h2>
        ${adaptedAllergens.length > 0
          ? `<p style="color:#991b1b;font-weight:600;">${escapeHtml(adaptedAllergens.join(" · "))}</p>`

        }
        ${adaptedAllergenesIncomplete ? `<p style="color:#b45309;font-size:13px;font-style:italic;">⚠ La liste peut être incomplète</p>` : ""}
      </section>
    `;
    const directRows = adaptedDirectIngredients.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
      : adaptedDirectIngredients.map((ing) => {
          const ingredientCost = calculateIngredientCost({ ...ing, quantity: ing.adaptedQuantity }, ingredients);
          return `
            <tr>
              <td>${escapeHtml(ing.name)}</td>
              <td>${escapeHtml(ing.adaptedQuantity.toFixed(2))} ${escapeHtml(ing.unit)}</td>
              ${isChef ? `<td style="text-align:right;">${ingredientCost == null ? "N/A" : `${ingredientCost.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseRows = adaptedBaseComponents.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucune recette de base liée</td></tr>`
      : adaptedBaseComponents.map((component) => {
          const baseRecipe = normalizeRecipe(getRecipeById(recipes, component.baseRecipeId) || {});
          const baseCost = baseRecipe.id ? calculateRecipeTotalCost(baseRecipe, recipes, new Set(), ingredients) : null;
          const adaptedComponent = component.usageMode === "portion"
            ? { ...component, portionCount: component.adaptedPortionCount }
            : { ...component, quantity: component.adaptedQuantity };
          const prorated = (baseCost != null && baseRecipe.id)
            ? computeBaseComponentCost({ component: adaptedComponent, baseRecipe, baseCost })
            : null;
          const portionDisplayValue = component.adaptedPortionCount ?? component.portionCount;
          const adaptedLabel = component.usageMode === "portion"
            ? `${Number(portionDisplayValue || 0).toFixed(2)} portions/couverts`
            : `${Number(component.adaptedQuantity || 0).toFixed(2)} ${component.unit}`;
          return `
            <tr>
              <td>${escapeHtml(component.name)}</td>
              <td>${escapeHtml(adaptedLabel)}</td>
              ${isChef ? `<td style="text-align:right;">${prorated == null ? "N/A" : `${prorated.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseSection = adaptedRecipe.recipeType === "final" ? `
      <section>
        <h2>Recettes de base utilisées (${adaptedBaseComponents.length})</h2>
        <table>
          <thead>
            <tr>
              <th>Recette de base</th>
              <th>Quantité adaptée</th>
              ${isChef ? "<th style='text-align:right;'>Coût proratisé</th>" : ""}
            </tr>
          </thead>
          <tbody>${baseRows}</tbody>
        </table>
      </section>
    ` : "";

    const costSection = isChef ? `
      <section>
        <h2>Synthèse des coûts</h2>
        ${
          !adaptedCostStatus.valid
            ? `<p style="color:#991b1b;font-weight:600;">${escapeHtml(adaptedCostStatus.message)}</p>`
            : `
              <p><strong>Coût total adapté :</strong> ${Number(adaptedCost || 0).toFixed(2)}€</p>
              <p><strong>Coût par couvert :</strong> ${adaptedRecipe.covers > 0 ? (Number(adaptedCost || 0) / adaptedRecipe.covers).toFixed(2) : "0.00"}€</p>
            `
        }

    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>
          <meta charset="UTF-8" />

            h2 { margin: 18px 0 8px 0; color: #1A3A4A; font-size: 17px; break-after: avoid; page-break-after: avoid; }
            .meta { color: #4b5563; margin-bottom: 6px; }
            .badges { margin: 10px 0 14px 0; }
            .badge { display: inline-block; background: #f3f4f6; border-radius: 999px; padding: 4px 10px; margin-right: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 600; }
            section { break-inside: avoid; page-break-inside: avoid; margin-bottom: 12px; }
            table { width: 100%; border-collapse: collapse; margin-top: 8px; }
            th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 13px; }
            th { text-align: left; background: #f9fafb; font-weight: 600; }
            tr { break-inside: avoid; page-break-inside: avoid; }
            .procedure { background: #fffbeb; border-left: 4px solid #C8956C; padding: 12px; }
            .procedure p { margin: 0 0 5px 0; }
            .warning-box { margin-top: 12px; background: #fff7ed; border: 1px solid #fdba74; border-left: 4px solid #f97316; border-radius: 8px; padding: 12px; color: #9a3412; break-inside: avoid; page-break-inside: avoid; }
            .warning-box p { margin: 0 0 6px 0; }
            .warning-box p:last-child { margin-bottom: 0; }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(adaptedRecipe.name)} (adaptée)</h1>
          <p class="meta"><strong>Type :</strong> ${adaptedRecipe.recipeType === "base" ? "Recette de base" : "Recette finale"}</p>
          <p class="meta"><strong>Coefficient :</strong> ${escapeHtml(multiplier.toFixed(4))}</p>
          <p class="meta"><strong>Couverts adaptés :</strong> ${escapeHtml((adaptedRecipe.covers || 0).toFixed(2))}${adaptedRecipe.recipeType === "base" ? ` • <strong>Rendement :</strong> ${escapeHtml((Number(adaptedRecipe.outputQuantity || 0) * multiplier).toFixed(2))} ${escapeHtml(adaptedRecipe.outputUnit)}` : ""}</p>
          <div class="badges">${adaptedRecipe.categories.map(cat => `<span class="badge">${escapeHtml(cat)}</span>`).join("")}</div>

          <section>

    const iframe = document.createElement("iframe");

    iframe.style.right = "0";
    iframe.style.bottom = "0";

  const procedureWarnings = detectProcedureWarnings(adaptedRecipe.procedure);

  const handlePrintAdaptedProductionSheet = () => {

    const baseBlocks = adaptedBaseComponents.length === 0

          }

          const baseRecipe = normalizeRecipe(baseRecipeRaw);
          const effectiveYield = resolveEffectiveYield(baseRecipe);
          const usageMode = component.usageMode || "quantity";

          let multiplierForBase = null;
          let invalidReason = null;

          if (usageMode === "portion") {
            const adaptedPortionCount = Number(adaptedRecipe.baseComponents?.[idx]?.portionCount ?? component.adaptedPortionCount ?? component.portionCount ?? 0);
            const baseCovers = Number(baseRecipe.covers || 0);
            if (!Number.isFinite(adaptedPortionCount) || adaptedPortionCount <= 0 || !Number.isFinite(baseCovers) || baseCovers <= 0) {

            } else {
              multiplierForBase = adaptedPortionCount / baseCovers;
            }
          } else {
            const adaptedQty = Number(adaptedRecipe.baseComponents?.[idx]?.quantity ?? component.adaptedQuantity ?? component.quantity ?? 0);
            const sourceUnit = component.unit;
            const targetUnit = effectiveYield?.unit;
            const converted = effectiveYield ? convertQuantity(adaptedQty, sourceUnit, targetUnit) : null;
            if (!effectiveYield || converted == null || Number(effectiveYield.quantity || 0) <= 0) {
              invalidReason = "quantité non calculable";
            } else {
              multiplierForBase = converted / Number(effectiveYield.quantity);
            }
          }

          const ingredientRows = (baseRecipe.directIngredients || []).length === 0
            ? `<tr><td colspan="2" style="padding:8px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`

                  `;
                }
                const adaptedIngredientQty = Number(ing.quantity || 0) * multiplierForBase;
                const qtyLabel = Number.isFinite(adaptedIngredientQty)
                  ? `${adaptedIngredientQty.toFixed(2)} ${escapeHtml(ing.unit)}`
                  : "quantité non calculable";
                return `
                  <tr>
                    <td>${escapeHtml(ing.name)}</td>
                    <td>${qtyLabel}</td>
                  </tr>
                `;
              }).join("");

          const usageLabel = usageMode === "portion"
            ? `${Number(adaptedRecipe.baseComponents?.[idx]?.portionCount ?? component.adaptedPortionCount ?? component.portionCount ?? 0).toFixed(2)} portions/couverts`
            : `${Number(adaptedRecipe.baseComponents?.[idx]?.quantity ?? component.adaptedQuantity ?? component.quantity ?? 0).toFixed(2)} ${escapeHtml(component.unit)}`;

          return `
            <section class="subrecipe-block">
              <h2>${idx + 1}. ${escapeHtml(baseRecipe.name)}</h2>
              <p class="meta"><strong>Utilisation adaptée :</strong> ${usageLabel}${invalidReason ? ` • <span style="color:#991b1b;">${invalidReason}</span>` : ""}</p>
              <div class="grid">
                <div>
                  <h3>Ingrédients adaptés</h3>
                  <table>
                    <thead>

                      </tr>
                    </thead>

                  <h3>Procédé</h3>
                  <div class="procedure">${buildProcedureHtml(baseRecipe.procedure)}</div>

    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>

        </head>
        <body>
          <h1>${escapeHtml(adaptedRecipe.name)} (adaptée)</h1>

          ${(() => { const { allergens: a, hasIncomplete: inc } = computeRecipeAllergeneSummary(normalized, ingredients, recipes); return `<section class="subrecipe-block"><h2>Allergènes</h2>${a.length > 0 ? `<p style="color:#991b1b;font-weight:600;">${escapeHtml(a.join(" · "))}</p>` : `<p style="color:#166534;font-weight:600;">Aucun allergène</p>`}${inc ? `<p style="color:#b45309;font-size:13px;font-style:italic;">⚠ La liste peut être incomplète</p>` : ""}</section>`; })()}
          ${baseBlocks}
          <section class="subrecipe-block">

    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) {
      alert("Impossible d'ouvrir l'impression PDF. Vérifiez les paramètres de votre navigateur.");
      iframe.remove();
      return;
    }

    iframeWindow.document.open();
    iframeWindow.document.write(content);
    iframeWindow.document.close();
    iframeWindow.document.title = printTitle;
    setTimeout(() => {
      iframeWindow.focus();
      iframeWindow.print();
      setTimeout(() => iframe.remove(), 1000);

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto slide-in relative">
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2 z-10">✕</button>
        <div className="p-6 border-b border-gray-200 pr-12"><h3 className="text-xl font-bold text-[#1A3A4A]">Adapter : {normalized.name}</h3><p className="text-sm text-gray-500 mt-1">La recette entière se recalculera proportionnellement.</p></div>
        <div className="p-6 space-y-6">
          <div className="bg-gray-50 rounded-xl p-4 border border-gray-200">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Type de pivot</label>
                <select value={pivotType} onChange={(e) => { const t = e.target.value; setPivotType(t); setPivotValue(String(t === "covers" ? normalized.covers || 1 : t === "globalQuantity" ? totalDirectQty || 1 : t === "budget" ? (baseCost || "") : ingredientPivotSource?.quantity || 1)); }} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                  <option value="covers">Nombre de couverts</option>
                  <option value="globalQuantity">Quantité globale</option>
                  <option value="budget">Budget cible</option>

                </select>

              {pivotType === "ingredientQuantity" && (
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Ligne pivot</label>
                  <select value={selectedIngredientIndex} onChange={(e) => { const idx = parseInt(e.target.value); setSelectedIngredientIndex(idx); const source = window.ArpegeRecipeScaling.getPivotSourceLine(normalized, idx); setPivotValue(String(source?.usageMode === "portion" ? source?.portionCount : source?.quantity || 1)); }} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                    {[...normalized.directIngredients, ...normalized.baseComponents].map((line, idx) => <option key={idx} value={idx}>{line.name} ({line.usageMode === "portion" ? `${line.portionCount} portions/couverts` : `${line.quantity} ${line.unit}`})</option>)}
                  </select>
                </div>
              )}
            </div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Valeur cible</label><input type="number" step="0.01" min="0.01" value={pivotValue} onChange={(e) => setPivotValue(e.target.value)} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
          </div>
          <div className="bg-[#C8956C] bg-opacity-10 rounded-xl p-4 border border-[#C8956C] border-opacity-30">
            {scaling.reason === "BUDGET_COST_UNKNOWN" ? (
              <p className="text-sm text-amber-700 font-medium">⚠ Pivot par budget indisponible — le coût de cette recette est inconnu car certains prix d'ingrédients ne sont pas renseignés.</p>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                <div className="flex justify-between"><span className="font-medium text-[#1A3A4A]">Coefficient :</span><span>{multiplier.toFixed(4)}</span></div>
                <div className="flex justify-between"><span className="font-medium text-[#1A3A4A]">Couverts recalculés :</span><span>{(normalized.covers * multiplier).toFixed(2)}</span></div>
                {isChef && <div className="flex justify-between"><span className="font-medium text-[#1A3A4A]">Coût recalculé :</span><span>{adaptedCost == null ? "N/A" : `${adaptedCost.toFixed(2)}€`}</span></div>}
              </div>
            )}
            <div className="mt-4 flex flex-wrap gap-2">
              <button onClick={handlePrintAdaptedSheet} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#2A4A5A]">Imprimer la fiche adaptée (PDF)</button>
              {normalized.recipeType !== "base" && (
                <button onClick={handlePrintAdaptedProductionSheet} className="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-800">Imprimer fiche complète adaptée</button>
              )}
            </div>
          </div>
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Lignes adaptées</h4>
            <div className="bg-gray-50 rounded-lg p-4 space-y-2 max-h-72 overflow-y-auto">
              {adaptedDirectIngredients.map((ing, idx) => <div key={`i-${idx}`} className="flex justify-between items-center py-3 border-b border-gray-200"><div><div className="font-medium text-[#1A3A4A]">{ing.name}</div><div className="text-xs text-gray-500">Base : {ing.quantity} {ing.unit}</div></div><div className="text-right text-gray-700 bg-white px-3 py-1 rounded-full text-sm border border-gray-200">{ing.adaptedQuantity.toFixed(2)} {ing.unit}</div></div>)}
              {adaptedBaseComponents.map((c, idx) => <div key={`c-${idx}`} className="flex justify-between items-center py-3 border-b border-gray-200"><div><div className="font-medium text-[#1A3A4A]">{c.name} <span className="text-xs text-gray-500">(recette de base)</span></div><div className="text-xs text-gray-500">Base : {c.usageMode === "portion" ? `${c.portionCount} portions/couverts` : `${c.quantity} ${c.unit}`}</div></div><div className="text-right text-gray-700 bg-white px-3 py-1 rounded-full text-sm border border-gray-200">{c.usageMode === "portion" ? `${Number((adaptedRecipe.baseComponents?.[idx]?.portionCount ?? c.adaptedPortionCount ?? c.portionCount) || 0).toFixed(2)} portions/couverts` : `${c.adaptedQuantity.toFixed(2)} ${c.unit}`}</div></div>)}
            </div>
          </div>
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Allergènes</h4>
            {(() => {
              const { allergens, hasIncomplete } = computeRecipeAllergeneSummary(normalized, ingredients, recipes);
              return (
                <div className="rounded-lg p-4 border border-red-100 bg-red-50">
                  {allergens.length > 0
                    ? <p className="text-red-800 font-semibold">{allergens.join(" · ")}</p>
                    : <p className="text-green-700 font-medium">Aucun allergène</p>
                  }
                  {hasIncomplete && <p className="text-amber-600 text-sm mt-1 italic">⚠ La liste peut être incomplète (ingrédients non renseignés ou sous-recettes incluses)</p>}
                </div>
              );
            })()}
          </div>
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Procédé / Préparation</h4>
            <div className="bg-amber-50 rounded-lg p-4 border-l-4 border-[#C8956C] procedure-text" dangerouslySetInnerHTML={{ __html: normalized.procedure ? migrateProcedureMarkdownToHtml(normalized.procedure) : "<p class='text-gray-500' style='font-style:italic'>Aucun procédé renseigné</p>" }} />
            {procedureWarnings.hasWarnings && multiplier !== 1 && (
              <div className="mt-4 bg-orange-50 border border-orange-300 border-l-4 border-l-orange-500 rounded-lg p-4 text-orange-900">
                <p className="font-semibold">⚠️ Vérification manuelle recommandée</p>
                <p>Cette recette a été adaptée avec un coefficient de x{multiplier.toFixed(2)}</p>
                <p>Les éléments suivants ne s'adaptent pas automatiquement :</p>
                {procedureWarnings.dimensions.length > 0 && <p><strong>Dimensions détectées :</strong> {procedureWarnings.dimensions.join(", ")}</p>}
                {procedureWarnings.cookingTimes.length > 0 && <p><strong>Temps de cuisson détectés :</strong> {procedureWarnings.cookingTimes.join(", ")}</p>}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

const RecipesManager = ({ ingredients, setIngredients, recipes, setRecipes, isChef, sectionType = "base" }) => {
  const normalizedRecipes = useMemo(() => recipes.map(normalizeRecipe), [recipes]);
  const editorRef = React.useRef(null);

  const [adaptRecipe, setAdaptRecipe] = useState(null);
  const [showAddIngredientModal, setShowAddIngredientModal] = useState(false);

    return () => document.removeEventListener("mousedown", handleClick);
  }, [showExportMenu]);
  const [editingDirectIndex, setEditingDirectIndex] = useState(null);
  const [editingBaseIndex, setEditingBaseIndex] = useState(null);
