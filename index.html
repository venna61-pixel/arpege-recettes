  const [directSnapshot, setDirectSnapshot] = useState(null);
  const [baseSnapshot, setBaseSnapshot] = useState(null);
  const parseLocalizedNumber = (rawValue, fallback = 1) => {
    const normalized = String(rawValue ?? "").trim().replace(",", ".");
    if (!normalized) return fallback;
    const parsed = parseFloat(normalized);
    return Number.isFinite(parsed) ? parsed : fallback;
  };

  const emptyForm = {
    recipeType: sectionType,
    categories: ["Entrée"],
    name: "",
    covers: 4,
    outputQuantity: 1,
    outputUnit: "Kg",
    directIngredients: [],
    baseComponents: [],
    procedure: "",
    wasteCoeff: 0,
  };

  const [formData, setFormData] = useState(emptyForm);
  const [currentIng, setCurrentIng] = useState({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 0, searchText: "" });
  const [currentBase, setCurrentBase] = useState({ baseRecipeId: "", quantity: "", unit: "Gramme", usageMode: "quantity", portionCount: "", searchText: "", categoryFilter: "Tous" });
  const [ingHighlightIdx, setIngHighlightIdx] = useState(-1);
  const [baseHighlightIdx, setBaseHighlightIdx] = useState(-1);

  const filteredBaseRecipesForPicker = filterBaseRecipesForPicker({
    recipes: normalizedRecipes,
    searchText: currentBase.searchText,
    categoryFilter: currentBase.categoryFilter,
  });

  const filteredIngredientsForSearch = filterIngredientsForPicker({
    ingredients,
    searchText: currentIng.searchText,
  });
  const supplierSuggestions = useMemo(() => (
    Array.from(new Set(
      (ingredients || [])
        .map((ing) => String(ing?.supplier || "").trim())
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b, "fr"))
  ), [ingredients]);

  const hasCategorySelection = categoryFilter !== null;

  const filteredRecipes = hasCategorySelection
    ? filterRecipesForList({
      recipes: normalizedRecipes,
      searchTerm,
      sectionType,
      categoryFilter,
    })
    : [];
  const theoreticalYield = useMemo(
    () => computeTheoreticalYieldFromDirectIngredients({ directIngredients: formData.directIngredients || [] }),
    [formData.directIngredients]
  );
  const selectedBaseRecipeForUsage = useMemo(
    () => normalizedRecipes.find((r) => Number(r.id) === Number(currentBase.baseRecipeId) && r.recipeType === "base") || null,
    [normalizedRecipes, currentBase.baseRecipeId]
  );
  const baseYieldReferenceUnit = useMemo(() => {
    if (!selectedBaseRecipeForUsage) return null;
    const effectiveYield = resolveEffectiveYield(selectedBaseRecipeForUsage);
    return effectiveYield?.unit || selectedBaseRecipeForUsage.outputUnit || null;
  }, [selectedBaseRecipeForUsage]);
  const baseYieldGroup = baseYieldReferenceUnit ? getUnitGroup(baseYieldReferenceUnit) : "unknown";
  const compatibleBaseUnits = useMemo(() => {
    if (baseYieldGroup === "mass") return BASE_QUANTITY_UNITS_MASS;
    if (baseYieldGroup === "volume") return BASE_QUANTITY_UNITS_VOLUME;
    return [...BASE_QUANTITY_UNITS_MASS, ...BASE_QUANTITY_UNITS_VOLUME];
  }, [baseYieldGroup]);
  const baseUnitOptions = Array.from(new Set([...compatibleBaseUnits, currentBase.unit].filter(Boolean)));
  const canAddBase = Boolean(
    currentBase.baseRecipeId &&
    (currentBase.usageMode === "portion" ? currentBase.portionCount : currentBase.quantity)
  );

  const resetForm = () => {
    setFormData({ ...emptyForm, recipeType: sectionType });
    setEditingId(null);
    setShowForm(false);
    setEditingDirectIndex(null);
    setEditingBaseIndex(null);
    setDirectSnapshot(null);
    setBaseSnapshot(null);
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 0, searchText: "" });
    setCurrentBase({ baseRecipeId: "", quantity: "", unit: "Gramme", usageMode: "quantity", portionCount: "", searchText: "", categoryFilter: "Tous" });
  };

  const toggleRecipeCategory = (category) => {
    const alreadySelected = formData.categories.includes(category);
    const nextCategories = alreadySelected ? formData.categories.filter(c => c !== category) : [...formData.categories, category];
    setFormData({ ...formData, categories: nextCategories.length ? nextCategories : [category] });
  };

  const addIngredientToRecipe = (ingredientId = null) => {
    const finalIngredientId = ingredientId || currentIng.ingredientId;
    if (!finalIngredientId || !currentIng.quantity) return;
    const ing = ingredients.find(i => Number(i.id) === Number(finalIngredientId));
    if (!ing) return;
    const line = buildDirectIngredientLine({
      ingredient: ing,
      ingredientId: finalIngredientId,
      quantity: parseLocalizedNumber(currentIng.quantity, 1),
      unit: currentIng.unit,
      wasteCoeff: parseLocalizedNumber(currentIng.wasteCoeff, 0),

    setFormData({
      ...formData,
      directIngredients: [...formData.directIngredients, line]
    });
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 0, searchText: "" });
  };

  const addBaseComponentToRecipe = (baseRecipeId = null) => {
    const finalBaseRecipeId = baseRecipeId || currentBase.baseRecipeId;

    if (currentBase.usageMode !== "portion" && !currentBase.quantity) return;
    const baseRecipe = normalizedRecipes.find(r => Number(r.id) === Number(finalBaseRecipeId) && r.recipeType === "base");
    if (!baseRecipe) return;
    const line = buildBaseComponentLine({
      baseRecipe,
      baseRecipeId: finalBaseRecipeId,
      quantity: currentBase.usageMode === "portion" ? 0 : parseLocalizedNumber(currentBase.quantity, 1),
      unit: currentBase.unit,
      usageMode: currentBase.usageMode,
      portionCount: currentBase.usageMode === "portion" ? parseLocalizedNumber(currentBase.portionCount, 1) : undefined,
    });
    if (!line) return;
    setFormData({
      ...formData,
      baseComponents: [...formData.baseComponents, line]
    });
    setCurrentBase({ baseRecipeId: "", quantity: "", unit: "Gramme", usageMode: currentBase.usageMode, portionCount: "", searchText: "", categoryFilter: currentBase.categoryFilter });
  };

  const handleAddNewIngredient = (payload) => {
    const newIngredient = payload?.ingredient || payload;
    if (!newIngredient || newIngredient.id == null) return;
    const usage = payload?.recipeUsage || {};
    const recipeUnit = payload?.recipeUsage?.recipeUnit;
    const normalizedQuantity = parseLocalizedNumber(usage.recipeQuantity, NaN);
    const normalizedWasteCoeff = parseLocalizedNumber(usage.recipeWasteCoeff, NaN);
    const resolvedQuantity = Number.isFinite(normalizedQuantity) && normalizedQuantity > 0 ? normalizedQuantity : parseLocalizedNumber(currentIng.quantity, 1);
    const resolvedWasteCoeff = Number.isFinite(normalizedWasteCoeff) && normalizedWasteCoeff >= 0 ? normalizedWasteCoeff : parseLocalizedNumber(currentIng.wasteCoeff, 0);
    setIngredients([...ingredients, newIngredient]);
    const line = buildDirectIngredientLine({
      ingredient: newIngredient,
      ingredientId: newIngredient.id,
      quantity: resolvedQuantity,
      unit: recipeUnit || newIngredient.unit || currentIng.unit || "Gramme",
      wasteCoeff: resolvedWasteCoeff,
    });
    if (!line) return;
    setFormData({
      ...formData,
      directIngredients: [...formData.directIngredients, line]
    });
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 0, searchText: "" });
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const normalizedFormData = {
      ...formData,
      covers: parseLocalizedNumber(formData.covers, 1),
      outputQuantity: parseLocalizedNumber(formData.outputQuantity, 1),
      wasteCoeff: parseLocalizedNumber(formData.wasteCoeff, 0),
      directIngredients: (formData.directIngredients || []).map((line) => ({
        ...line,
        quantity: parseLocalizedNumber(line?.quantity, 1),
        wasteCoeff: parseLocalizedNumber(line?.wasteCoeff, 0),
      })),
      baseComponents: (formData.baseComponents || []).map((line) => ({
        ...line,
        quantity: parseLocalizedNumber(line?.quantity, 0),
        portionCount: line?.usageMode === "portion" ? parseLocalizedNumber(line?.portionCount, 1) : line?.portionCount,
      })),
    };
    const validation = validateRecipeDraft(normalizedFormData);
    if (!validation.valid) {
      alert(validation.message);
      return;
    }
    const payload = buildRecipePayload(normalizedFormData, normalizeRecipe);
    setRecipes(upsertRecipe(recipes, payload, editingId));
    resetForm();
  };

  const updateDirectIngredientLine = (idx, patch) => {
    setFormData({
      ...formData,
      directIngredients: formData.directIngredients.map((line, i) => (i === idx ? { ...line, ...patch } : line)),
    });
  };

  const updateBaseComponentLine = (idx, patch) => {
    setFormData({
      ...formData,
      baseComponents: formData.baseComponents.map((line, i) => (i === idx ? { ...line, ...patch } : line)),
    });
  };
  const getInlineBaseComponentUnitOptions = (component) => {
    const linkedBaseRecipe = normalizedRecipes.find((r) => Number(r.id) === Number(component?.baseRecipeId) && r.recipeType === "base") || null;
    const effectiveYield = linkedBaseRecipe ? resolveEffectiveYield(linkedBaseRecipe) : null;
    const referenceUnit = effectiveYield?.unit || linkedBaseRecipe?.outputUnit || null;
    const group = referenceUnit ? getUnitGroup(referenceUnit) : "unknown";
    const compatibleUnits = group === "mass"
      ? BASE_QUANTITY_UNITS_MASS
      : group === "volume"
        ? BASE_QUANTITY_UNITS_VOLUME
        : [...BASE_QUANTITY_UNITS_MASS, ...BASE_QUANTITY_UNITS_VOLUME];
    return Array.from(new Set([...compatibleUnits, component?.unit].filter(Boolean)));
  };

  const handleEdit = (recipe) => {
    const normalized = normalizeRecipe(recipe);
    setFormData(normalized);
    setEditingId(normalized.id);
    setShowForm(true);
    setDetailRecipe(null);
    setEditingDirectIndex(null);
    setEditingBaseIndex(null);
    setDirectSnapshot(null);
    setBaseSnapshot(null);
  };

  const applyFormat = (command, value = null) => {
    editorRef.current?.focus();
    if (command === 'foreColor') {
      const current = document.queryCommandValue('foreColor');
      const isRed = current === 'rgb(220, 38, 38)' || current === '#dc2626';
      document.execCommand('foreColor', false, isRed ? '#000000' : value);
    } else {
      document.execCommand(command, false, value);
    }
    if (editorRef.current) setFormData(prev => ({ ...prev, procedure: editorRef.current.innerHTML }));
  };

  useEffect(() => {
    if (editorRef.current && showForm) {
      editorRef.current.innerHTML = migrateProcedureMarkdownToHtml(formData.procedure || "");
    }
  }, [showForm, editingId]);

  const handleExportRecipesPdf = (recipesToExport) => {
    if (!recipesToExport || recipesToExport.length === 0) return;
    const esc = (v) => String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
    const procHtml = (procedure) => procedure ? migrateProcedureMarkdownToHtml(procedure) : "<p style='color:#6b7280;font-style:italic;'>Aucun procédé renseigné</p>";

    // Recette de base : fiche simplifiée
    const buildBaseRecipeSection = (r) => {
      const totalCost = calculateRecipeTotalCost(r, normalizedRecipes, new Set(), ingredients);
      const costStatus = getCostStatus(r, normalizedRecipes, ingredients);
      const { allergens, hasIncomplete } = computeRecipeAllergeneSummary(r, ingredients, normalizedRecipes);
      const directRows = r.directIngredients.length === 0
        ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
        : r.directIngredients.map(ing => {
            const c = calculateIngredientCost(ing, ingredients);
            return `<tr><td>${esc(ing.name)}</td><td>${esc(ing.quantity)} ${esc(ing.unit)}</td>${isChef ? `<td style="text-align:right;">${c == null ? "N/A" : `${c.toFixed(2)}€`}</td>` : ""}</tr>`;
          }).join("");
      const allergenesHtml = `<section><h2>Allergènes</h2>${allergens.length > 0 ? `<p style="color:#991b1b;font-weight:600;">${esc(allergens.join(" · "))}</p>` : `<p style="color:#166534;font-weight:500;">Aucun allergène</p>`}${hasIncomplete ? `<p style="color:#b45309;font-size:12px;font-style:italic;">&#9888; Liste potentiellement incomplète</p>` : ""}</section>`;
      return `
        <article class="recipe-page">
          <h1>${esc(r.name)}</h1>
          <p class="meta"><strong>Recette de base</strong> • <strong>Couverts :</strong> ${esc(r.covers)} • <strong>Rendement :</strong> ${esc(r.outputQuantity)} ${esc(r.outputUnit)}</p>
          <div class="badges">${r.categories.map(cat => `<span class="badge">${esc(cat)}</span>`).join("")}</div>
          <section><h2>Ingrédients (${r.directIngredients.length})</h2>
            <table><thead><tr><th>Ingrédient</th><th>Quantité</th>${isChef ? "<th style='text-align:right;'>Coût</th>" : ""}</tr></thead><tbody>${directRows}</tbody></table></section>
          <section><h2>Procédé</h2><div class="procedure">${procHtml(r.procedure)}</div></section>
          ${allergenesHtml}
          ${isChef ? `<section><h2>Coûts</h2>${!costStatus.valid ? `<p style="color:#991b1b;font-weight:600;">${esc(costStatus.message)}</p>` : `<p><strong>Total :</strong> ${Number(totalCost||0).toFixed(2)}€ • <strong>Par couvert :</strong> ${r.covers > 0 ? (Number(totalCost||0)/r.covers).toFixed(2) : "0.00"}€</p>`}</section>` : ""}
        </article>`;
    };

    // Recette finale : fiche complète de production avec détail des sous-recettes
    const buildFinalRecipeProductionSection = (r) => {
      const totalCost = calculateRecipeTotalCost(r, normalizedRecipes, new Set(), ingredients);
      const costStatus = getCostStatus(r, normalizedRecipes, ingredients);
      const { allergens, hasIncomplete } = computeRecipeAllergeneSummary(r, ingredients, normalizedRecipes);

      const directRows = r.directIngredients.length === 0
        ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:8px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
        : r.directIngredients.map(ing => {
            const c = calculateIngredientCost(ing, ingredients);
            return `<tr><td>${esc(ing.name)}</td><td>${esc(ing.quantity)} ${esc(ing.unit)}</td>${isChef ? `<td style="text-align:right;">${c == null ? "N/A" : `${c.toFixed(2)}€`}</td>` : ""}</tr>`;
          }).join("");

      const subrecipeBlocks = r.baseComponents.length === 0
        ? `<p style="color:#6b7280;font-style:italic;">Aucune sous-recette liée.</p>`
        : r.baseComponents.map((component, idx) => {
            const baseRecipeRaw = getRecipeById(normalizedRecipes, component.baseRecipeId);
            if (!baseRecipeRaw) {
              return `<section class="subrecipe-block"><h2>${idx + 1}. ${esc(component.name || "Sous-recette introuvable")}</h2><p style="color:#991b1b;font-weight:600;">Sous-recette introuvable.</p></section>`;
            }
            const base = normalizeRecipe(baseRecipeRaw);
            const effectiveYield = resolveEffectiveYield(base);
            const usageMode = component.usageMode || "quantity";
            let multiplier = null;
            let invalidReason = null;
            if (usageMode === "portion") {
              const portionCount = Number(component.portionCount || 0);
              const baseCovers = Number(base.covers || 0);
              if (!Number.isFinite(portionCount) || portionCount <= 0 || !Number.isFinite(baseCovers) || baseCovers <= 0) {
                invalidReason = "portions non calculables";
              } else {
                multiplier = portionCount / baseCovers;
              }
            } else {
              const converted = effectiveYield ? convertQuantity(Number(component.quantity || 0), component.unit, effectiveYield.unit) : null;
              if (!effectiveYield || converted == null || Number(effectiveYield.quantity || 0) <= 0) {
                invalidReason = "quantité non calculable";
              } else {
                multiplier = converted / Number(effectiveYield.quantity);
              }
            }
            const ingredientsRows = base.directIngredients.length === 0
              ? `<tr><td colspan="2" style="padding:8px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
              : base.directIngredients.map(ing => {
                  if (multiplier == null) return `<tr><td>${esc(ing.name)}</td><td style="color:#991b1b;">quantité non calculable</td></tr>`;
                  const adaptedQty = Number(ing.quantity || 0) * multiplier;
                  return `<tr><td>${esc(ing.name)}</td><td>${Number.isFinite(adaptedQty) ? `${adaptedQty.toFixed(2)} ${esc(ing.unit)}` : "N/A"}</td></tr>`;
                }).join("");
            const usageLabel = usageMode === "portion"
              ? `${Number(component.portionCount || 0).toFixed(2)} portions/couverts`
              : `${esc(component.quantity)} ${esc(component.unit)}`;
            const bc = base.id ? calculateRecipeTotalCost(base, normalizedRecipes, new Set(), ingredients) : null;
            const pr = (bc != null && base.id) ? computeBaseComponentCost({ component, baseRecipe: base, baseCost: bc }) : null;
            return `
              <section class="subrecipe-block">
                <h2>${idx + 1}. ${esc(base.name)}</h2>
                <p class="meta"><strong>Utilisation :</strong> ${usageLabel}${invalidReason ? ` • <span style="color:#991b1b;">${invalidReason}</span>` : ""}${isChef && pr != null ? ` • <strong>Coût proratisé :</strong> ${pr.toFixed(2)}€` : ""}</p>
                <div class="grid">
                  <div><h3>Ingrédients adaptés</h3>
                    <table><thead><tr><th>Ingrédient</th><th>Quantité adaptée</th></tr></thead><tbody>${ingredientsRows}</tbody></table>
                  </div>
                  <div><h3>Procédé</h3><div class="procedure">${procHtml(base.procedure)}</div></div>
                </div>
              </section>`;
          }).join("");

      const allergenesHtml = `${allergens.length > 0 ? `<p style="color:#991b1b;font-weight:600;">${esc(allergens.join(" · "))}</p>` : `<p style="color:#166534;font-weight:500;">Aucun allergène</p>`}${hasIncomplete ? `<p style="color:#b45309;font-size:12px;font-style:italic;">&#9888; Liste potentiellement incomplète</p>` : ""}`;

      return `
        <article class="recipe-page">
          <h1>${esc(r.name)}</h1>
          <p class="meta"><strong>Recette finale</strong> • <strong>Couverts :</strong> ${esc(r.covers)}</p>
          <div class="badges">${r.categories.map(cat => `<span class="badge">${esc(cat)}</span>`).join("")}</div>
          ${r.directIngredients.length > 0 ? `<section><h2>Ingrédients directs (${r.directIngredients.length})</h2>
            <table><thead><tr><th>Ingrédient</th><th>Quantité</th>${isChef ? "<th style='text-align:right;'>Coût</th>" : ""}</tr></thead><tbody>${directRows}</tbody></table></section>` : ""}
          ${subrecipeBlocks}
          <section class="subrecipe-block"><h2>Montage / finition</h2><div class="procedure">${procHtml(r.procedure)}</div></section>
          <section><h2>Allergènes</h2>${allergenesHtml}</section>
          ${isChef ? `<section><h2>Coûts</h2>${!costStatus.valid ? `<p style="color:#991b1b;font-weight:600;">${esc(costStatus.message)}</p>` : `<p><strong>Total :</strong> ${Number(totalCost||0).toFixed(2)}€ • <strong>Par couvert :</strong> ${r.covers > 0 ? (Number(totalCost||0)/r.covers).toFixed(2) : "0.00"}€</p>`}</section>` : ""}
        </article>`;
    };

    const buildRecipeSection = (recipe) => {
      const r = normalizeRecipe(recipe);
      return r.recipeType === "final" ? buildFinalRecipeProductionSection(r) : buildBaseRecipeSection(r);
    };

    const content = `<!DOCTYPE html><html lang="fr"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/><title>Recettes</title>
      <style>
        @page{size:A4 portrait;margin:15mm;}
        *{box-sizing:border-box;}
        body{font-family:Inter,Arial,sans-serif;color:#111827;margin:0;}
        .recipe-page{padding:0;page-break-after:always;break-after:page;}
        .recipe-page:last-child{page-break-after:avoid;break-after:avoid;}
        h1{margin:0 0 8px 0;color:#1A3A4A;break-after:avoid;page-break-after:avoid;}
        h2{margin:18px 0 8px 0;color:#1A3A4A;font-size:16px;break-after:avoid;page-break-after:avoid;}
        h3{margin:0 0 8px 0;color:#1A3A4A;font-size:14px;break-after:avoid;page-break-after:avoid;}
        .meta{color:#4b5563;margin-bottom:6px;} .badges{margin:8px 0 12px 0;}
        .badge{display:inline-block;background:#f3f4f6;border-radius:999px;padding:3px 10px;margin-right:6px;font-size:12px;font-weight:600;}
        table{width:100%;border-collapse:collapse;margin-top:6px;} th,td{border:1px solid #e5e7eb;padding:7px;font-size:13px;}
        th{text-align:left;background:#f9fafb;font-weight:600;}
        tr{break-inside:avoid;page-break-inside:avoid;}
        .procedure{background:#fffbeb;border-left:4px solid #C8956C;padding:10px;min-height:40px;} .procedure p{margin:0 0 5px 0;}
        .subrecipe-block{border:1px solid #e5e7eb;border-radius:10px;padding:14px;margin:0 0 16px 0;break-inside:avoid;page-break-inside:avoid;}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start;}
        @media(max-width:600px){.grid{grid-template-columns:1fr;}}
      </style></head><body>${recipesToExport.map(buildRecipeSection).join("")}</body></html>`;
    const iframe = document.createElement("iframe");
    iframe.style.cssText = "position:fixed;right:0;bottom:0;width:0;height:0;border:0;";
    document.body.appendChild(iframe);
    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) { alert("Impossible d'ouvrir l'impression PDF."); iframe.remove(); return; }
    iframeWindow.document.open();
    iframeWindow.document.write(content);
    iframeWindow.document.close();
    iframeWindow.document.title = "Recettes - Export PDF";
    setTimeout(() => {
      iframeWindow.focus();
      iframeWindow.print();
      setTimeout(() => iframe.remove(), 1000);
    }, 300);
  };

  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <AddIngredientModal isOpen={showAddIngredientModal} onClose={() => setShowAddIngredientModal(false)} onAdd={handleAddNewIngredient} suggestedName={currentIng.searchText} supplierSuggestions={supplierSuggestions} />
      <RecipeDetailModal recipe={detailRecipe} allRecipes={normalizedRecipes} ingredients={ingredients} onUpdateIngredient={(updated) => setIngredients(ingredients.map(i => i.id === updated.id ? updated : i))} isOpen={!!detailRecipe} onClose={() => setDetailRecipe(null)} isChef={isChef} />
      <AdaptModal recipe={adaptRecipe} recipes={normalizedRecipes} ingredients={ingredients} isOpen={!!adaptRecipe} onClose={() => setAdaptRecipe(null)} isChef={isChef} />
      <IngredientAllergenesModal
        ingredient={ingredients.find(i => i.id === allergenesModalIngId) || null}
        isOpen={allergenesModalIngId !== null}
        onClose={() => setAllergenesModalIngId(null)}
        onSave={(updated) => { setIngredients(ingredients.map(i => i.id === updated.id ? updated : i)); setAllergenesModalIngId(null); }}
      />

      <div className="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 mb-6">
        <div>
          <h2 className="text-2xl font-bold text-[#1A3A4A]">{sectionType === "base" ? "Recettes de base" : "Recettes finales"}</h2>
          <p className="text-sm text-gray-500 mt-1">{sectionType === "base" ? "Création et gestion des préparations techniques." : "Création et gestion des plats finaux assemblés."}</p>
        </div>
        {isChef && <button onClick={() => setShowForm(!showForm)} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg">{sectionType === "base" ? "+ Nouvelle recette de base" : "+ Nouvelle recette finale"}</button>}
      </div>

      {!showForm && (
        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-6 space-y-4">
          <input type="text" placeholder={`Rechercher ${sectionType === "base" ? "une recette de base" : "une recette finale"}...`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-3 rounded-lg border border-gray-300" />
          <div className="flex flex-wrap gap-2">
          {["Tous", ...SERVICE_CATEGORIES].map(cat => (
            <button key={cat} onClick={() => setCategoryFilter(cat)} className={`px-3 py-2 rounded-full text-sm ${categoryFilter === cat ? "bg-[#C8956C] text-white" : "bg-amber-50 text-[#7b5a42]"}`}>{cat}</button>
          ))}
          </div>
        </div>
      )}

      {showForm && (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-slate-100 space-y-6">
          <h3 className="text-lg font-semibold text-[#1A3A4A]">{editingId ? (sectionType === "base" ? "Modifier la recette de base" : "Modifier la recette finale") : (sectionType === "base" ? "Nouvelle recette de base" : "Nouvelle recette finale")}</h3>
          <p className="text-sm text-gray-500">{sectionType === "base" ? "Ce formulaire est dédié aux recettes de base." : "Ce formulaire est dédié aux recettes finales et permet d'ajouter des recettes de base."}</p>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Type</label>
              <select value={formData.recipeType} onChange={(e) => setFormData({ ...formData, recipeType: e.target.value, baseComponents: e.target.value === "base" ? [] : formData.baseComponents, outputUnit: e.target.value === "final" ? "Portion" : formData.outputUnit })} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                {RECIPE_TYPE_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
              </select>
            </div>
            <div className="md:col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Nom</label><input type="text" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
          </div>

          <div className={`grid grid-cols-1 ${formData.recipeType === "base" ? "md:grid-cols-2" : "md:grid-cols-1"} gap-4`}>
            {formData.recipeType === "base" && (
              <div className="bg-amber-50/40 border border-amber-100 rounded-lg p-4">
                <h4 className="text-sm font-semibold text-[#1A3A4A] mb-3">Rendement quantité</h4>
                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div><label className="block text-sm font-medium text-gray-700 mb-1">Rendement produit</label><input type="number" min="0.01" step="0.01" value={formData.outputQuantity} onChange={(e) => setFormData({ ...formData, outputQuantity: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
                  <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité de rendement</label><select value={formData.outputUnit} onChange={(e) => setFormData({ ...formData, outputUnit: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300">{orderUnitsForDisplay([...DISPLAY_YIELD_UNITS, formData.outputUnit]).map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
                </div>
                <div className="mt-3 text-sm">
                  {theoreticalYield ? (
                    <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                      <span className="text-[#1A3A4A]">Rendement théorique calculé : {formatDecimal(theoreticalYield.quantity)} {theoreticalYield.unit}</span>
                      <button
                        type="button"
                        onClick={() => setFormData({ ...formData, outputQuantity: Number(theoreticalYield.quantity), outputUnit: theoreticalYield.unit })}
                        className="px-3 py-1.5 rounded-lg bg-[#1A3A4A] text-white text-xs font-medium hover:bg-[#16303d]"
                      >
                        Utiliser ce rendement
                      </button>
                    </div>
                  ) : (
                    <span className="text-gray-600">Rendement théorique non calculable automatiquement : unités incompatibles</span>
                  )}
                </div>
              </div>
            )}
            <div className="bg-slate-50 border border-slate-200 rounded-lg p-4">
              <h4 className="text-sm font-semibold text-[#1A3A4A] mb-3">Rendement portions/couverts</h4>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Couverts (1 couvert = 1 portion)</label><input type="text" inputMode="decimal" value={formData.covers} onChange={(e) => setFormData({ ...formData, covers: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">Sous-catégories d'affichage</label>
            <div className="flex flex-wrap gap-3">
              {SERVICE_CATEGORIES.map(cat => (
                <label key={cat} className={`px-3 py-2 rounded-lg border cursor-pointer ${formData.categories.includes(cat) ? "bg-[#C8956C] text-white border-[#C8956C]" : "bg-white text-gray-700 border-gray-300"}`}>
                  <input type="checkbox" className="hidden" checked={formData.categories.includes(cat)} onChange={() => toggleRecipeCategory(cat)} />
                  {cat}
                </label>
              ))}
            </div>
          </div>

          <div className="bg-gray-50 rounded-lg p-4 border border-gray-200">
            <h4 className="font-medium text-gray-700 mb-3">Ingrédients directs</h4>
            <div className="relative mb-3">

                  {recipe.recipeType === "final" && <p>{recipe.baseComponents.length} recette(s) de base liée(s)</p>}
                  <p>{recipe.recipeType === "base" ? `Rendement : ${recipe.outputQuantity} ${recipe.outputUnit} • ${recipe.covers} couverts` : `${recipe.covers} couverts`}</p>
                  {isChef && (costStatus.valid ? <p className="text-lg font-bold text-[#C8956C]">{Number(totalCost || 0).toFixed(2)}€ <span className="text-sm font-normal text-gray-500 ml-2">({recipe.covers > 0 ? (Number(totalCost || 0) / recipe.covers).toFixed(2) : "0.00"}€/couvert)</span></p> : <p className="text-sm text-red-600 font-medium">Coût indisponible</p>)}
                  {(() => { const { allergens, hasIncomplete } = computeRecipeAllergeneSummary(recipe, ingredients, normalizedRecipes); return (<div className="mt-1">{allergens.length > 0 && <p className="text-red-800 font-medium text-xs">Allergènes : {allergens.join(" · ")}</p>}{hasIncomplete && <p className={`text-amber-500 text-xs italic ${selectionMode ? "" : "cursor-pointer hover:underline"}`} onClick={selectionMode ? undefined : () => setDetailRecipe(recipe)}>⚠ Allergènes incomplets — cliquer pour compléter</p>}{!hasIncomplete && allergens.length === 0 && <p className="text-green-600 text-xs">Aucun allergène</p>}</div>); })()}
                </div>
                {!selectionMode && (
                  <div className="flex space-x-2">
                    <button onClick={() => setDetailRecipe(recipe)} className="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium">Voir détail</button>
                    <button onClick={() => setAdaptRecipe(recipe)} className="flex-1 bg-[#C8956C] bg-opacity-10 text-[#C8956C] py-2 rounded-lg text-sm font-medium">Adapter / Imprimer</button>
                    {isChef && <><button onClick={() => handleEdit(recipe)} className="p-2 text-gray-600 bg-gray-50 rounded-lg">✎</button><button onClick={() => window.confirm("Supprimer cette recette ?") && setRecipes(recipes.filter(r => Number(r.id) !== Number(recipe.id)))} className="p-2 text-gray-600 bg-gray-50 rounded-lg">🗑</button></>}
                  </div>
                )}
              </div>
            </div>
          );
          })}
        </div>
      )}
    </div>
  );
};


const ProducersView = ({ ingredients, setIngredients, suppliersRuntime, suppliers, setSuppliers, isChef }) => {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const emptySupplierForm = { name: "", phone: "", email: "", address: "", contact: "", notes: "" };
  const [formData, setFormData] = useState(emptySupplierForm);

  const runtimeSuppliers = suppliersRuntime?.canaryActive
    ? (suppliersRuntime.data || [])
    : Array.from(new Set((ingredients || []).map((ing) => (ing.supplier || "").trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b, "fr"));

  const normalizedSuppliers = useMemo(() => {
    const existing = Array.isArray(suppliers) ? suppliers : [];
    const mappedExisting = existing.map((s, idx) => {
      if (typeof s === "string") {
        return { id: `legacy-${idx}-${s}`, name: s.trim(), phone: "", email: "", address: "", contact: "", notes: "", source: "legacy_list" };
      }
      return {
        id: s.id ?? `supplier-${idx}`,
        name: String(s.name || s.nom || "").trim(),
        phone: String(s.phone || "").trim(),
        email: String(s.email || "").trim(),
        address: String(s.address || "").trim(),
        contact: String(s.contact || "").trim(),
        notes: String(s.notes || "").trim(),
        source: "managed",
      };
    }).filter((s) => s.name);

    const merged = new Map(mappedExisting.map((s) => [s.name.toLocaleLowerCase("fr"), s]));
    for (const runtimeName of runtimeSuppliers) {
      const trimmed = String(runtimeName || "").trim();
      if (!trimmed) continue;
      const key = trimmed.toLocaleLowerCase("fr");
      if (!merged.has(key)) {
        merged.set(key, { id: `runtime-${key}`, name: trimmed, phone: "", email: "", address: "", contact: "", notes: "", source: "runtime" });
      }
    }

    return Array.from(merged.values()).sort((a, b) => a.name.localeCompare(b.name, "fr"));

  const resetForm = () => {
    setFormData(emptySupplierForm);

      email: String(formData.email || "").trim(),
      address: String(formData.address || "").trim(),
      contact: String(formData.contact || "").trim(),

          phone: String(s.phone || "").trim(),

    const hasExisting = managedSuppliers.some((s) => String(s.id) === String(editingId));

        : [...managedSuppliers, payload])

    setSuppliers(next);

// ─── Section Export / Import ─────────────────────────────────────────────────
const ExportImportSection = ({ config, ingredients, recipes, suppliers, onImport, onMerge }) => {
  // --- État import (remplacer) ---
  const [importStep, setImportStep] = useState("idle"); // idle | preview | error
  const [importPreview, setImportPreview] = useState(null);
  const [importErrors, setImportErrors] = useState([]);

  // --- État fusion ---
  const [mergeStep, setMergeStep] = useState("idle"); // idle | preview | error
  const [mergeAnalysis, setMergeAnalysis] = useState(null);
  const [mergeErrors, setMergeErrors] = useState([]);
  const [selectedRecipes, setSelectedRecipes] = useState([]);
  const [selectedIngredients, setSelectedIngredients] = useState([]);

  const formatDate = (iso) => {
    if (!iso) return "date inconnue";
    try { return new Date(iso).toLocaleDateString("fr-FR", { day: "2-digit", month: "long", year: "numeric" }); }
    catch { return iso; }
  };

  const formatPrice = (p) => {
    const n = Number(p);
    return Number.isFinite(n) && n > 0 ? n.toLocaleString("fr-FR", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + " €" : (p != null ? String(p) : "—");
  };

  // Télécharge un fichier JSON contenant toutes les données du restaurant.
  const handleExport = () => {
    const payload = buildExportPayload({
      restaurantName: config?.restaurantName || "",
      ingredients,
      recipes,
      suppliers,
    });
    const json = JSON.stringify(payload, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const date = new Date().toISOString().slice(0, 10);
    const name = (config?.restaurantName || "restaurant").replace(/\s+/g, "-").toLowerCase();
    a.href = url;
    a.download = `sauvegarde-${name}-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  // --- Handlers import (remplacer) ---
  const handleFileSelect = (e) => {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const result = parseImportPayload(ev.target.result);
      if (!result.valid) {
        setImportErrors(result.errors);
        setImportPreview(null);
        setImportStep("error");
      } else {
        setImportPreview(result.data);
        setImportErrors([]);
        setImportStep("preview");
      }
    };
    reader.readAsText(file);
  };

  const handleConfirmImport = () => {
    if (!importPreview) return;
    onImport(importPreview);
    setImportStep("idle");
    setImportPreview(null);
  };

  const handleCancelImport = () => {
    setImportStep("idle");
    setImportPreview(null);
    setImportErrors([]);
  };

  // --- Handlers fusion ---
  const handleMergeFileSelect = (e) => {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const result = parseImportPayload(ev.target.result);
      if (!result.valid) {
        setMergeErrors(result.errors);
        setMergeAnalysis(null);
        setMergeStep("error");
        return;
      }
      const imported = result.data;
      const analysis = analyzeMerge({
        importedData: imported,
        existingIngredients: ingredients,
        existingRecipes: recipes,
        existingSuppliers: suppliers,
      });
      setMergeAnalysis(analysis);
      setSelectedRecipes([]);
      setSelectedIngredients([]);
      setMergeErrors([]);
      setMergeStep("preview");
    };
    reader.readAsText(file);
  };

  const handleConfirmMerge = () => {
    if (!mergeAnalysis) return;
    const merged = applyMerge({
      analysis: mergeAnalysis,
      selectedRecipeNames: selectedRecipes,
      selectedIngredientNames: selectedIngredients,
      existingIngredients: ingredients,
      existingRecipes: recipes,
      existingSuppliers: suppliers,
    });
    onMerge(merged);
    setMergeStep("idle");
    setMergeAnalysis(null);
    setSelectedRecipes([]);
    setSelectedIngredients([]);
  };

  const handleCancelMerge = () => {
    setMergeStep("idle");
    setMergeAnalysis(null);
    setMergeErrors([]);
    setSelectedRecipes([]);
    setSelectedIngredients([]);
  };

  const toggleRecipe = (name) => setSelectedRecipes(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);
  const toggleIngredient = (name) => setSelectedIngredients(prev => prev.includes(name) ? prev.filter(n => n !== name) : [...prev, name]);

  const toggleAllRecipes = () => {
    const all = mergeAnalysis ? mergeAnalysis.recipeConflicts.map(c => c.imported.name) : [];
    setSelectedRecipes(selectedRecipes.length === all.length ? [] : all);
  };
  const toggleAllIngredients = () => {
    const all = mergeAnalysis ? mergeAnalysis.ingredientConflicts.map(c => c.imported.name) : [];
    setSelectedIngredients(selectedIngredients.length === all.length ? [] : all);
  };

  // Valeurs dérivées pour l'aperçu de fusion
  const mergeNewIngredients = mergeAnalysis?.newIngredients || [];
  const mergeIngConflicts = mergeAnalysis?.ingredientConflicts || [];
  const mergeNewRecipes = mergeAnalysis?.newRecipes || [];
  const mergeRecipeConflicts = mergeAnalysis?.recipeConflicts || [];
  const mergeNewSuppliers = mergeAnalysis?.newSuppliers || [];
  const mergeHasAnything = mergeNewIngredients.length > 0 || mergeNewRecipes.length > 0 || mergeNewSuppliers.length > 0 || mergeRecipeConflicts.length > 0 || mergeIngConflicts.length > 0;
  const allRecipesChecked = mergeRecipeConflicts.length > 0 && selectedRecipes.length === mergeRecipeConflicts.length;
  const allIngChecked = mergeIngConflicts.length > 0 && selectedIngredients.length === mergeIngConflicts.length;

  return (
    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
      <h3 className="text-lg font-semibold text-[#1A3A4A] mb-1">💾 Sauvegarde des données</h3>
      <p className="text-sm text-gray-500 mb-6">
        Vos données sont stockées dans ce navigateur. Téléchargez régulièrement une copie pour ne rien perdre.
      </p>

      {/* Export */}
      <div className="mb-6 pb-6 border-b border-gray-100">
        <p className="text-sm font-medium text-gray-700 mb-1">Télécharger une sauvegarde</p>
        <p className="text-xs text-gray-500 mb-3">
          {ingredients.length} ingrédient{ingredients.length !== 1 ? "s" : ""} · {recipes.length} recette{recipes.length !== 1 ? "s" : ""} · {suppliers.length} fournisseur{suppliers.length !== 1 ? "s" : ""}
        </p>
        <button onClick={handleExport}
          className="px-5 py-2 bg-[#1A3A4A] text-white rounded-lg text-sm font-medium hover:bg-[#2A4A5A] transition-colors">
          ⬇ Télécharger la sauvegarde
        </button>
      </div>

      {/* Fusionner */}
      <div className="mb-6 pb-6 border-b border-gray-100">
        <p className="text-sm font-medium text-gray-700 mb-1">Fusionner avec une sauvegarde</p>
        <p className="text-xs text-gray-500 mb-3">
          Ajoute les nouvelles données sans écraser l'existant. Idéal pour rassembler le travail de l'équipe.
        </p>

        {mergeStep === "idle" && (
          <label className="cursor-pointer inline-block px-5 py-2 border border-[#1A3A4A] text-[#1A3A4A] rounded-lg text-sm font-medium hover:bg-[#1A3A4A]/5 transition-colors">
            🔀 Choisir un fichier à fusionner
            <input type="file" accept=".json,application/json" onChange={handleMergeFileSelect} className="hidden" />
          </label>
        )}

        {mergeStep === "error" && (
          <div className="bg-red-50 border border-red-200 rounded-lg p-4">
            <p className="text-sm font-semibold text-red-700 mb-2">Fichier invalide</p>
            <ul className="list-disc list-inside space-y-1">
              {mergeErrors.map((err, i) => (
                <li key={i} className="text-sm text-red-600">{err}</li>
              ))}
            </ul>
            <button onClick={handleCancelMerge} className="mt-3 text-sm text-gray-500 hover:text-gray-700 underline">
              Réessayer
            </button>
          </div>
        )}

        {mergeStep === "preview" && mergeAnalysis && (
          <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 space-y-4">
            <p className="text-sm font-semibold text-blue-800">Aperçu de la fusion</p>
            {mergeAnalysis.exportedAt && (
              <p className="text-xs text-blue-600">📅 Sauvegarde du : {formatDate(mergeAnalysis.exportedAt)}</p>
            )}

            {!mergeHasAnything && (
              <p className="text-sm text-gray-600 italic">Aucune donnée nouvelle — tout est déjà présent.</p>
            )}

            {(mergeNewIngredients.length > 0 || mergeNewRecipes.length > 0 || mergeNewSuppliers.length > 0) && (
              <div className="bg-green-50 border border-green-200 rounded-lg p-3">
                <p className="text-xs font-semibold text-green-800 mb-1">✅ Ajouts automatiques (sans conflit)</p>
                <ul className="text-xs text-green-700 space-y-0.5">
                  {mergeNewIngredients.length > 0 && <li>• {mergeNewIngredients.length} nouvel{mergeNewIngredients.length > 1 ? "s" : ""} ingrédient{mergeNewIngredients.length > 1 ? "s" : ""}</li>}
                  {mergeNewRecipes.length > 0 && <li>• {mergeNewRecipes.length} nouvelle{mergeNewRecipes.length > 1 ? "s" : ""} recette{mergeNewRecipes.length > 1 ? "s" : ""}</li>}
                  {mergeNewSuppliers.length > 0 && <li>• {mergeNewSuppliers.length} nouveau{mergeNewSuppliers.length > 1 ? "x" : ""} fournisseur{mergeNewSuppliers.length > 1 ? "s" : ""}</li>}
                </ul>
              </div>
            )}

            {mergeRecipeConflicts.length > 0 && (
              <div>
                <p className="text-xs font-semibold text-amber-800 mb-2">⚠ Recettes déjà existantes — cochez celles à remplacer :</p>
                <label className="flex items-center gap-2 text-xs text-gray-700 mb-2 cursor-pointer font-medium">
                  <input type="checkbox" checked={allRecipesChecked} onChange={toggleAllRecipes} className="w-4 h-4" />
                  Tout sélectionner / désélectionner
                </label>
                <div className="space-y-1 max-h-48 overflow-y-auto">
                  {mergeRecipeConflicts.map(({ imported: imp }) => (
                    <label key={imp.name} className="flex items-center gap-2 text-xs text-gray-700 cursor-pointer hover:bg-white/60 rounded px-1 py-0.5">
                      <input type="checkbox" checked={selectedRecipes.includes(imp.name)} onChange={() => toggleRecipe(imp.name)} className="w-4 h-4" />
                      {imp.name}
                    </label>
                  ))}
                </div>
              </div>
            )}

            {mergeIngConflicts.length > 0 && (
              <div>
                <p className="text-xs font-semibold text-amber-800 mb-2">⚠ Ingrédients avec prix ou fournisseur différent — cochez ceux à mettre à jour :</p>
                <label className="flex items-center gap-2 text-xs text-gray-700 mb-2 cursor-pointer font-medium">
                  <input type="checkbox" checked={allIngChecked} onChange={toggleAllIngredients} className="w-4 h-4" />
                  Tout sélectionner / désélectionner
                </label>
                <div className="space-y-1 max-h-48 overflow-y-auto">
                  {mergeIngConflicts.map(({ imported: imp, existing: ex }) => (
                    <label key={imp.name} className="flex items-start gap-2 text-xs text-gray-700 cursor-pointer hover:bg-white/60 rounded px-1 py-0.5">
                      <input type="checkbox" checked={selectedIngredients.includes(imp.name)} onChange={() => toggleIngredient(imp.name)} className="w-4 h-4 mt-0.5 shrink-0" />
                      <span>
                        <strong>{imp.name}</strong>
                        {String(ex.price ?? "") !== String(imp.price ?? "") && (
                          <span className="text-gray-500"> · Prix : {formatPrice(ex.price)} → {formatPrice(imp.price)}</span>
                        )}
                        {normalizeMergeName(String(ex.supplier || "")) !== normalizeMergeName(String(imp.supplier || "")) && (
                          <span className="text-gray-500"> · Fournisseur : {ex.supplier || "—"} → {imp.supplier || "—"}</span>
                        )}
                      </span>
                    </label>
                  ))}
                </div>
              </div>
            )}

            <div className="flex gap-3 pt-2">
              <button onClick={handleConfirmMerge}
                className="px-5 py-2 bg-[#1A3A4A] text-white rounded-lg text-sm font-medium hover:bg-[#2A4A5A] transition-colors">
                Fusionner
              </button>
              <button onClick={handleCancelMerge}
                className="px-5 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-300 transition-colors">
                Annuler
              </button>
            </div>
          </div>
        )}
      </div>

      {/* Import (Restaurer / Remplacer) */}
      <div>
        <p className="text-sm font-medium text-gray-700 mb-1">Restaurer une sauvegarde</p>
        <p className="text-xs text-gray-500 mb-3">
          ⚠ Cette action remplacera <strong>toutes vos données actuelles</strong>. Elle est irréversible.
        </p>

        {importStep === "idle" && (
          <label className="cursor-pointer inline-block px-5 py-2 border border-gray-300 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-50 transition-colors">
            ⬆ Choisir un fichier de sauvegarde
            <input type="file" accept=".json,application/json" onChange={handleFileSelect} className="hidden" />
          </label>
        )}

        {importStep === "error" && (
          <div className="bg-red-50 border border-red-200 rounded-lg p-4">
            <p className="text-sm font-semibold text-red-700 mb-2">Fichier invalide</p>
            <ul className="list-disc list-inside space-y-1">
              {importErrors.map((err, i) => (
                <li key={i} className="text-sm text-red-600">{err}</li>
              ))}
            </ul>
            <button onClick={handleCancelImport} className="mt-3 text-sm text-gray-500 hover:text-gray-700 underline">
              Réessayer
            </button>
          </div>
        )}

        {importStep === "preview" && importPreview && (
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-4">
            <p className="text-sm font-semibold text-amber-800 mb-2">Confirmer la restauration ?</p>
            <div className="text-sm text-amber-700 space-y-1 mb-4">
              {importPreview.restaurantName && (
                <p>🍽 Restaurant : <strong>{importPreview.restaurantName}</strong></p>
              )}
              <p>📅 Sauvegarde du : <strong>{formatDate(importPreview.exportedAt)}</strong></p>
              <p>Contient : <strong>{importPreview.ingredients.length}</strong> ingrédients · <strong>{importPreview.recipes.length}</strong> recettes · <strong>{importPreview.suppliers.length}</strong> fournisseurs</p>
              <p className="text-xs text-amber-600 mt-2">Vos données actuelles seront définitivement remplacées.</p>
            </div>
            <div className="flex gap-3">
              <button onClick={handleConfirmImport}
                className="px-5 py-2 bg-red-700 text-white rounded-lg text-sm font-medium hover:bg-red-800 transition-colors">
                Oui, restaurer ces données
              </button>
              <button onClick={handleCancelImport}
                className="px-5 py-2 bg-gray-200 text-gray-700 rounded-lg text-sm font-medium hover:bg-gray-300 transition-colors">
                Annuler
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const ParametresView = ({ restaurantLogo, onLogoChange, config, onConfigChange, ingredients, recipes, suppliers, onImport, onMerge }) => {
  // --- Logo ---
  const handleFileChange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith("image/")) { alert("Veuillez sélectionner un fichier image (JPG, PNG, SVG, WebP)."); return; }
    if (file.size > 2 * 1024 * 1024) { alert("Image trop grande. Taille maximum : 2 Mo."); return; }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const base64 = ev.target.result;
      window.localStorage.setItem("arpege_restaurant_logo", base64);
      onLogoChange(base64);
    };
    reader.readAsDataURL(file);
  };
  const handleReset = () => { window.localStorage.removeItem("arpege_restaurant_logo"); onLogoChange(null); };

  // --- Nom du restaurant ---
  const [restaurantName, setRestaurantName] = useState(config?.restaurantName || "");
  const [nameSuccess, setNameSuccess] = useState(false);
  const handleSaveName = () => {
    if (!restaurantName.trim()) return;
    const newConfig = { ...config, restaurantName: restaurantName.trim() };
    saveConfig(newConfig);
    onConfigChange(newConfig);
    setNameSuccess(true);
    setTimeout(() => setNameSuccess(false), 3000);
  };

  // --- Email chef ---
  const [chefEmail, setChefEmail] = useState(config?.chefEmail || "");
  const [emailError, setEmailError] = useState("");
  const [emailSuccess, setEmailSuccess] = useState(false);
  const handleSaveEmail = () => {
    setEmailError("");
    if (!chefEmail.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(chefEmail.trim())) {
      setEmailError("Veuillez entrer une adresse email valide.");
      return;
    }
    const newConfig = { ...config, chefEmail: chefEmail.trim().toLowerCase() };
    saveConfig(newConfig);
    onConfigChange(newConfig);
    setEmailSuccess(true);
    setTimeout(() => setEmailSuccess(false), 3000);
  };

  // --- Mot de passe Chef ---
  const [chefCurrent, setChefCurrent] = useState("");
  const [chefNew, setChefNew] = useState("");
  const [chefConfirm, setChefConfirm] = useState("");
  const [chefError, setChefError] = useState("");
  const [chefSuccess, setChefSuccess] = useState(false);
  const [chefLoading, setChefLoading] = useState(false);
  const handleChangeChefPassword = async (e) => {
    e.preventDefault();
    setChefError(""); setChefSuccess(false);
    if (chefNew.length < 6) { setChefError("Le nouveau mot de passe doit contenir au moins 6 caractères."); return; }
    if (chefNew !== chefConfirm) { setChefError("Les deux mots de passe ne correspondent pas."); return; }
    setChefLoading(true);
    try {
      const currentHash = await hashPassword(chefCurrent);
      if (currentHash !== config.chefPasswordHash) { setChefError("Mot de passe actuel incorrect."); setChefLoading(false); return; }
      const newHash = await hashPassword(chefNew);
      const newConfig = { ...config, chefPasswordHash: newHash };
      saveConfig(newConfig); onConfigChange(newConfig);
      setChefCurrent(""); setChefNew(""); setChefConfirm("");
      setChefSuccess(true); setTimeout(() => setChefSuccess(false), 3000);
    } catch { setChefError("Erreur lors du changement. Réessayez."); }
    finally { setChefLoading(false); }
  };

  // --- Mot de passe Employé ---
  const [employeNew, setEmployeNew] = useState("");
  const [employeConfirm, setEmployeConfirm] = useState("");
  const [employeError, setEmployeError] = useState("");
  const [employeSuccess, setEmployeSuccess] = useState(false);
  const [employeLoading, setEmployeLoading] = useState(false);
  const handleChangeEmployePassword = async (e) => {
    e.preventDefault();
    setEmployeError(""); setEmployeSuccess(false);
    if (employeNew.length < 6) { setEmployeError("Le nouveau mot de passe doit contenir au moins 6 caractères."); return; }
    if (employeNew !== employeConfirm) { setEmployeError("Les deux mots de passe ne correspondent pas."); return; }
    setEmployeLoading(true);
    try {
      const newHash = await hashPassword(employeNew);
      const newConfig = { ...config, employePasswordHash: newHash };
      saveConfig(newConfig); onConfigChange(newConfig);
      setEmployeNew(""); setEmployeConfirm("");
      setEmployeSuccess(true); setTimeout(() => setEmployeSuccess(false), 3000);
    } catch { setEmployeError("Erreur lors du changement. Réessayez."); }
    finally { setEmployeLoading(false); }
  };

  return (
    <div className="max-w-2xl mx-auto px-4 py-8 space-y-6">
      <h2 className="text-2xl font-bold text-[#1A3A4A]">Paramètres</h2>

      {/* Nom du restaurant */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h3 className="text-lg font-semibold text-[#1A3A4A] mb-1">Nom du restaurant</h3>
        <p className="text-sm text-gray-500 mb-4">Affiché sur l'écran de connexion et dans la barre de navigation.</p>
        <div className="flex gap-3">
          <input type="text" value={restaurantName} onChange={(e) => setRestaurantName(e.target.value)}
            className="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent"
            placeholder="Nom du restaurant" />
          <button onClick={handleSaveName} disabled={!restaurantName.trim()}
            className="px-5 py-2 bg-[#1A3A4A] text-white rounded-lg text-sm font-medium hover:bg-[#2A4A5A] disabled:opacity-40 transition-colors">
            Enregistrer
          </button>
        </div>
        {nameSuccess && <p className="text-sm text-green-600 mt-2">✓ Nom mis à jour.</p>}
      </div>

      {/* Email chef */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h3 className="text-lg font-semibold text-[#1A3A4A] mb-1">📧 Email du chef</h3>
        <p className="text-sm text-gray-500 mb-4">
          Utilisé pour recevoir votre code de récupération en cas d'oubli du mot de passe.
          {!config?.chefEmail && (
            <span className="block mt-1 text-amber-600 font-medium">⚠ Aucun email enregistré — la récupération de mot de passe ne fonctionnera pas sans ça.</span>
          )}
        </p>
        <div className="flex gap-3">
          <input type="email" value={chefEmail} onChange={(e) => setChefEmail(e.target.value)}
            className="flex-1 px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent"
            placeholder="chef@monrestaurant.fr" />
          <button onClick={handleSaveEmail}
            className="px-5 py-2 bg-[#1A3A4A] text-white rounded-lg text-sm font-medium hover:bg-[#2A4A5A] transition-colors">
            Enregistrer
          </button>
        </div>
        {emailError && <p className="text-sm text-red-600 mt-2">{emailError}</p>}
        {emailSuccess && <p className="text-sm text-green-600 mt-2">✓ Email enregistré.</p>}
      </div>

      {/* Logo du restaurant */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h3 className="text-lg font-semibold text-[#1A3A4A] mb-1">Logo du restaurant</h3>
        <p className="text-sm text-gray-500 mb-6">Formats acceptés : JPG, PNG, SVG, WebP — max 2 Mo.</p>
        <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 sm:gap-6">
          <div className="w-36 h-24 border border-gray-200 rounded-xl overflow-hidden flex items-center justify-center bg-gray-50 shrink-0">
            {restaurantLogo
              ? <img src={restaurantLogo} alt="Logo actuel" className="w-full h-full object-contain p-2" />
              : <span className="text-xs text-gray-400 text-center px-2">Aucun logo</span>}
          </div>
          <div className="flex flex-col gap-3">
            <label className="cursor-pointer bg-[#1A3A4A] text-white px-5 py-2.5 rounded-lg text-sm font-medium hover:bg-[#2A4A5A] transition-colors inline-block text-center">
              Choisir une image
              <input type="file" accept="image/*" onChange={handleFileChange} className="hidden" />
            </label>
            {restaurantLogo && (
              <button onClick={handleReset} className="text-sm text-red-500 hover:text-red-700 transition-colors text-left">
                Supprimer le logo
              </button>
            )}
          </div>
        </div>
      </div>

      {/* Changer mot de passe Chef */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h3 className="text-lg font-semibold text-[#1A3A4A] mb-1">👨‍🍳 Mot de passe Chef</h3>
        <p className="text-sm text-gray-500 mb-4">Saisissez votre mot de passe actuel pour le modifier.</p>
        <form onSubmit={handleChangeChefPassword} className="space-y-3">
          <input type="password" value={chefCurrent} onChange={(e) => setChefCurrent(e.target.value)}
            className="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
            placeholder="Mot de passe actuel" required />
          <input type="password" value={chefNew} onChange={(e) => setChefNew(e.target.value)}
            className="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
            placeholder="Nouveau mot de passe (min. 6 caractères)" required />
          <input type="password" value={chefConfirm} onChange={(e) => setChefConfirm(e.target.value)}
            className="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
            placeholder="Confirmer le nouveau mot de passe" required />
          {chefError && <p className="text-sm text-red-600">{chefError}</p>}
          {chefSuccess && <p className="text-sm text-green-600">✓ Mot de passe Chef mis à jour.</p>}
          <button type="submit" disabled={chefLoading}
            className="px-5 py-2 bg-[#1A3A4A] text-white rounded-lg text-sm font-medium hover:bg-[#2A4A5A] disabled:opacity-40 transition-colors">
            {chefLoading ? "Mise à jour…" : "Changer le mot de passe"}
          </button>
        </form>
      </div>

      {/* Changer mot de passe Employé */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6">
        <h3 className="text-lg font-semibold text-[#1A3A4A] mb-1">👤 Mot de passe Employé</h3>
        <p className="text-sm text-gray-500 mb-4">En tant que chef, vous pouvez redéfinir le mot de passe employé sans connaître l'ancien.</p>
        <form onSubmit={handleChangeEmployePassword} className="space-y-3">
          <input type="password" value={employeNew} onChange={(e) => setEmployeNew(e.target.value)}
            className="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
            placeholder="Nouveau mot de passe employé (min. 6 caractères)" required />
          <input type="password" value={employeConfirm} onChange={(e) => setEmployeConfirm(e.target.value)}
            className="w-full px-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
            placeholder="Confirmer le nouveau mot de passe" required />
          {employeError && <p className="text-sm text-red-600">{employeError}</p>}
          {employeSuccess && <p className="text-sm text-green-600">✓ Mot de passe Employé mis à jour.</p>}
          <button type="submit" disabled={employeLoading}
            className="px-5 py-2 bg-[#1A3A4A] text-white rounded-lg text-sm font-medium hover:bg-[#2A4A5A] disabled:opacity-40 transition-colors">
            {employeLoading ? "Mise à jour…" : "Changer le mot de passe employé"}
          </button>
        </form>
      </div>

      {/* Sauvegarde & restauration */}
      <ExportImportSection config={config} ingredients={ingredients} recipes={recipes} suppliers={suppliers}
        onImport={onImport} onMerge={onMerge} />
    </div>
  );
};

const App = () => {
  const [config, setConfig] = useState(() => getConfig());
  const [user, setUser] = useLocalStorage("arpege_user", null);
  // Consentement RGPD : null = pas encore choisi, "accepted" ou "declined"
  const [consent, setConsent] = useState(() => window.localStorage.getItem(CONSENT_KEY));

  useEffect(() => {
    if (consent === "accepted") loadGoogleAnalytics();
  }, [consent]);

  const handleAcceptConsent = () => {
    window.localStorage.setItem(CONSENT_KEY, "accepted");
    setConsent("accepted");
  };
  const handleDeclineConsent = () => {
    window.localStorage.setItem(CONSENT_KEY, "declined");
    setConsent("declined");
  };
  const [ingredients, setIngredients] = useLocalStorage("arpege_ingredients", INITIAL_INGREDIENTS);
  const [recipes, setRecipes] = useLocalStorage("arpege_recipes", INITIAL_RECIPES);
  const [suppliers, setSuppliers] = useLocalStorage("arpege_suppliers", []);
  const [activeTab, setActiveTab] = useState("ingredients");
  const [restaurantLogo, setRestaurantLogo] = useState(() => window.localStorage.getItem("arpege_restaurant_logo") || null);

  useEffect(() => {
    if (window.localStorage.getItem("arpege_waste_pct_v2")) return;
    try {
      const rawRecipes = window.localStorage.getItem("arpege_recipes");
      if (rawRecipes) {
        const parsed = JSON.parse(rawRecipes);
        const migrated = parsed.map((r) => ({
          ...r,
          wasteCoeff: Math.round((Number(r.wasteCoeff || 1) - 1) * 100 * 10) / 10,
          directIngredients: (r.directIngredients || []).map((l) => ({
            ...l,
            wasteCoeff: Math.round((Number(l.wasteCoeff || 1) - 1) * 100 * 10) / 10,
          })),
        }));
        window.localStorage.setItem("arpege_recipes", JSON.stringify(migrated));
        setRecipes(migrated);
      }
      window.localStorage.setItem("arpege_waste_pct_v2", "1");
    } catch (e) {
      console.error("[Migration wasteCoeff] Échec", e);
    }
  }, []);

  useEffect(() => {
    if (!window.ArpegeLegacyMigration || !window.ArpegeMigrationReport || !window.ArpegeVersionedStorage || !window.ArpegeParallelRead) return;
    try {
      const result = window.ArpegeLegacyMigration.migrateLegacyData({ ingredients, recipes });
      const shadowReport = window.ArpegeMigrationReport.buildMigrationReport(result);
      window.ArpegeMigrationReport.printMigrationReport(shadowReport);
      const persistResult = window.ArpegeVersionedStorage.persistVersionedData({ migrationResult: result, storage: window.localStorage });
      const writeReport = window.ArpegeVersionedStorage.buildWriteReport({ migrationResult: result, persistResult });
      const v1Data = window.ArpegeParallelRead.readV1Data(window.localStorage);
      const crossCheckReport = window.ArpegeParallelRead.buildCrossCheckReport({ legacyData: { ingredients, recipes }, migrationResult: result, v1Data });
      const switchReadiness = window.ArpegeParallelRead.evaluateSwitchReadiness(crossCheckReport);
      const featureFlags = window.ArpegeParallelRead.getFeatureFlags(window.localStorage);
      window.__ARPEGE_SHADOW_MIGRATION__ = { result, shadowReport };
      window.__ARPEGE_V1_WRITE_REPORT__ = writeReport;
      window.__ARPEGE_V1_CROSS_CHECK_REPORT__ = crossCheckReport;
      window.__ARPEGE_V1_SWITCH_READINESS__ = switchReadiness;
      window.__ARPEGE_FEATURE_FLAGS__ = featureFlags;
    } catch (error) {
      console.error("[Shadow Migration] Échec de la migration en mémoire", error);
    }
  }, [ingredients, recipes]);

  // Premier lancement : aucune configuration trouvée → écran de setup
  if (!config) return <SetupScreen onComplete={(newConfig) => { setConfig(newConfig); setUser(null); }} />;
  // Configuration présente mais pas connecté → écran de login
  if (!user) return <Login onLogin={setUser} restaurantName={config.restaurantName} />;
  const isChef = user.role === "chef";
  const suppliersRuntime = window.ArpegeRuntimeDataSource
    ? window.ArpegeRuntimeDataSource.resolveDataSourcesRuntime({
        legacyIngredients: ingredients,
        storage: window.localStorage,
        crossCheckReport: window.__ARPEGE_V1_CROSS_CHECK_REPORT__ || null,
        switchReadiness: window.__ARPEGE_V1_SWITCH_READINESS__ || { ready: false },
      }).suppliers
    : { source: "legacy", canaryActive: false, reason: "RUNTIME_DATA_SOURCE_UNAVAILABLE", data: [] };
  return (
    <div className="min-h-screen bg-gray-50">
      {consent === null && <ConsentBanner onAccept={handleAcceptConsent} onDecline={handleDeclineConsent} />}
      <Header user={user} onLogout={() => setUser(null)} activeTab={activeTab} setActiveTab={setActiveTab} restaurantLogo={restaurantLogo} restaurantName={config?.restaurantName} />
      <main className="pb-12">
        {activeTab === "ingredients" && <IngredientsManager ingredients={ingredients} setIngredients={setIngredients} suppliers={suppliers} setSuppliers={setSuppliers} isChef={isChef} />}
        {activeTab === "baseRecipes" && <RecipesManager ingredients={ingredients} setIngredients={setIngredients} recipes={recipes} setRecipes={setRecipes} isChef={isChef} sectionType="base" />}
        {activeTab === "finalRecipes" && <RecipesManager ingredients={ingredients} setIngredients={setIngredients} recipes={recipes} setRecipes={setRecipes} isChef={isChef} sectionType="final" />}
        {activeTab === "producers" && <ProducersView ingredients={ingredients} setIngredients={setIngredients} suppliersRuntime={suppliersRuntime} suppliers={suppliers} setSuppliers={setSuppliers} isChef={isChef} />}
        {activeTab === "couts" && isChef && <CostsView recipes={recipes} ingredients={ingredients} />}
        {activeTab === "parametres" && isChef && (
          <ParametresView
            restaurantLogo={restaurantLogo} onLogoChange={setRestaurantLogo}
            config={config} onConfigChange={setConfig}
            ingredients={ingredients} recipes={recipes} suppliers={suppliers}
            onImport={(data) => {
              setIngredients(data.ingredients);
              setRecipes(data.recipes);
              setSuppliers(data.suppliers);
            }}
            onMerge={(data) => {
              setIngredients(data.ingredients);
              setRecipes(data.recipes);
              setSuppliers(data.suppliers);
            }}
          />
        )}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
