<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L'Arpège - Gestion des Recettes</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .procedure-text { white-space: pre-wrap; line-height: 1.6; }
        .modal-overlay { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        // URL du logo (tu devras l'héberger sur GitHub aussi)
        const LOGO_URL = "https://github.com/venna61-pixel/arpege-recettes/blob/main/logo.png";
        
        // Composant Logo avec l'image officielle
        const LogoArpege = ({ className = "", size = "large" }) => {
            const isSmall = size === "small";
            
            return (
                <div className={`flex flex-col items-center ${className}`}>
                    <img 
                        src={LOGO_URL}
                        alt="L'Arpège - Cuisine Libre & Inspirée"
                        className={`object-contain ${isSmall ? 'h-12' : 'h-24'}`}
                        onError={(e) => {
                            // Fallback si l'image ne charge pas
                            e.target.style.display = 'none';
                            e.target.nextSibling.style.display = 'flex';
                        }}
                    />
                    {/* Fallback texte si l'image ne charge pas */}
                    <div className="hidden flex-col items-center">
                        <span className={`font-serif tracking-widest text-[#1A3A4A] ${isSmall ? 'text-lg' : 'text-3xl'}`}>
                            L'ARPÈGE
                        </span>
                        {!isSmall && (
                            <span className="text-xs tracking-[0.3em] text-gray-500 mt-1">
                                CUISINE LIBRE & INSPIRÉE
                            </span>
                        )}
                    </div>
                </div>
            );
        };

        const INITIAL_INGREDIENTS = [
            { id: 1, category: "Laitage", name: "Crème fraîche", price: 2.50, unit: "Litre", supplier: "Laiterie du Nord" },
            { id: 2, category: "Boucherie", name: "Filet de bœuf", price: 28.00, unit: "Kg", supplier: "Boucherie Martin" },
            { id: 3, category: "Légumes", name: "Carottes", price: 1.20, unit: "Kg", supplier: "Maraîcher Local" },
            { id: 4, category: "Épicerie", name: "Huile d'olive", price: 8.50, unit: "Litre", supplier: "Oliviers du Sud" },
            { id: 5, category: "Boulangerie", name: "Pain de campagne", price: 3.20, unit: "Pièce", supplier: "Boulangerie Dupont" }
        ];

        const INITIAL_RECIPES = [
            {
                id: 1,
                category: "Entrée",
                name: "Velouté de potiron",
                covers: 4,
                ingredients: [
                    { ingredientId: 3, name: "Carottes", quantity: 0.5, unit: "Kg", wasteCoeff: 1.0, pricePerUnit: 1.20, unitPrice: "Kg" },
                    { ingredientId: 1, name: "Crème fraîche", quantity: 0.2, unit: "Litre", wasteCoeff: 1.05, pricePerUnit: 2.50, unitPrice: "Litre" }
                ],
                procedure: "1. Éplucher et couper le potiron en dés\n2. Faire revenir les oignons dans du beurre\n3. Ajouter le potiron et couvrir d'eau\n4. Laisser mijoter 25 minutes\n5. Mixer et ajouter la crème\n6. Assaisonner et servir chaud",
                wasteCoeff: 1.05,
                totalCost: 2.12
            }
        ];

        const UNITS = [
            "Bac", "Bib", "Barquette", "Bidon", "Bobine", "Bocal", "Boîte", "Boîte 1/4", "Boîte 1/8", 
            "Boîte 2/1", "Boîte 3/1", "Boîte 3/4", "Boîte 4/4", "Boîte 5/1", "Bombe", "Botte", "Bouteille", 
            "Brick", "Coffret", "Colis", "Distribute", "Étui", "Flacon", "Fut", "Kg", "Lot", "Litre", "Pack", 
            "Pain", "Paire", "Paquet", "Pièce", "Plaque", "Plateau", "Poche", "Pot", "Rouleau", "Sac", "Sachet", 
            "Seau", "Tablette", "Terrine", "Tube", "Tubo", "Unité", "Carton", "Cl", "Part", "Portion", "Gramme", "Ml"
        ];

        const CATEGORIES_ING = ["Laitage", "Boucherie", "Charcuterie", "Poissonnerie", "Fruits", "Légumes", "Épicerie", "Boulangerie", "Boissons", "Condiments", "Herbes", "Épices"];
        const CATEGORIES_REC = ["Entrée", "Plat", "Dessert", "Amuse-bouche", "Soupe", "Salade", "Boisson"];

        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };

            return [storedValue, setValue];
        };

        const Login = ({ onLogin }) => {
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");

            const handleSubmit = (e) => {
                e.preventDefault();
                if (username === "chef" && password === "chef123") {
                    onLogin({ role: "chef", name: "Chef" });
                } else if (username === "employe" && password === "employe123") {
                    onLogin({ role: "employe", name: "Employé" });
                } else {
                    setError("Identifiants incorrects. Essayez chef/chef123 ou employe/employe123");
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-slate-50 via-white to-amber-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in border border-slate-100">
                        <div className="text-center mb-8">
                            <LogoArpege size="large" className="mb-6" />
                            <p className="text-gray-500 mt-2 italic text-lg">Gestion des Recettes</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Identifiant</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent transition-all"
                                    placeholder="chef ou employe"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent transition-all"
                                    placeholder="••••••••"
                                />
                            </div>
                            {error && (
                                <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                className="w-full bg-gradient-to-r from-[#1A3A4A] to-[#2A4A5A] text-white py-3 rounded-lg font-semibold hover:shadow-lg transform hover:-translate-y-0.5 transition-all"
                            >
                                Se connecter
                            </button>
                        </form>

                        <div className="mt-6 text-center text-sm text-gray-500">
                            <p>Comptes de démo :</p>
                            <p className="mt-1">Chef: chef / chef123</p>
                            <p>Employé: employe / employe123</p>
                        </div>
                    </div>
                </div>
            );
        };

        const Header = ({ user, onLogout, activeTab, setActiveTab }) => {
            const tabs = [
                { id: "recettes", label: "Recettes", roles: ["chef", "employe"] },
                { id: "ingredients", label: "Ingrédients", roles: ["chef"] },
                { id: "couts", label: "Coûts", roles: ["chef"] },
            ];

            return (
                <header className="bg-white shadow-md border-b border-slate-100 sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-20">
                            <div className="flex items-center">
                                <LogoArpege size="small" />
                            </div>

                            <nav className="hidden md:flex space-x-2">
                                {tabs.filter(tab => tab.roles.includes(user.role)).map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-6 py-2 rounded-full transition-all font-medium ${
                                            activeTab === tab.id
                                                ? "bg-[#C8956C] text-white"
                                                : "text-gray-600 hover:bg-gray-100"
                                        }`}
                                    >
                                        {tab.label}
                                    </button>
                                ))}
                            </nav>

                            <div className="flex items-center space-x-4">
                                <div className="flex items-center space-x-2">
                                    <span className="text-sm font-medium text-gray-700">{user.name}</span>
                                    <span className={`text-xs px-3 py-1 rounded-full uppercase font-medium ${
                                        user.role === "chef" ? "bg-[#C8956C] text-white" : "bg-blue-100 text-blue-800"
                                    }`}>
                                        {user.role}
                                    </span>
                                </div>
                                <button
                                    onClick={onLogout}
                                    className="p-2 text-gray-400 hover:text-red-600 transition-colors"
                                    title="Déconnexion"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const IngredientsManager = ({ ingredients, setIngredients, isChef }) => {
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [formData, setFormData] = useState({
                category: CATEGORIES_ING[0],
                name: "",
                price: "",
                unit: "Kg",
                supplier: ""
            });

            const filteredIngredients = ingredients.filter(ing => 
                ing.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                ing.category.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingId) {
                    setIngredients(ingredients.map(ing => 
                        ing.id === editingId ? { ...formData, id: editingId, price: parseFloat(formData.price) } : ing
                    ));
                } else {
                    const newId = Math.max(...ingredients.map(i => i.id), 0) + 1;
                    setIngredients([...ingredients, { ...formData, id: newId, price: parseFloat(formData.price) }]);
                }
                resetForm();
            };

            const resetForm = () => {
                setFormData({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "" });
                setEditingId(null);
                setShowForm(false);
            };

            const handleEdit = (ing) => {
                setFormData(ing);
                setEditingId(ing.id);
                setShowForm(true);
            };

            const handleDelete = (id) => {
                if (window.confirm("Êtes-vous sûr de vouloir supprimer cet ingrédient ?")) {
                    setIngredients(ingredients.filter(ing => ing.id !== id));
                }
            };

            return (
                <div className="p-6 max-w-7xl mx-auto fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-[#1A3A4A]">Gestion des Ingrédients</h2>
                        {isChef && (
                            <button
                                onClick={() => setShowForm(!showForm)}
                                className="flex items-center space-x-2 bg-[#1A3A4A] text-white px-4 py-2 rounded-lg hover:bg-[#2A4A5A] transition-colors"
                            >
                                <span>+ Nouvel ingrédient</span>
                            </button>
                        )}
                    </div>

                    <div className="mb-6">
                        <input
                            type="text"
                            placeholder="Rechercher un ingrédient..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C] focus:border-transparent"
                        />
                    </div>

                    {showForm && (
                        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-slate-100">
                            <h3 className="text-lg font-semibold mb-4 text-[#1A3A4A]">
                                {editingId ? "Modifier" : "Nouvel ingrédient"}
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                    >
                                        {CATEGORIES_ING.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Prix (€)</label>
                                    <input
                                        type="number"
                                        step="0.01"
                                        value={formData.price}
                                        onChange={(e) => setFormData({...formData, price: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Unité</label>
                                    <select
                                        value={formData.unit}
                                        onChange={(e) => setFormData({...formData, unit: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                    >
                                        {UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Fournisseur</label>
                                    <input
                                        type="text"
                                        value={formData.supplier}
                                        onChange={(e) => setFormData({...formData, supplier: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                    />
                                </div>
                            </div>
                            <div className="mt-4 flex space-x-3">
                                <button type="submit" className="bg-[#1A3A4A] text-white px-6 py-2 rounded-lg hover:bg-[#2A4A5A]">
                                    {editingId ? "Mettre à jour" : "Ajouter"}
                                </button>
                                <button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                                    Annuler
                                </button>
                            </div>
                        </form>
                    )}

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Catégorie</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Prix</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Unité</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fournisseur</th>
                                    {isChef && <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {filteredIngredients.map(ing => (
                                    <tr key={ing.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4">
                                            <span className="px-2 py-1 rounded-full text-xs font-semibold bg-[#C8956C] text-white">
                                                {ing.category}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 font-medium">{ing.name}</td>
                                        <td className="px-6 py-4 text-gray-600">{ing.price.toFixed(2)} €</td>
                                        <td className="px-6 py-4 text-gray-600">{ing.unit}</td>
                                        <td className="px-6 py-4 text-gray-600">{ing.supplier}</td>
                                        {isChef && (
                                            <td className="px-6 py-4 text-sm">
                                                <button onClick={() => handleEdit(ing)} className="text-[#1A3A4A] hover:text-[#C8956C] mr-3">
                                                    Modifier
                                                </button>
                                                <button onClick={() => handleDelete(ing.id)} className="text-red-600 hover:text-red-800">
                                                    Supprimer
                                                </button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const AddIngredientModal = ({ isOpen, onClose, onAdd }) => {
            const [formData, setFormData] = useState({
                category: CATEGORIES_ING[0],
                name: "",
                price: "",
                unit: "Kg",
                supplier: ""
            });

            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                if (isOpen) {
                    window.addEventListener('keydown', handleEsc);
                    return () => window.removeEventListener('keydown', handleEsc);
                }
            }, [isOpen, onClose]);

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                const newIngredient = {
                    ...formData,
                    id: Date.now(),
                    price: parseFloat(formData.price)
                };
                onAdd(newIngredient);
                onClose();
            };

            const handleOverlayClick = (e) => {
                if (e.target === e.currentTarget) onClose();
            };

            return (
                <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={handleOverlayClick}>
                    <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full slide-in relative">
                        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2 hover:bg-gray-100 rounded-full">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
                        </button>

                        <div className="p-6 border-b border-gray-200 pr-12">
                            <h3 className="text-xl font-bold text-[#1A3A4A]">Nouvel ingrédient</h3>
                            <p className="text-sm text-gray-500 mt-1">Ajouté à la base et à la recette</p>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Catégorie *</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        required
                                    >
                                        {CATEGORIES_ING.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nom *</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        required
                                    />
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Prix (€) *</label>
                                    <input
                                        type="number"
                                        step="0.01"
                                        min="0"
                                        value={formData.price}
                                        onChange={(e) => setFormData({...formData, price: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Unité *</label>
                                    <select
                                        value={formData.unit}
                                        onChange={(e) => setFormData({...formData, unit: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        required
                                    >
                                        {UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Fournisseur</label>
                                <input
                                    type="text"
                                    value={formData.supplier}
                                    onChange={(e) => setFormData({...formData, supplier: e.target.value})}
                                    className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                />
                            </div>

                            <div className="flex space-x-3 pt-4">
                                <button type="submit" className="flex-1 bg-[#1A3A4A] text-white py-3 rounded-lg font-medium hover:bg-[#2A4A5A]">
                                    Ajouter et sélectionner
                                </button>
                                <button type="button" onClick={onClose} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">

                        <div className="p-6 space-y-6">

        const AdaptModal = ({ recipe, isOpen, onClose, isChef }) => {
            const [adaptParams, setAdaptParams] = useState({ covers: 4, quantity: 1, budget: null });

            useEffect(() => {
                if (recipe && isOpen) {
                    setAdaptParams({ covers: recipe.covers, quantity: 1, budget: null });
                }
            }, [recipe, isOpen]);

            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                if (isOpen) {
                    window.addEventListener('keydown', handleEsc);
                    return () => window.removeEventListener('keydown', handleEsc);
                }
            }, [isOpen, onClose]);

            if (!isOpen || !recipe) return null;

            const handleOverlayClick = (e) => {
                if (e.target === e.currentTarget) onClose();
            };

            const calculateCost = (params) => {
                let totalCost = 0;
                const multiplier = (params.covers / recipe.covers) * params.quantity;
                
                recipe.ingredients.forEach(ing => {
                    const baseCost = (ing.quantity * ing.pricePerUnit) * multiplier;
                    const wasteCost = baseCost * (ing.wasteCoeff || 1);
                    totalCost += wasteCost;
                });
                
                return totalCost * (recipe.wasteCoeff || 1);
            };

            const getAdaptedIngredients = () => {
                const multiplier = (adaptParams.covers / recipe.covers) * adaptParams.quantity;
                return recipe.ingredients.map(ing => ({
                    ...ing,
                    adaptedQuantity: ing.quantity * multiplier
                }));
            };

                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        min="1"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Budget max (€)</label>
                                    <input
                                        type="number"
                                        value={adaptParams.budget || ""}
                                        onChange={(e) => setAdaptParams({...adaptParams, budget: e.target.value ? parseFloat(e.target.value) : null})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"

                                            <span className="font-medium">{ing.name}</span>
                                            <span className="text-gray-600 bg-white px-3 py-1 rounded-full text-sm border border-gray-200">

                                        <span className="font-semibold text-[#1A3A4A]">Coût total estimé:</span>
                                        <span className="text-2xl font-bold text-[#C8956C]">{adaptedCost.toFixed(2)}€</span>
                                    </div>
                                    <div className="flex justify-between items-center text-sm text-[#1A3A4A]">
                                        <span>Coût par couvert:</span>
                                        <span>{(adaptedCost / adaptParams.covers).toFixed(2)}€</span>
                                    </div>
                                    {adaptParams.budget && (
                                        <div className={`mt-3 px-3 py-2 rounded-lg text-sm font-medium ${
                                            adaptedCost <= adaptParams.budget ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
                                        }`}>
                                            {adaptedCost <= adaptParams.budget ? "✓ Dans le budget" : `✗ Dépasse de ${(adaptedCost - adaptParams.budget).toFixed(2)}€`}
                                        </div>

            const [formData, setFormData] = useState({
                category: CATEGORIES_REC[0],

                ingredientId: "",
                quantity: "",
                unit: "Gramme",
                wasteCoeff: 1.0,
                searchText: ""
            });

            const filteredRecipes = recipes.filter(recipe => 
                recipe.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                recipe.category.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const filteredIngredientsForSearch = ingredients.filter(ing => 
                ing.name.toLowerCase().includes(currentIng.searchText.toLowerCase())
            );

            const addIngredientToRecipe = (ingredientId = null) => {
                const finalIngredientId = ingredientId || currentIng.ingredientId;
                if (!finalIngredientId || !currentIng.quantity) return;
                
                const ing = ingredients.find(i => i.id === parseInt(finalIngredientId));
                if (!ing) return;
                
                setFormData({
                    ...formData,
                    ingredients: [...formData.ingredients, {
                        ingredientId: parseInt(finalIngredientId),
                        name: ing.name,
                        quantity: parseFloat(currentIng.quantity),
                        unit: currentIng.unit,
                        wasteCoeff: parseFloat(currentIng.wasteCoeff),
                        pricePerUnit: ing.price,
                        unitPrice: ing.unit
                    }]
                });
                setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
            };

            const handleAddNewIngredient = (newIngredient) => {
                setIngredients([...ingredients, newIngredient]);
                setFormData({
                    ...formData,
                    ingredients: [...formData.ingredients, {
                        ingredientId: newIngredient.id,
                        name: newIngredient.name,
                        quantity: parseFloat(currentIng.quantity) || 0,
                        unit: currentIng.unit || "Gramme",
                        wasteCoeff: parseFloat(currentIng.wasteCoeff) || 1.0,
                        pricePerUnit: newIngredient.price,
                        unitPrice: newIngredient.unit
                    }]
                });
                setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
            };

            const removeIngredientFromRecipe = (index) => {
                setFormData({
                    ...formData,
                    ingredients: formData.ingredients.filter((_, i) => i !== index)
                });
            };

            const calculateCost = (recipe, params = null) => {
                let totalCost = 0;
                const multiplier = params ? (params.covers / recipe.covers) * params.quantity : 1;
                
                recipe.ingredients.forEach(ing => {
                    const baseCost = (ing.quantity * ing.pricePerUnit) * multiplier;
                    const wasteCost = baseCost * (ing.wasteCoeff || 1);
                    totalCost += wasteCost;
                });
                
                return totalCost * (recipe.wasteCoeff || 1);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (formData.ingredients.length === 0) {
                    alert("Ajoutez au moins un ingrédient");
                    return;
                }
                
                const cost = calculateCost({ ...formData, ingredients: formData.ingredients });
                
                if (editingId) {
                    setRecipes(recipes.map(r => 
                        r.id === editingId ? { ...formData, id: editingId, totalCost: cost } : r
                    ));
                } else {
                    const newId = Math.max(...recipes.map(r => r.id), 0) + 1;
                    setRecipes([...recipes, { ...formData, id: newId, totalCost: cost }]);
                }
                resetForm();
            };

            const resetForm = () => {
                setFormData({ category: CATEGORIES_REC[0], name: "", covers: 4, ingredients: [], procedure: "", wasteCoeff: 1.05 });
                setEditingId(null);
                setShowForm(false);
                setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
            };

            const handleEdit = (recipe) => {
                setFormData(recipe);
                setEditingId(recipe.id);
                setShowForm(true);
                setDetailRecipe(null);
            };

            const handleDelete = (id) => {

                        onClose={() => setDetailRecipe(null)}

                        isOpen={!!adaptRecipe}
                        onClose={() => setAdaptRecipe(null)}
                        isChef={isChef}

                    <div className="flex justify-between items-center mb-6">

                            value={searchTerm}

                    {showForm && (
                        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-slate-100">

                                {editingId ? "Modifier la recette" : "Nouvelle recette"}

                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                    >
                                        {CATEGORIES_REC.map(cat => <option key={cat} value={cat}>{cat}</option>)}

                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Couverts</label>
                                    <input
                                        type="number"
                                        value={formData.covers}
                                        onChange={(e) => setFormData({...formData, covers: parseInt(e.target.value)})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        min="1"
                                        required
                                    />
                                </div>
                            </div>

                            <div className="bg-gray-50 rounded-lg p-4 mb-4">
                                <h4 className="font-medium text-gray-700 mb-3">Ingrédients</h4>
                                
                                <div className="relative mb-3">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Rechercher</label>
                                    <input
                                        type="text"
                                        value={currentIng.searchText}
                                        onChange={(e) => setCurrentIng({...currentIng, searchText: e.target.value})}
                                        placeholder="Tapez pour chercher..."
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                    />
                                    
                                    {currentIng.searchText && (
                                        <div className="absolute z-10 w-full mt-1 bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">
                                            {filteredIngredientsForSearch.length > 0 ? (
                                                filteredIngredientsForSearch.map(ing => (
                                                    <button
                                                        key={ing.id}
                                                        type="button"
                                                        onClick={() => setCurrentIng({...currentIng, ingredientId: ing.id, searchText: ing.name})}
                                                        className="w-full text-left px-4 py-2 hover:bg-amber-50 flex justify-between"
                                                    >
                                                        <span>{ing.name}</span>
                                                        <span className="text-sm text-gray-500">{ing.price}€/{ing.unit}</span>

                                            className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                        />

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Unité</label>

                                            value={currentIng.unit}

                                        {formData.ingredients.map((ing, idx) => (
                                            <div key={idx} className="flex items-center justify-between bg-amber-50 px-4 py-2 rounded-lg">
                                                <span className="font-medium">{ing.name} - {ing.quantity} {ing.unit}</span>
                                                <button
                                                    type="button"
                                                    onClick={() => removeIngredientFromRecipe(idx)}
                                                    className="text-red-500 hover:text-red-700"
                                                >
                                                    ✕
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="flex items-center space-x-4 mb-4">
                                <label className="text-sm font-medium text-gray-700">Coeff. perte global:</label>
                                <input
                                    type="number"
                                    step="0.01"
                                    value={formData.wasteCoeff}
                                    onChange={(e) => setFormData({...formData, wasteCoeff: parseFloat(e.target.value)})}
                                    className="w-24 px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]"
                                />
                            </div>

                            <div className="flex space-x-3">
                                <button type="submit" className="bg-[#1A3A4A] text-white px-6 py-2 rounded-lg hover:bg-[#2A4A5A] font-medium">
                                    {editingId ? "Mettre à jour" : "Créer la recette"}
                                </button>
                                <button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                                    Annuler
                                </button>
                            </div>
                        </form>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredRecipes.map(recipe => (
                            <div key={recipe.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
                                <div className="p-6">
                                    <div className="flex justify-between items-start mb-4">
                                        <span className="px-3 py-1 rounded-full text-xs font-semibold bg-[#C8956C] text-white">
                                            {recipe.category}
                                        </span>
                                        <span className="text-sm text-gray-500">{recipe.covers} couverts</span>
                                    </div>
                                    <h3 
                                        className="text-lg font-bold text-[#1A3A4A] mb-2 cursor-pointer hover:text-[#C8956C] transition-colors"
                                        onClick={() => setDetailRecipe(recipe)}
                                    >
                                        {recipe.name}
                                    </h3>
                                    <div className="space-y-1 mb-4">
                                        <p className="text-sm text-gray-600">{recipe.ingredients.length} ingrédient(s)</p>
                                        {recipe.procedure && <p className="text-xs text-[#C8956C]">✓ Procédé renseigné</p>}
                                        {isChef && (
                                            <p className="text-lg font-bold text-[#C8956C]">
                                                {recipe.totalCost?.toFixed(2)}€
                                                <span className="text-sm font-normal text-gray-500 ml-2">
                                                    ({(recipe.totalCost / recipe.covers).toFixed(2)}€/couvert)
                                                </span>
                                            </p>
                                        )}
                                    </div>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => setDetailRecipe(recipe)}
                                            className="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 text-sm font-medium"
                                        >
                                            Voir détail
                                        </button>
                                        <button
                                            onClick={() => setAdaptRecipe(recipe)}
                                            className="flex-1 bg-[#C8956C] bg-opacity-10 text-[#C8956C] py-2 rounded-lg hover:bg-opacity-20 text-sm font-medium"
                                        >
                                            Adapter
                                        </button>
                                        {isChef && (
                                            <>
                                                <button onClick={() => handleEdit(recipe)} className="p-2 text-gray-600 hover:text-[#1A3A4A] bg-gray-50 rounded-lg">
                                                    ✎
                                                </button>
                                                <button onClick={() => handleDelete(recipe.id)} className="p-2 text-gray-600 hover:text-red-600 bg-gray-50 rounded-lg">
                                                    🗑
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CostsView = ({ recipes, ingredients }) => {
            const avgCostPerRecipe = recipes.length ? recipes.reduce((sum, r) => sum + (r.totalCost || 0), 0) / recipes.length : 0;
            const mostExpensive = recipes.length ? recipes.reduce((max, r) => r.totalCost > max.totalCost ? r : max, recipes[0]) : null;
            const cheapest = recipes.length ? recipes.reduce((min, r) => r.totalCost < min.totalCost ? r : min, recipes[0]) : null;

            return (
                <div className="p-6 max-w-7xl mx-auto fade-in">
                    <h2 className="text-2xl font-bold text-[#1A3A4A] mb-6">Analyse des Coûts</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <h3 className="text-sm font-medium text-gray-500 mb-4">Coût moyen</h3>
                            <p className="text-3xl font-bold text-[#1A3A4A]">{avgCostPerRecipe.toFixed(2)}€</p>
                        </div>
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <h3 className="text-sm font-medium text-gray-500 mb-4">Plus chère</h3>
                            <p className="text-lg font-bold truncate text-[#1A3A4A]">{mostExpensive?.name || "-"}</p>
                            <p className="text-2xl font-bold text-red-600">{mostExpensive?.totalCost?.toFixed(2) || "0"}€</p>
                        </div>
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <h3 className="text-sm font-medium text-gray-500 mb-4">Moins chère</h3>
                            <p className="text-lg font-bold truncate text-[#1A3A4A]">{cheapest?.name || "-"}</p>
                            <p className="text-2xl font-bold text-green-600">{cheapest?.totalCost?.toFixed(2) || "0"}€</p>
                        </div>
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <h3 className="text-sm font-medium text-gray-500 mb-4">Ingrédients</h3>
                            <p className="text-3xl font-bold text-[#1A3A4A]">{ingredients.length}</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="px-6 py-4 border-b border-gray-200">
                            <h3 className="text-lg font-semibold text-[#1A3A4A]">Détail des coûts</h3>
                        </div>
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Recette</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Catégorie</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût total</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût/couvert</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {recipes.map(recipe => (
                                    <tr key={recipe.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4 font-medium text-[#1A3A4A]">{recipe.name}</td>
                                        <td className="px-6 py-4 text-gray-600">{recipe.category}</td>
                                        <td className="px-6 py-4 font-bold text-[#C8956C]">{recipe.totalCost?.toFixed(2)}€</td>
                                        <td className="px-6 py-4 text-gray-600">{(recipe.totalCost / recipe.covers).toFixed(2)}€</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useLocalStorage("arpege_user", null);
            const [ingredients, setIngredients] = useLocalStorage("arpege_ingredients", INITIAL_INGREDIENTS);
            const [recipes, setRecipes] = useLocalStorage("arpege_recipes", INITIAL_RECIPES);
            const [activeTab, setActiveTab] = useState("recettes");

            const handleLogin = (userData) => {
                setUser(userData);
            };

            const handleLogout = () => {
                setUser(null);
            };

            if (!user) {
                return <Login onLogin={handleLogin} />;
            }

            const isChef = user.role === "chef";

            return (
                <div className="min-h-screen bg-gray-50">
                    <Header 
                        user={user} 
                        onLogout={handleLogout} 
                        activeTab={activeTab} 
                        setActiveTab={setActiveTab}
                    />
                    
                    <main className="pb-12">
                        {activeTab === "ingredients" && isChef && (
                            <IngredientsManager 
                                ingredients={ingredients} 
                                setIngredients={setIngredients}
                                isChef={isChef}
                            />
                        )}
                        
                        {activeTab === "recettes" && (
                            <RecipesManager 
                                ingredients={ingredients}
                                setIngredients={setIngredients}
                                recipes={recipes}
                                setRecipes={setRecipes}
                                isChef={isChef}
                            />
                        )}
                        
                        {activeTab === "couts" && isChef && (
                            <CostsView recipes={recipes} ingredients={ingredients} />
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
