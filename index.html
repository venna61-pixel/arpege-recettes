const roundTo = (value, decimals = 2) => Number((value || 0).toFixed(decimals));
const formatDecimal = (value, maxDigits = 6) => {
  const n = Number(value);
  if (!Number.isFinite(n)) return "0";
  return n.toLocaleString("fr-FR", { minimumFractionDigits: 0, maximumFractionDigits: maxDigits, useGrouping: false });
};
const normalizeUnknownPrice = (rawPrice) => {
  const raw = String(rawPrice ?? "").trim();
  if (!raw) return null;
  const parsed = Number(raw);
  if (!Number.isFinite(parsed) || parsed <= 0) return null;
  return parsed;
};
const formatPriceDisplay = (price) => {
  const n = Number(price);
  if (!Number.isFinite(n) || n <= 0) return "Prix inconnu";
  return `${formatDecimal(n)} €`;
};

const useLocalStorage = (key, initialValue) => {
  const [storedValue, setStoredValue] = useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item ? JSON.parse(item) : initialValue;
    } catch {
      return initialValue;
    }
  });

  const setValue = (value) => {
    try {
      const valueToStore = value instanceof Function ? value(storedValue) : value;
      setStoredValue(valueToStore);
      window.localStorage.setItem(key, JSON.stringify(valueToStore));
    } catch (error) {
      console.error(error);
    }
  };

  return [storedValue, setValue];
};

const IngredientsManager = ({ ingredients, setIngredients, suppliers, setSuppliers, isChef }) => {
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [categoryFilter, setCategoryFilter] = useState(null);
  const [formData, setFormData] = useState({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "" });

  const availableCategories = useMemo(() => {
    const categories = Array.from(new Set(
      ingredients
        .map((ing) => String(ing?.category || "").trim() || "Non classé")
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b, "fr"));
    return ["Tous", ...categories];
  }, [ingredients]);

  const ingredientSupplierSuggestions = useMemo(() => (
    Array.from(new Set(
      (ingredients || [])
        .map((ing) => String(ing?.supplier || "").trim())
        .filter(Boolean)
    )).sort((a, b) => a.localeCompare(b, "fr"))
  ), [ingredients]);
  const filteredSupplierSuggestions = useMemo(() => {
    const query = String(formData.supplier || "").trim().toLocaleLowerCase("fr");
    if (!query) return [];
    return ingredientSupplierSuggestions.filter((supplierName) => {
      const normalizedSupplier = String(supplierName || "").trim();
      if (!normalizedSupplier) return false;
      if (normalizedSupplier.toLocaleLowerCase("fr") === query) return false;
      return normalizedSupplier.toLocaleLowerCase("fr").includes(query);
    });
  }, [ingredientSupplierSuggestions, formData.supplier]);


  const hasCategorySelection = categoryFilter !== null;

  const filteredIngredients = useMemo(() => {
    if (!hasCategorySelection) return [];
    const lowerSearch = searchTerm.toLowerCase();
    return ingredients
      .filter((ing) => {
        const normalizedCategory = String(ing?.category || "").trim() || "Non classé";
        const categoryMatch = categoryFilter === "Tous" || normalizedCategory === categoryFilter;
        const searchMatch = String(ing?.name || "").toLowerCase().includes(lowerSearch) || normalizedCategory.toLowerCase().includes(lowerSearch);
        return categoryMatch && searchMatch;
      })
      .sort((a, b) => String(a?.name || "").localeCompare(String(b?.name || ""), "fr"));
  }, [ingredients, hasCategorySelection, categoryFilter, searchTerm]);

  const resetForm = () => {
    setFormData({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "" });
    setEditingId(null); setShowForm(false);
  };
  const handleSubmit = (e) => {
    e.preventDefault();
    const normalizedSupplier = String(formData.supplier || "").trim();
    const normalized = { ...formData, supplier: normalizedSupplier, price: normalizeUnknownPrice(formData.price) };
    if (editingId) setIngredients(ingredients.map(ing => ing.id === editingId ? { ...normalized, id: editingId } : ing));
    else setIngredients([...ingredients, { ...normalized, id: Math.max(...ingredients.map(i => i.id), 0) + 1 }]);

    if (normalizedSupplier) {
      const existingSuppliers = (Array.isArray(suppliers) ? suppliers : []).map((s, idx) => (
        typeof s === "string"
          ? { id: `legacy-${idx}-${s}`, name: String(s || "").trim(), phone: "", email: "", address: "", contact: "", notes: "" }
          : {
            id: s.id ?? `supplier-${idx}`,
            name: String(s.name || s.nom || "").trim(),
            phone: String(s.phone || "").trim(),
            email: String(s.email || "").trim(),
            address: String(s.address || "").trim(),
            contact: String(s.contact || "").trim(),
            notes: String(s.notes || "").trim(),
          }
      )).filter((s) => s.name);

      const exists = existingSuppliers.some((s) => s.name.toLocaleLowerCase("fr") === normalizedSupplier.toLocaleLowerCase("fr"));
      if (!exists) {
        setSuppliers([
          ...existingSuppliers,
          { id: Date.now(), name: normalizedSupplier, phone: "", email: "", address: "", contact: "", notes: "" },
        ]);
      }
    }

    resetForm();
  };

  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <div className="flex justify-between items-center mb-6">
        <h2 className="text-2xl font-bold text-[#1A3A4A]">Gestion des Ingrédients</h2>
        {isChef && <button onClick={() => setShowForm(!showForm)} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg">+ Nouvel ingrédient</button>}
      </div>
      {!showForm && (
        <div className="mb-6"><input type="text" placeholder="Rechercher un ingrédient..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-[#C8956C]" /></div>
      )}
      {!showForm && (
        <div className="mb-6 overflow-x-auto">
          <div className="flex gap-2 min-w-max">
            {availableCategories.map((category) => (
              <button
                key={category}
                type="button"
                onClick={() => setCategoryFilter(category)}
                className={`px-3 py-2 rounded-full text-sm transition-colors ${categoryFilter === category ? "bg-[#C8956C] text-white" : "bg-amber-50 text-[#7b5a42]"}`}
              >
                {category}
              </button>
            ))}
          </div>
        </div>
      )}
      {showForm && (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-slate-100">
          <h3 className="text-lg font-semibold mb-4 text-[#1A3A4A]">{editingId ? "Modifier" : "Nouvel ingrédient"}</h3>
          <div className="grid grid-cols-1 md:grid-cols-5 gap-4">
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Catégorie</label><select value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300">{CATEGORIES_ING.map(cat => <option key={cat} value={cat}>{cat}</option>)}</select></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Nom</label><input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Prix (€)</label><input type="number" step="any" value={formData.price} onChange={(e) => setFormData({...formData, price: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité d'achat</label><select value={formData.unit} onChange={(e) => setFormData({...formData, unit: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300">{UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
            <div className="relative"><label className="block text-sm font-medium text-gray-700 mb-1">Fournisseur</label><input type="text" value={formData.supplier} onChange={(e) => setFormData({...formData, supplier: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" placeholder="Choisir ou saisir un fournisseur" />{filteredSupplierSuggestions.length > 0 && (<div className="absolute z-10 mt-1 w-full bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">{filteredSupplierSuggestions.map((supplierName) => (<button key={supplierName} type="button" onClick={() => setFormData({ ...formData, supplier: supplierName })} className="w-full text-left px-3 py-2 hover:bg-gray-100">{supplierName}</button>))}</div>)}</div>
          </div>
          <div className="mt-4 flex space-x-3"><button type="submit" className="bg-[#1A3A4A] text-white px-6 py-2 rounded-lg">{editingId ? "Mettre à jour" : "Ajouter"}</button><button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg">Annuler</button></div>
        </form>
      )}
      {!showForm && !hasCategorySelection && (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 px-6 py-8 text-center text-gray-500">
          Sélectionnez une catégorie pour afficher les ingrédients.
        </div>
      )}
      {!showForm && hasCategorySelection && (
        <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
          <table className="w-full">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr>
                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Catégorie</th>
                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Nom</th>
                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Prix</th>
                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Unité</th>
                <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fournisseur</th>
                {isChef && <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Actions</th>}
              </tr>
            </thead>
            <tbody className="divide-y divide-gray-200">
              {filteredIngredients.map(ing => {
                const normalizedCategory = String(ing?.category || "").trim() || "Non classé";
                return (
                  <tr key={ing.id} className="hover:bg-gray-50">
                    <td className="px-6 py-4"><span className="px-2 py-1 rounded-full text-xs font-semibold bg-[#C8956C] text-white">{normalizedCategory}</span></td>
                    <td className="px-6 py-4 font-medium">{ing.name}</td>
                    <td className="px-6 py-4 text-gray-600">{formatPriceDisplay(ing.price) === "Prix inconnu" ? <span className="text-red-600 font-semibold">Prix inconnu</span> : formatPriceDisplay(ing.price)}</td>
                    <td className="px-6 py-4 text-gray-600">{ing.unit}</td>
                    <td className="px-6 py-4 text-gray-600">{ing.supplier ? ing.supplier : <span className="text-amber-600 font-medium italic">Fournisseur à saisir</span>}</td>
                    {isChef && <td className="px-6 py-4 text-sm"><button onClick={() => { setFormData(ing); setEditingId(ing.id); setShowForm(true); }} className="text-[#1A3A4A] hover:text-[#C8956C] mr-3">Modifier</button><button onClick={() => window.confirm("Supprimer cet ingrédient ?") && setIngredients(ingredients.filter(i => i.id !== ing.id))} className="text-red-600 hover:text-red-800">Supprimer</button></td>}
                  </tr>
                );
              })}
              {filteredIngredients.length === 0 && (
                <tr>
                  <td colSpan={isChef ? 6 : 5} className="px-6 py-6 text-gray-500 text-center">Aucun ingrédient trouvé.</td>
                </tr>
              )}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
};

const AddIngredientModal = ({ isOpen, onClose, onAdd, suggestedName, supplierSuggestions = [] }) => {
  const [formData, setFormData] = useState({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "" });
  const [recipeUsage, setRecipeUsage] = useState({ recipeQuantity: "", recipeUnit: "", recipeWasteCoeff: "" });
  const filteredSupplierSuggestions = useMemo(() => {
    const query = String(formData.supplier || "").trim().toLocaleLowerCase("fr");
    if (!query) return [];
    return (Array.isArray(supplierSuggestions) ? supplierSuggestions : []).filter((supplierName) => {
      const normalizedSupplier = String(supplierName || "").trim();
      if (!normalizedSupplier) return false;
      if (normalizedSupplier.toLocaleLowerCase("fr") === query) return false;
      return normalizedSupplier.toLocaleLowerCase("fr").includes(query);
    });
  }, [supplierSuggestions, formData.supplier]);
  useEffect(() => {
    if (isOpen) {
      setFormData(prev => ({ ...prev, name: suggestedName || prev.name }));
      setRecipeUsage({ recipeQuantity: "", recipeUnit: "", recipeWasteCoeff: "" });
    }
  }, [isOpen, suggestedName]);
  useEffect(() => {
    const handleEsc = (e) => e.key === "Escape" && onClose();
    if (isOpen) { window.addEventListener("keydown", handleEsc); return () => window.removeEventListener("keydown", handleEsc); }
  }, [isOpen, onClose]);
  if (!isOpen) return null;
  const handleSubmit = (e) => {
    e.preventDefault();
    onAdd({
      ingredient: { ...formData, id: Date.now(), price: normalizeUnknownPrice(formData.price) },
      recipeUsage,
    });
    setFormData({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "" });
    setRecipeUsage({ recipeQuantity: "", recipeUnit: "", recipeWasteCoeff: "" });
    onClose();
  };
  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full slide-in relative">
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2">✕</button>
        <div className="p-6 border-b border-gray-200 pr-12"><h3 className="text-xl font-bold text-[#1A3A4A]">Nouvel ingrédient</h3><p className="text-sm text-gray-500 mt-1">Ajouté à la base et sélectionnable dans la recette</p></div>
        <form onSubmit={handleSubmit} className="p-6 space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Catégorie *</label><select value={formData.category} onChange={(e) => setFormData({...formData, category: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" required>{CATEGORIES_ING.map(cat => <option key={cat} value={cat}>{cat}</option>)}</select></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Nom *</label><input type="text" value={formData.name} onChange={(e) => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
          </div>
          <div className="grid grid-cols-2 gap-4">
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Prix (€)</label><input type="number" step="any" min="0" value={formData.price} onChange={(e) => setFormData({...formData, price: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
            <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité d'achat *</label><select value={formData.unit} onChange={(e) => setFormData({...formData, unit: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" required>{UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
          </div>
          <div className="relative"><label className="block text-sm font-medium text-gray-700 mb-1">Fournisseur</label><input type="text" value={formData.supplier} onChange={(e) => setFormData({...formData, supplier: e.target.value})} className="w-full px-3 py-2 rounded-lg border border-gray-300" placeholder="Choisir ou saisir un fournisseur" />{filteredSupplierSuggestions.length > 0 && (<div className="absolute z-10 w-full mt-1 bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">{filteredSupplierSuggestions.map((supplierName) => (<button key={supplierName} type="button" onClick={() => setFormData({ ...formData, supplier: supplierName })} className="w-full text-left px-4 py-2 hover:bg-amber-50">{supplierName}</button>))}</div>)}</div>
          <div className="bg-amber-50 rounded-lg p-4 border border-amber-100">
            <h4 className="text-sm font-semibold text-[#1A3A4A] mb-3">Utilisation dans cette recette</h4>
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Quantité</label><input type="number" step="any" min="0" value={recipeUsage.recipeQuantity} onChange={(e) => setRecipeUsage({ ...recipeUsage, recipeQuantity: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" placeholder="1" /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité recette</label><select value={recipeUsage.recipeUnit} onChange={(e) => setRecipeUsage({ ...recipeUsage, recipeUnit: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300"><option value="">Unité d'achat (par défaut)</option>{UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Coeff. perte</label><input type="number" step="0.01" min="0" value={recipeUsage.recipeWasteCoeff} onChange={(e) => setRecipeUsage({ ...recipeUsage, recipeWasteCoeff: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" placeholder="1" /></div>
            </div>
          </div>
          <div className="flex space-x-3 pt-4"><button type="submit" className="flex-1 bg-[#1A3A4A] text-white py-3 rounded-lg font-medium">Ajouter</button><button type="button" onClick={onClose} className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg">Annuler</button></div>
        </form>
      </div>
    </div>
  );
};

const RecipeDetailModal = ({ recipe, allRecipes, ingredients, isOpen, onClose, isChef }) => {
  useEffect(() => {
    const handleEsc = (e) => e.key === "Escape" && onClose();
    if (isOpen) { window.addEventListener("keydown", handleEsc); return () => window.removeEventListener("keydown", handleEsc); }
  }, [isOpen, onClose]);
  if (!isOpen || !recipe) return null;
  const normalized = normalizeRecipe(recipe);
  const costStatus = getCostStatus(normalized, allRecipes, ingredients);
  const totalCost = calculateRecipeTotalCost(normalized, allRecipes, new Set(), ingredients);

  const buildProcedureHtml = (procedure) => {
    if (!procedure) return "<p style='color:#6b7280;font-style:italic;'>Aucun procédé renseigné</p>";
    return procedure
      .split("\n")
      .map(step => `<p style="margin:0 0 8px 0;">${step}</p>`)
      .join("");
  };

  const escapeHtml = (value) => String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
  const sanitizePrintTitle = (value, suffix) => {
    const invalidChars = ["/", "\\", ":", "*", "?", "\"", "<", ">", "|"];
    let cleanedName = String(value || "Recette");
    invalidChars.forEach((char) => {
      cleanedName = cleanedName.split(char).join(" ");
    });
    cleanedName = cleanedName.replace(/\s+/g, " ").trim();
    return `${cleanedName || "Recette"} - ${suffix}`;
  };

  const handlePrintPdf = () => {
    const printTitle = sanitizePrintTitle(normalized.name, "Fiche");
    const directRows = normalized.directIngredients.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
      : normalized.directIngredients.map((ing) => {
          const ingredientCost = calculateIngredientCost(ing, ingredients);
          return `
            <tr>
              <td>${escapeHtml(ing.name)}</td>
              <td>${escapeHtml(ing.quantity)} ${escapeHtml(ing.unit)}</td>
              ${isChef ? `<td style="text-align:right;">${ingredientCost == null ? "N/A" : `${ingredientCost.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseRows = normalized.baseComponents.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucune recette de base liée</td></tr>`
      : normalized.baseComponents.map((component) => {
          const baseRecipe = normalizeRecipe(getRecipeById(allRecipes, component.baseRecipeId) || {});
          const baseCost = baseRecipe.id ? calculateRecipeTotalCost(baseRecipe, allRecipes, new Set(), ingredients) : null;
          const prorated = (baseCost != null && baseRecipe.id)
            ? computeBaseComponentCost({ component, baseRecipe, baseCost })
            : null;
          const usageLabel = component.usageMode === "portion"
            ? `${Number(component.portionCount || 0).toFixed(2)} portions/couverts`
            : `${escapeHtml(component.quantity)} ${escapeHtml(component.unit)}`;
          return `
            <tr>
              <td>${escapeHtml(component.name)}</td>
              <td>${usageLabel}</td>
              ${isChef ? `<td style="text-align:right;">${prorated == null ? "N/A" : `${prorated.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseSection = normalized.recipeType === "final" ? `
      <section>
        <h2>Recettes de base utilisées (${normalized.baseComponents.length})</h2>
        <table>
          <thead>
            <tr>
              <th>Recette de base</th>
              <th>Quantité utilisée</th>
              ${isChef ? "<th style='text-align:right;'>Coût proratisé</th>" : ""}
            </tr>
          </thead>
          <tbody>${baseRows}</tbody>
        </table>
      </section>
    ` : "";

    const costSection = isChef ? `
      <section>
        <h2>Synthèse des coûts</h2>
        ${
          !costStatus.valid
            ? `<p style="color:#991b1b;font-weight:600;">${escapeHtml(costStatus.message)}</p>`
            : `
              <p><strong>Coût total :</strong> ${Number(totalCost || 0).toFixed(2)}€</p>
              <p><strong>Coût par couvert :</strong> ${normalized.covers > 0 ? (Number(totalCost || 0) / normalized.covers).toFixed(2) : "0.00"}€</p>
            `
        }
      </section>
    ` : "";

    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>
          <meta charset="UTF-8" />
          <title>${escapeHtml(printTitle)}</title>
          <style>
            body { font-family: Inter, Arial, sans-serif; color: #111827; margin: 28px; }
            h1 { margin: 0 0 8px 0; color: #1A3A4A; }
            h2 { margin: 22px 0 10px 0; color: #1A3A4A; font-size: 18px; }
            .meta { color: #4b5563; margin-bottom: 6px; }
            .badges { margin: 10px 0 14px 0; }
            .badge { display: inline-block; background: #f3f4f6; border-radius: 999px; padding: 4px 10px; margin-right: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 600; }
            table { width: 100%; border-collapse: collapse; margin-top: 8px; }
            th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 14px; }
            th { text-align: left; background: #f9fafb; font-weight: 600; }
            .procedure { background: #fffbeb; border-left: 4px solid #C8956C; padding: 12px; }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(normalized.name)}</h1>
          <p class="meta"><strong>Type :</strong> ${normalized.recipeType === "base" ? "Recette de base" : "Recette finale"}</p>
          <p class="meta"><strong>Couverts :</strong> ${escapeHtml(normalized.covers)}${normalized.recipeType === "base" ? ` • <strong>Rendement :</strong> ${escapeHtml(normalized.outputQuantity)} ${escapeHtml(normalized.outputUnit)}` : ""}</p>
          <div class="badges">${normalized.categories.map(cat => `<span class="badge">${escapeHtml(cat)}</span>`).join("")}</div>

          <section>
            <h2>Ingrédients directs (${normalized.directIngredients.length})</h2>
            <table>
              <thead>
                <tr>
                  <th>Ingrédient</th>
                  <th>Quantité</th>
                  ${isChef ? "<th style='text-align:right;'>Coût</th>" : ""}
                </tr>
              </thead>
              <tbody>${directRows}</tbody>
            </table>
          </section>

          ${baseSection}

          <section>
            <h2>Procédé / Préparation</h2>
            <div class="procedure">${buildProcedureHtml(escapeHtml(normalized.procedure))}</div>
          </section>

          ${costSection}
        </body>
      </html>
    `;

    const printFromWindow = (targetWindow) => {
      targetWindow.document.open();
      targetWindow.document.write(content);
      targetWindow.document.close();
      targetWindow.document.title = printTitle;
      targetWindow.focus();
      targetWindow.print();
    };

    // Trigger printing from a hidden iframe to avoid opening an extra tab/window.
    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) {
      alert("Impossible d'ouvrir l'impression PDF. Vérifiez les paramètres de votre navigateur.");
      iframe.remove();
      return;
    }

    printFromWindow(iframeWindow);
    setTimeout(() => iframe.remove(), 1000);
  };

  const handlePrintProductionSheet = () => {
    if (normalized.recipeType === "base") return;
    const printTitle = sanitizePrintTitle(normalized.name, "Fiche complète");

    const baseBlocks = normalized.baseComponents.length === 0
      ? `<p style="color:#6b7280;font-style:italic;">Aucune sous-recette liée.</p>`
      : normalized.baseComponents.map((component, idx) => {
          const baseRecipeRaw = getRecipeById(allRecipes, component.baseRecipeId);
          if (!baseRecipeRaw) {
            return `
              <section class="subrecipe-block">
                <h2>${idx + 1}. ${escapeHtml(component.name || "Sous-recette introuvable")}</h2>
                <p style="color:#991b1b;font-weight:600;">Sous-recette introuvable.</p>
              </section>
            `;
          }

          const baseRecipe = normalizeRecipe(baseRecipeRaw);
          const effectiveYield = resolveEffectiveYield(baseRecipe);
          const usageMode = component.usageMode || "quantity";

          let multiplier = null;
          let invalidReason = null;

          if (usageMode === "portion") {
            const portionCount = Number(component.portionCount || 0);
            const baseCovers = Number(baseRecipe.covers || 0);
            if (!Number.isFinite(portionCount) || portionCount <= 0 || !Number.isFinite(baseCovers) || baseCovers <= 0) {
              invalidReason = "portions non calculables";
            } else {
              multiplier = portionCount / baseCovers;
            }
          } else {
            const sourceQty = Number(component.quantity || 0);
            const sourceUnit = component.unit;
            const targetUnit = effectiveYield?.unit;
            const converted = effectiveYield ? convertQuantity(sourceQty, sourceUnit, targetUnit) : null;
            if (!effectiveYield || converted == null || Number(effectiveYield.quantity || 0) <= 0) {
              invalidReason = "quantité non calculable";
            } else {
              multiplier = converted / Number(effectiveYield.quantity);
            }
          }

          const ingredientsRows = (baseRecipe.directIngredients || []).length === 0
            ? `<tr><td colspan="2" style="padding:8px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
            : baseRecipe.directIngredients.map((ing) => {
                if (multiplier == null) {
                  return `
                    <tr>
                      <td>${escapeHtml(ing.name)}</td>
                      <td>quantité non calculable</td>
                    </tr>
                  `;
                }
                const adaptedQty = Number(ing.quantity || 0) * multiplier;
                const qtyLabel = Number.isFinite(adaptedQty) ? `${adaptedQty.toFixed(2)} ${escapeHtml(ing.unit)}` : "quantité non calculable";
                return `
                  <tr>
                    <td>${escapeHtml(ing.name)}</td>
                    <td>${qtyLabel}</td>
                  </tr>
                `;
              }).join("");

          const usageLabel = usageMode === "portion"
            ? `${Number(component.portionCount || 0).toFixed(2)} portions/couverts`
            : `${escapeHtml(component.quantity)} ${escapeHtml(component.unit)}`;

          return `
            <section class="subrecipe-block">
              <h2>${idx + 1}. ${escapeHtml(baseRecipe.name)}</h2>
              <p class="meta"><strong>Utilisation dans la recette finale :</strong> ${usageLabel}${invalidReason ? ` • <span style="color:#991b1b;">${invalidReason}</span>` : ""}</p>
              <div class="grid">
                <div>
                  <h3>Ingrédients adaptés</h3>
                  <table>
                    <thead>
                      <tr>
                        <th>Ingrédient</th>
                        <th>Quantité adaptée</th>
                      </tr>
                    </thead>
                    <tbody>${ingredientsRows}</tbody>
                  </table>
                </div>
                <div>
                  <h3>Procédé</h3>
                  <div class="procedure">${buildProcedureHtml(baseRecipe.procedure)}</div>
                </div>
              </div>
            </section>
          `;
        }).join("");

    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>
          <meta charset="UTF-8" />
          <title>${escapeHtml(printTitle)}</title>
          <style>
            body { font-family: Inter, Arial, sans-serif; color: #111827; margin: 24px; }
            h1 { margin: 0 0 8px 0; color: #1A3A4A; }
            h2 { margin: 0 0 10px 0; color: #1A3A4A; font-size: 18px; }
            h3 { margin: 0 0 8px 0; color: #1A3A4A; font-size: 15px; }
            .meta { color: #4b5563; margin: 0 0 10px 0; }
            .subrecipe-block { border: 1px solid #e5e7eb; border-radius: 10px; padding: 14px; margin: 0 0 16px 0; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: start; }
            table { width: 100%; border-collapse: collapse; margin-top: 6px; }
            th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 13px; text-align: left; }
            th { background: #f9fafb; font-weight: 600; }
            .procedure { background: #fffbeb; border-left: 4px solid #C8956C; padding: 10px; min-height: 60px; }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(normalized.name)}</h1>
          <p class="meta"><strong>Couverts :</strong> ${escapeHtml(normalized.covers)}</p>
          ${baseBlocks}
          <section class="subrecipe-block">
            <h2>Montage / finition</h2>
            <div class="procedure">${buildProcedureHtml(normalized.procedure)}</div>
          </section>
        </body>
      </html>
    `;

    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) {
      alert("Impossible d'ouvrir l'impression PDF. Vérifiez les paramètres de votre navigateur.");
      iframe.remove();
      return;
    }

    iframeWindow.document.open();
    iframeWindow.document.write(content);
    iframeWindow.document.close();
    iframeWindow.document.title = printTitle;
    iframeWindow.focus();
    iframeWindow.print();
    setTimeout(() => iframe.remove(), 1000);
  };

  return (
    <div className="fixed inset-0 modal-overlay flex items-center justify-center p-4 z-50" onClick={(e) => e.target === e.currentTarget && onClose()}>
      <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto slide-in relative">
        <button onClick={onClose} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2 z-10">✕</button>
        <div className="p-6 border-b border-gray-200 pr-12">
          <div className="flex flex-wrap gap-2 mb-3">
            <span className={`px-3 py-1 rounded-full text-xs font-semibold ${normalized.recipeType === "base" ? "bg-slate-700 text-white" : "bg-[#1A3A4A] text-white"}`}>{normalized.recipeType === "base" ? "Recette de base" : "Recette finale"}</span>
            {normalized.categories.map(cat => <span key={cat} className="px-3 py-1 rounded-full text-xs font-semibold bg-[#C8956C] text-white">{cat}</span>)}
          </div>
          <h3 className="text-2xl font-bold text-[#1A3A4A]">{normalized.name}</h3>
          <p className="text-sm text-gray-500 mt-1">{normalized.covers} couverts{normalized.recipeType === "base" ? ` • Rendement : ${normalized.outputQuantity} ${normalized.outputUnit}` : ""}</p>
          <div className="mt-4 flex flex-wrap gap-2">
            <button onClick={handlePrintPdf} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-[#2A4A5A]">Imprimer la fiche (PDF)</button>
            {normalized.recipeType !== "base" && (
              <button onClick={handlePrintProductionSheet} className="bg-slate-700 text-white px-4 py-2 rounded-lg text-sm font-medium hover:bg-slate-800">Imprimer fiche complète de production</button>
            )}
          </div>
        </div>
        <div className="p-6 space-y-6">
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Ingrédients directs ({normalized.directIngredients.length})</h4>
            <div className="bg-gray-50 rounded-lg p-4">
              {normalized.directIngredients.length === 0 ? <p className="text-sm text-gray-500 italic">Aucun ingrédient direct</p> : (
                <table className="w-full"><thead><tr className="text-left text-xs font-medium text-gray-500 uppercase border-b border-gray-200"><th className="pb-2">Ingrédient</th><th className="pb-2">Quantité</th>{isChef && <th className="pb-2 text-right">Coût</th>}</tr></thead><tbody>{normalized.directIngredients.map((ing, idx) => { const ingredientCost = calculateIngredientCost(ing, ingredients); return <tr key={idx} className="border-b border-gray-100 last:border-0"><td className="py-3 font-medium">{ing.name}</td><td className="py-3 text-gray-600">{ing.quantity} {ing.unit}</td>{isChef && <td className="py-3 text-right text-[#C8956C] font-medium">{ingredientCost == null ? "N/A" : `${ingredientCost.toFixed(2)}€`}</td>}</tr>; })}</tbody></table>
              )}
            </div>
          </div>

          {normalized.recipeType === "final" && (
            <div>
              <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Recettes de base utilisées ({normalized.baseComponents.length})</h4>
              <div className="bg-gray-50 rounded-lg p-4">
                {normalized.baseComponents.length === 0 ? <p className="text-sm text-gray-500 italic">Aucune recette de base liée</p> : (
                  <table className="w-full"><thead><tr className="text-left text-xs font-medium text-gray-500 uppercase border-b border-gray-200"><th className="pb-2">Recette de base</th><th className="pb-2">Quantité utilisée</th>{isChef && <th className="pb-2 text-right">Coût proratisé</th>}</tr></thead><tbody>{normalized.baseComponents.map((component, idx) => { const baseRecipe = normalizeRecipe(getRecipeById(allRecipes, component.baseRecipeId) || {}); const baseCost = baseRecipe.id ? calculateRecipeTotalCost(baseRecipe, allRecipes, new Set(), ingredients) : null; const prorated = (baseCost != null && baseRecipe.id) ? computeBaseComponentCost({ component, baseRecipe, baseCost }) : null; const usageLabel = component.usageMode === "portion" ? `${component.portionCount} portions/couverts` : `${component.quantity} ${component.unit}`; return <tr key={idx} className="border-b border-gray-100 last:border-0"><td className="py-3 font-medium">{component.name}</td><td className="py-3 text-gray-600">{usageLabel}</td>{isChef && <td className="py-3 text-right text-[#C8956C] font-medium">{prorated == null ? "N/A" : `${prorated.toFixed(2)}€`}</td>}</tr>; })}</tbody></table>
                )}
              </div>
            </div>
          )}

          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Procédé / Préparation</h4>
            <div className="bg-amber-50 rounded-lg p-4 border-l-4 border-[#C8956C]">{normalized.procedure ? normalized.procedure.split("\n").map((step, idx) => <p key={idx} className="mb-2 last:mb-0">{step}</p>) : <p className="text-gray-500 italic">Aucun procédé renseigné</p>}</div>
          </div>

          {isChef && (
            <div className="bg-[#C8956C] bg-opacity-10 rounded-lg p-4 border border-[#C8956C] border-opacity-30">
              {!costStatus.valid ? <div className="text-sm text-red-700 font-medium">{costStatus.message}</div> : <><div className="flex justify-between items-center mb-2"><span className="font-semibold text-[#1A3A4A]">Coût total :</span><span className="text-2xl font-bold text-[#C8956C]">{Number(totalCost || 0).toFixed(2)}€</span></div><div className="flex justify-between items-center text-sm text-[#1A3A4A]"><span>Coût par couvert :</span><span>{normalized.covers > 0 ? (Number(totalCost || 0) / normalized.covers).toFixed(2) : "0.00"}€</span></div></>}
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

const AdaptModal = ({ recipe, recipes, ingredients, isOpen, onClose, isChef }) => {
  const normalized = recipe ? normalizeRecipe(recipe) : null;
  const [pivotType, setPivotType] = useState("covers");
  const [pivotValue, setPivotValue] = useState("");
  const [selectedIngredientIndex, setSelectedIngredientIndex] = useState(0);
  useEffect(() => {
    if (normalized && isOpen) {
      setPivotType("covers");
      setPivotValue(String(normalized.covers || 1));
      setSelectedIngredientIndex(0);
    }
  }, [recipe, isOpen]);
  useEffect(() => {
    const handleEsc = (e) => e.key === "Escape" && onClose();
    if (isOpen) { window.addEventListener("keydown", handleEsc); return () => window.removeEventListener("keydown", handleEsc); }
  }, [isOpen, onClose]);
  if (!isOpen || !normalized) return null;

  const baseCost = calculateRecipeTotalCost(normalized, recipes, new Set(), ingredients);
  const scaling = window.ArpegeRecipeScaling.computePivotMultiplier({
    pivotType,
    pivotValue,
    normalizedRecipe: normalized,
    baseCost,
    selectedIngredientIndex,
  });
  const multiplier = scaling.multiplier;
  const ingredientPivotSource = scaling.ingredientPivotSource;
  const totalDirectQty = scaling.totalDirectQty;
  const { adaptedDirectIngredients, adaptedBaseComponents, adaptedRecipe } = window.ArpegeRecipeScaling.buildAdaptedRecipe({
    normalizedRecipe: normalized,
    multiplier,
  });
  const { adaptedCost, adaptedCostStatus } = window.ArpegeRecipeScaling.computeAdaptedMetrics({
    adaptedRecipe,
    recipes,
    calculateRecipeTotalCost: (recipeInput, recipesInput) => calculateRecipeTotalCost(recipeInput, recipesInput, new Set(), ingredients),
    getCostStatus: (recipeInput, recipesInput) => getCostStatus(recipeInput, recipesInput, ingredients),
  });

  const escapeHtml = (value) => String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
  const sanitizePrintTitle = (value, suffix) => {
    const invalidChars = ["/", "\\", ":", "*", "?", "\"", "<", ">", "|"];
    let cleanedName = String(value || "Recette");
    invalidChars.forEach((char) => {
      cleanedName = cleanedName.split(char).join(" ");
    });
    cleanedName = cleanedName.replace(/\s+/g, " ").trim();
    return `${cleanedName || "Recette"} - ${suffix}`;
  };

  const buildProcedureHtml = (procedure) => {
    if (!procedure) return "<p style='color:#6b7280;font-style:italic;'>Aucun procédé renseigné</p>";
    return procedure
      .split("\n")
      .map(step => `<p style="margin:0 0 8px 0;">${escapeHtml(step)}</p>`)
      .join("");
  };

  const handlePrintAdaptedSheet = () => {
    const printTitle = sanitizePrintTitle(adaptedRecipe.name, "Fiche adaptée");
    const directRows = adaptedDirectIngredients.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
      : adaptedDirectIngredients.map((ing) => {
          const ingredientCost = calculateIngredientCost({ ...ing, quantity: ing.adaptedQuantity }, ingredients);
          return `
            <tr>
              <td>${escapeHtml(ing.name)}</td>
              <td>${escapeHtml(ing.adaptedQuantity.toFixed(2))} ${escapeHtml(ing.unit)}</td>
              ${isChef ? `<td style="text-align:right;">${ingredientCost == null ? "N/A" : `${ingredientCost.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseRows = adaptedBaseComponents.length === 0
      ? `<tr><td colspan="${isChef ? 3 : 2}" style="padding:10px;color:#6b7280;font-style:italic;">Aucune recette de base liée</td></tr>`
      : adaptedBaseComponents.map((component) => {
          const baseRecipe = normalizeRecipe(getRecipeById(recipes, component.baseRecipeId) || {});
          const baseCost = baseRecipe.id ? calculateRecipeTotalCost(baseRecipe, recipes, new Set(), ingredients) : null;
          const adaptedComponent = component.usageMode === "portion"
            ? { ...component, portionCount: component.adaptedPortionCount }
            : { ...component, quantity: component.adaptedQuantity };
          const prorated = (baseCost != null && baseRecipe.id)
            ? computeBaseComponentCost({ component: adaptedComponent, baseRecipe, baseCost })
            : null;
          const portionDisplayValue = component.adaptedPortionCount ?? component.portionCount;
          const adaptedLabel = component.usageMode === "portion"
            ? `${Number(portionDisplayValue || 0).toFixed(2)} portions/couverts`
            : `${Number(component.adaptedQuantity || 0).toFixed(2)} ${component.unit}`;
          return `
            <tr>
              <td>${escapeHtml(component.name)}</td>
              <td>${escapeHtml(adaptedLabel)}</td>
              ${isChef ? `<td style="text-align:right;">${prorated == null ? "N/A" : `${prorated.toFixed(2)}€`}</td>` : ""}
            </tr>
          `;
        }).join("");

    const baseSection = adaptedRecipe.recipeType === "final" ? `
      <section>
        <h2>Recettes de base utilisées (${adaptedBaseComponents.length})</h2>
        <table>
          <thead>
            <tr>
              <th>Recette de base</th>
              <th>Quantité adaptée</th>
              ${isChef ? "<th style='text-align:right;'>Coût proratisé</th>" : ""}
            </tr>
          </thead>
          <tbody>${baseRows}</tbody>
        </table>
      </section>
    ` : "";

    const costSection = isChef ? `
      <section>
        <h2>Synthèse des coûts</h2>
        ${
          !adaptedCostStatus.valid
            ? `<p style="color:#991b1b;font-weight:600;">${escapeHtml(adaptedCostStatus.message)}</p>`
            : `
              <p><strong>Coût total adapté :</strong> ${Number(adaptedCost || 0).toFixed(2)}€</p>
              <p><strong>Coût par couvert :</strong> ${adaptedRecipe.covers > 0 ? (Number(adaptedCost || 0) / adaptedRecipe.covers).toFixed(2) : "0.00"}€</p>
            `
        }
      </section>
    ` : "";

    const content = `
      <!DOCTYPE html>
      <html lang="fr">
        <head>
          <meta charset="UTF-8" />
          <title>${escapeHtml(printTitle)}</title>
          <style>
            body { font-family: Inter, Arial, sans-serif; color: #111827; margin: 28px; }
            h1 { margin: 0 0 8px 0; color: #1A3A4A; }
            h2 { margin: 22px 0 10px 0; color: #1A3A4A; font-size: 18px; }
            .meta { color: #4b5563; margin-bottom: 6px; }
            .badges { margin: 10px 0 14px 0; }
            .badge { display: inline-block; background: #f3f4f6; border-radius: 999px; padding: 4px 10px; margin-right: 8px; margin-bottom: 6px; font-size: 12px; font-weight: 600; }
            table { width: 100%; border-collapse: collapse; margin-top: 8px; }
            th, td { border: 1px solid #e5e7eb; padding: 8px; font-size: 14px; }
            th { text-align: left; background: #f9fafb; font-weight: 600; }
            .procedure { background: #fffbeb; border-left: 4px solid #C8956C; padding: 12px; }
          </style>
        </head>
        <body>
          <h1>${escapeHtml(adaptedRecipe.name)} (adaptée)</h1>
          <p class="meta"><strong>Type :</strong> ${adaptedRecipe.recipeType === "base" ? "Recette de base" : "Recette finale"}</p>
          <p class="meta"><strong>Coefficient :</strong> ${escapeHtml(multiplier.toFixed(4))}</p>
          <p class="meta"><strong>Couverts adaptés :</strong> ${escapeHtml((adaptedRecipe.covers || 0).toFixed(2))}${adaptedRecipe.recipeType === "base" ? ` • <strong>Rendement :</strong> ${escapeHtml((Number(adaptedRecipe.outputQuantity || 0) * multiplier).toFixed(2))} ${escapeHtml(adaptedRecipe.outputUnit)}` : ""}</p>
          <div class="badges">${adaptedRecipe.categories.map(cat => `<span class="badge">${escapeHtml(cat)}</span>`).join("")}</div>

          <section>
            <h2>Ingrédients directs adaptés (${adaptedDirectIngredients.length})</h2>
            <table>
              <thead>
                <tr>
                  <th>Ingrédient</th>
                  <th>Quantité adaptée</th>
                  ${isChef ? "<th style='text-align:right;'>Coût</th>" : ""}
                </tr>
              </thead>
              <tbody>${directRows}</tbody>
            </table>
          </section>

          ${baseSection}

          <section>
            <h2>Procédé / Préparation</h2>
            <div class="procedure">${buildProcedureHtml(adaptedRecipe.procedure)}</div>
          </section>

          ${costSection}
        </body>
      </html>
    `;

    const iframe = document.createElement("iframe");
    iframe.style.position = "fixed";
    iframe.style.right = "0";
    iframe.style.bottom = "0";
    iframe.style.width = "0";
    iframe.style.height = "0";
    iframe.style.border = "0";
    document.body.appendChild(iframe);

    const iframeWindow = iframe.contentWindow;
    if (!iframeWindow) {
      alert("Impossible d'ouvrir l'impression PDF. Vérifiez les paramètres de votre navigateur.");
      iframe.remove();
      return;
    }

    iframeWindow.document.open();
    iframeWindow.document.write(content);
    iframeWindow.document.close();
    iframeWindow.document.title = printTitle;
    iframeWindow.focus();
    iframeWindow.print();
    setTimeout(() => iframe.remove(), 1000);
  };

  const handlePrintAdaptedProductionSheet = () => {
    if (adaptedRecipe.recipeType === "base") return;
    const printTitle = sanitizePrintTitle(adaptedRecipe.name, "Fiche complète adaptée");

    const baseBlocks = adaptedBaseComponents.length === 0
      ? `<p style="color:#6b7280;font-style:italic;">Aucune sous-recette liée.</p>`
      : adaptedBaseComponents.map((component, idx) => {
          const baseRecipeRaw = getRecipeById(recipes, component.baseRecipeId);
          if (!baseRecipeRaw) {
            return `
              <section class="subrecipe-block">
                <h2>${idx + 1}. ${escapeHtml(component.name || "Sous-recette introuvable")}</h2>
                <p style="color:#991b1b;font-weight:600;">Sous-recette introuvable.</p>
              </section>
            `;
          }

          const baseRecipe = normalizeRecipe(baseRecipeRaw);
          const effectiveYield = resolveEffectiveYield(baseRecipe);
          const usageMode = component.usageMode || "quantity";

          let multiplierForBase = null;
          let invalidReason = null;

          if (usageMode === "portion") {
            const adaptedPortionCount = Number(adaptedRecipe.baseComponents?.[idx]?.portionCount ?? component.adaptedPortionCount ?? component.portionCount ?? 0);
            const baseCovers = Number(baseRecipe.covers || 0);
            if (!Number.isFinite(adaptedPortionCount) || adaptedPortionCount <= 0 || !Number.isFinite(baseCovers) || baseCovers <= 0) {
              invalidReason = "portions non calculables";
            } else {
              multiplierForBase = adaptedPortionCount / baseCovers;
            }
          } else {
            const adaptedQty = Number(adaptedRecipe.baseComponents?.[idx]?.quantity ?? component.adaptedQuantity ?? component.quantity ?? 0);
            const sourceUnit = component.unit;
            const targetUnit = effectiveYield?.unit;
            const converted = effectiveYield ? convertQuantity(adaptedQty, sourceUnit, targetUnit) : null;
            if (!effectiveYield || converted == null || Number(effectiveYield.quantity || 0) <= 0) {
              invalidReason = "quantité non calculable";
            } else {
              multiplierForBase = converted / Number(effectiveYield.quantity);
            }
          }

          const ingredientRows = (baseRecipe.directIngredients || []).length === 0
            ? `<tr><td colspan="2" style="padding:8px;color:#6b7280;font-style:italic;">Aucun ingrédient direct</td></tr>`
            : baseRecipe.directIngredients.map((ing) => {
                if (multiplierForBase == null) {
                  return `
                    <tr>
                      <td>${escapeHtml(ing.name)}</td>
                      <td>quantité non calculable</td>
                    </tr>
                  `;
                }
                const adaptedIngredientQty = Number(ing.quantity || 0) * multiplierForBase;
                const qtyLabel = Number.isFinite(adaptedIngredientQty)
                  ? `${adaptedIngredientQty.toFixed(2)} ${escapeHtml(ing.unit)}`
                  : "quantité non calculable";
                return `
                  <tr>
                    <td>${escapeHtml(ing.name)}</td>
                    <td>${qtyLabel}</td>
                  </tr>
                `;
              }).join("");

          const usageLabel = usageMode === "portion"
            ? `${Number(adaptedRecipe.baseComponents?.[idx]?.portionCount ?? component.adaptedPortionCount ?? component.portionCount ?? 0).toFixed(2)} portions/couverts`
            : `${Number(adaptedRecipe.baseComponents?.[idx]?.quantity ?? component.adaptedQuantity ?? component.quantity ?? 0).toFixed(2)} ${escapeHtml(component.unit)}`;

          return `
            <section class="subrecipe-block">
              <h2>${idx + 1}. ${escapeHtml(baseRecipe.name)}</h2>
              <p class="meta"><strong>Utilisation adaptée :</strong> ${usageLabel}${invalidReason ? ` • <span style="color:#991b1b;">${invalidReason}</span>` : ""}</p>
              <div class="grid">
                <div>
                  <h3>Ingrédients adaptés</h3>
                  <table>
                    <thead>
                      <tr>
                        <th>Ingrédient</th>
                        <th>Quantité adaptée</th>
                      </tr>
                    </thead>
                    <tbody>${ingredientRows}</tbody>
                  </table>
                </div>
                <div>
                  <h3>Procédé</h3>
                  <div class="procedure">${buildProcedureHtml(baseRecipe.procedure)}</div>
                </div>
              </div>
