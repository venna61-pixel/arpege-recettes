const formatDecimal = (value, maxDigits = 6) => {
  const n = Number(value);

  return n.toLocaleString("fr-FR", { minimumFractionDigits: 0, maximumFractionDigits: maxDigits, useGrouping: false });
};

const useLocalStorage = (key, initialValue) => {
  const [storedValue, setStoredValue] = useState(() => {
    try {
      const item = window.localStorage.getItem(key);
      return item ? JSON.parse(item) : initialValue;
    } catch {
      return initialValue;
    }
  });

  const setValue = (value) => {
    try {
      const valueToStore = value instanceof Function ? value(storedValue) : value;
      setStoredValue(valueToStore);
      window.localStorage.setItem(key, JSON.stringify(valueToStore));
    } catch (error) {
      console.error(error);
    }
  };

  return [storedValue, setValue];
};

const RecipeDetailModal = ({ recipe, allRecipes, ingredients, isOpen, onClose, isChef }) => {
  useEffect(() => {
    const handleEsc = (e) => e.key === "Escape" && onClose();
    if (isOpen) { window.addEventListener("keydown", handleEsc); return () => window.removeEventListener("keydown", handleEsc); }
  }, [isOpen, onClose]);
  if (!isOpen || !recipe) return null;
  const normalized = normalizeRecipe(recipe);
  const costStatus = getCostStatus(normalized, allRecipes, ingredients);
  const totalCost = calculateRecipeTotalCost(normalized, allRecipes, new Set(), ingredients);

  const buildProcedureHtml = (procedure) => {
    if (!procedure) return "<p style='color:#6b7280;font-style:italic;'>Aucun procédé renseigné</p>";
    return procedure
      .split("\n")

  const escapeHtml = (value) => String(value ?? "")

            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Lignes adaptées</h4>
            <div className="bg-gray-50 rounded-lg p-4 space-y-2 max-h-72 overflow-y-auto">
              {adaptedDirectIngredients.map((ing, idx) => <div key={`i-${idx}`} className="flex justify-between items-center py-3 border-b border-gray-200"><div><div className="font-medium text-[#1A3A4A]">{ing.name}</div><div className="text-xs text-gray-500">Base : {ing.quantity} {ing.unit}</div></div><div className="text-right text-gray-700 bg-white px-3 py-1 rounded-full text-sm border border-gray-200">{ing.adaptedQuantity.toFixed(2)} {ing.unit}</div></div>)}
              {adaptedBaseComponents.map((c, idx) => <div key={`c-${idx}`} className="flex justify-between items-center py-3 border-b border-gray-200"><div><div className="font-medium text-[#1A3A4A]">{c.name} <span className="text-xs text-gray-500">(recette de base)</span></div><div className="text-xs text-gray-500">Base : {c.quantity} {c.unit}</div></div><div className="text-right text-gray-700 bg-white px-3 py-1 rounded-full text-sm border border-gray-200">{c.adaptedQuantity.toFixed(2)} {c.unit}</div></div>)}
            </div>
          </div>
          <div>
            <h4 className="text-lg font-semibold text-[#1A3A4A] mb-3">Procédé / Préparation</h4>
            <div className="bg-amber-50 rounded-lg p-4 border-l-4 border-[#C8956C]">{normalized.procedure ? normalized.procedure.split("\n").map((step, idx) => <p key={idx} className="mb-2 last:mb-0">{step}</p>) : <p className="text-gray-500 italic">Aucun procédé renseigné</p>}</div>
          </div>
        </div>
      </div>
    </div>
  );
};

const RecipesManager = ({ ingredients, setIngredients, recipes, setRecipes, isChef, sectionType = "base" }) => {
  const normalizedRecipes = useMemo(() => recipes.map(normalizeRecipe), [recipes]);
  const [showForm, setShowForm] = useState(false);
  const [editingId, setEditingId] = useState(null);
  const [searchTerm, setSearchTerm] = useState("");
  const [categoryFilter, setCategoryFilter] = useState("Tous");
  const [detailRecipe, setDetailRecipe] = useState(null);
  const [adaptRecipe, setAdaptRecipe] = useState(null);
  const [showAddIngredientModal, setShowAddIngredientModal] = useState(false);

  const emptyForm = {
    recipeType: sectionType,
    categories: ["Entrée"],
    name: "",
    covers: 4,
    outputQuantity: 1,
    outputUnit: "Kg",
    directIngredients: [],
    baseComponents: [],
    procedure: "",
    wasteCoeff: 1.05,
  };

  const [formData, setFormData] = useState(emptyForm);
  const [currentIng, setCurrentIng] = useState({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
  const [currentBase, setCurrentBase] = useState({ baseRecipeId: "", quantity: "", unit: "Gramme", searchText: "", categoryFilter: "Tous" });

  const filteredBaseRecipesForPicker = filterBaseRecipesForPicker({
    recipes: normalizedRecipes,
    searchText: currentBase.searchText,
    categoryFilter: currentBase.categoryFilter,
  });

  const filteredIngredientsForSearch = filterIngredientsForPicker({
    ingredients,
    searchText: currentIng.searchText,
  });

  const filteredRecipes = filterRecipesForList({
    recipes: normalizedRecipes,
    searchTerm,
    sectionType,
    categoryFilter,
  });
  const theoreticalYield = useMemo(
    () => computeTheoreticalYieldFromDirectIngredients({ directIngredients: formData.directIngredients || [] }),
    [formData.directIngredients]
  );

  const resetForm = () => {
    setFormData({ ...emptyForm, recipeType: sectionType });
    setEditingId(null);
    setShowForm(false);
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
    setCurrentBase({ baseRecipeId: "", quantity: "", unit: "Gramme", searchText: "", categoryFilter: "Tous" });
  };

  const toggleRecipeCategory = (category) => {
    const alreadySelected = formData.categories.includes(category);
    const nextCategories = alreadySelected ? formData.categories.filter(c => c !== category) : [...formData.categories, category];
    setFormData({ ...formData, categories: nextCategories.length ? nextCategories : [category] });
  };

  const addIngredientToRecipe = (ingredientId = null) => {
    const finalIngredientId = ingredientId || currentIng.ingredientId;
    if (!finalIngredientId || !currentIng.quantity) return;
    const ing = ingredients.find(i => Number(i.id) === Number(finalIngredientId));
    if (!ing) return;
    const line = buildDirectIngredientLine({
      ingredient: ing,
      ingredientId: finalIngredientId,
      quantity: currentIng.quantity,
      unit: currentIng.unit,
      wasteCoeff: currentIng.wasteCoeff,
    });
    if (!line) return;
    setFormData({
      ...formData,
      directIngredients: [...formData.directIngredients, line]
    });
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
  };

  const addBaseComponentToRecipe = (baseRecipeId = null) => {
    const finalBaseRecipeId = baseRecipeId || currentBase.baseRecipeId;
    if (!finalBaseRecipeId || !currentBase.quantity) return;
    const baseRecipe = normalizedRecipes.find(r => Number(r.id) === Number(finalBaseRecipeId) && r.recipeType === "base");
    if (!baseRecipe) return;
    const line = buildBaseComponentLine({
      baseRecipe,
      baseRecipeId: finalBaseRecipeId,
      quantity: currentBase.quantity,
      unit: currentBase.unit,
    });
    if (!line) return;
    setFormData({
      ...formData,
      baseComponents: [...formData.baseComponents, line]
    });
    setCurrentBase({ baseRecipeId: "", quantity: "", unit: "Gramme", searchText: "", categoryFilter: currentBase.categoryFilter });
  };

  const handleAddNewIngredient = (newIngredient) => {
    setIngredients([...ingredients, newIngredient]);
    if (currentIng.quantity) {
      const line = buildDirectIngredientLine({
        ingredient: newIngredient,
        ingredientId: newIngredient.id,
        quantity: currentIng.quantity,
        unit: currentIng.unit || "Gramme",
        wasteCoeff: currentIng.wasteCoeff,
      });
      if (!line) return;
      setFormData({
        ...formData,
        directIngredients: [...formData.directIngredients, line]
      });
    }
    setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
  };

  const handleSubmit = (e) => {
    e.preventDefault();
    const validation = validateRecipeDraft(formData);
    if (!validation.valid) {
      alert(validation.message);
      return;
    }
    const payload = buildRecipePayload(formData, normalizeRecipe);
    setRecipes(upsertRecipe(recipes, payload, editingId));
    resetForm();
  };

  const handleEdit = (recipe) => {
    const normalized = normalizeRecipe(recipe);
    setFormData(normalized);
    setEditingId(normalized.id);
    setShowForm(true);
    setDetailRecipe(null);
  };

  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <AddIngredientModal isOpen={showAddIngredientModal} onClose={() => setShowAddIngredientModal(false)} onAdd={handleAddNewIngredient} suggestedName={currentIng.searchText} />
      <RecipeDetailModal recipe={detailRecipe} allRecipes={normalizedRecipes} ingredients={ingredients} isOpen={!!detailRecipe} onClose={() => setDetailRecipe(null)} isChef={isChef} />
      <AdaptModal recipe={adaptRecipe} recipes={normalizedRecipes} ingredients={ingredients} isOpen={!!adaptRecipe} onClose={() => setAdaptRecipe(null)} isChef={isChef} />

      <div className="flex flex-col lg:flex-row lg:justify-between lg:items-center gap-4 mb-6">
        <div>
          <h2 className="text-2xl font-bold text-[#1A3A4A]">{sectionType === "base" ? "Recettes de base" : "Recettes finales"}</h2>
          <p className="text-sm text-gray-500 mt-1">{sectionType === "base" ? "Création et gestion des préparations techniques." : "Création et gestion des plats finaux assemblés."}</p>
        </div>
        {isChef && <button onClick={() => setShowForm(!showForm)} className="bg-[#1A3A4A] text-white px-4 py-2 rounded-lg">{sectionType === "base" ? "+ Nouvelle recette de base" : "+ Nouvelle recette finale"}</button>}
      </div>

      {!showForm && (
        <div className="bg-white rounded-xl border border-gray-200 p-4 mb-6 space-y-4">
          <input type="text" placeholder={`Rechercher ${sectionType === "base" ? "une recette de base" : "une recette finale"}...`} value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="w-full px-4 py-3 rounded-lg border border-gray-300" />
          <div className="flex flex-wrap gap-2">
          {["Tous", ...SERVICE_CATEGORIES].map(cat => (
            <button key={cat} onClick={() => setCategoryFilter(cat)} className={`px-3 py-2 rounded-full text-sm ${categoryFilter === cat ? "bg-[#C8956C] text-white" : "bg-amber-50 text-[#7b5a42]"}`}>{cat}</button>
          ))}
          </div>
        </div>
      )}

      {showForm && (
        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-slate-100 space-y-6">
          <h3 className="text-lg font-semibold text-[#1A3A4A]">{editingId ? (sectionType === "base" ? "Modifier la recette de base" : "Modifier la recette finale") : (sectionType === "base" ? "Nouvelle recette de base" : "Nouvelle recette finale")}</h3>
          <p className="text-sm text-gray-500">{sectionType === "base" ? "Ce formulaire est dédié aux recettes de base." : "Ce formulaire est dédié aux recettes finales et permet d'ajouter des recettes de base."}</p>

          <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div>
              <label className="block text-sm font-medium text-gray-700 mb-1">Type</label>
              <select value={formData.recipeType} onChange={(e) => setFormData({ ...formData, recipeType: e.target.value, baseComponents: e.target.value === "base" ? [] : formData.baseComponents, outputUnit: e.target.value === "final" ? "Portion" : formData.outputUnit })} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                {RECIPE_TYPE_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
              </select>
            </div>
            <div className="md:col-span-2"><label className="block text-sm font-medium text-gray-700 mb-1">Nom</label><input type="text" value={formData.name} onChange={(e) => setFormData({ ...formData, name: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
          </div>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div className="bg-amber-50/40 border border-amber-100 rounded-lg p-4">
              <h4 className="text-sm font-semibold text-[#1A3A4A] mb-3">Rendement quantité</h4>
              <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div><label className="block text-sm font-medium text-gray-700 mb-1">Rendement produit</label><input type="number" min="0.01" step="0.01" value={formData.outputQuantity} onChange={(e) => setFormData({ ...formData, outputQuantity: parseFloat(e.target.value) || 1 })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
                <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité de rendement</label><select value={formData.outputUnit} onChange={(e) => setFormData({ ...formData, outputUnit: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300">{Array.from(new Set([...YIELD_UNITS, formData.outputUnit].filter(Boolean))).map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
              </div>
              <div className="mt-3 text-sm">
                {theoreticalYield ? (
                  <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">

                    <button
                      type="button"
                      onClick={() => setFormData({ ...formData, outputQuantity: Number(theoreticalYield.quantity), outputUnit: theoreticalYield.unit })}
                      className="px-3 py-1.5 rounded-lg bg-[#1A3A4A] text-white text-xs font-medium hover:bg-[#16303d]"
                    >
                      Utiliser ce rendement
                    </button>
                  </div>
                ) : (
                  <span className="text-gray-600">Rendement théorique non calculable automatiquement : unités incompatibles</span>
                )}
              </div>
            </div>
            <div className="bg-slate-50 border border-slate-200 rounded-lg p-4">
              <h4 className="text-sm font-semibold text-[#1A3A4A] mb-3">Rendement portions/couverts</h4>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Couverts (1 couvert = 1 portion)</label><input type="number" min="1" step="0.01" value={formData.covers} onChange={(e) => setFormData({ ...formData, covers: parseFloat(e.target.value) || 1 })} className="w-full px-3 py-2 rounded-lg border border-gray-300" required /></div>
            </div>
          </div>

          <div>
            <label className="block text-sm font-medium text-gray-700 mb-2">Sous-catégories d'affichage</label>
            <div className="flex flex-wrap gap-3">
              {SERVICE_CATEGORIES.map(cat => (
                <label key={cat} className={`px-3 py-2 rounded-lg border cursor-pointer ${formData.categories.includes(cat) ? "bg-[#C8956C] text-white border-[#C8956C]" : "bg-white text-gray-700 border-gray-300"}`}>
                  <input type="checkbox" className="hidden" checked={formData.categories.includes(cat)} onChange={() => toggleRecipeCategory(cat)} />
                  {cat}

              ))}
            </div>
          </div>

          <div className="bg-gray-50 rounded-lg p-4 border border-gray-200">
            <h4 className="font-medium text-gray-700 mb-3">Ingrédients directs</h4>

              <label className="block text-sm font-medium text-gray-700 mb-1">Rechercher un ingrédient</label>
              <input type="text" value={currentIng.searchText} onChange={(e) => setCurrentIng({ ...currentIng, searchText: e.target.value, ingredientId: "" })} placeholder="Tapez pour chercher..." className="w-full px-3 py-2 rounded-lg border border-gray-300" />
              {currentIng.searchText && !currentIng.ingredientId && (
                <div className="absolute z-10 w-full mt-1 bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">
                  {filteredIngredientsForSearch.length > 0 ? filteredIngredientsForSearch.map(ing => (
                    <button key={ing.id} type="button" onClick={() => setCurrentIng({ ...currentIng, ingredientId: ing.id, searchText: ing.name })} className="w-full text-left px-4 py-2 hover:bg-amber-50 flex justify-between"><span>{ing.name}</span><span className="text-sm text-gray-500">{formatDecimal(ing.price)}€/{ing.unit}</span></button>
                  )) : <div className="p-4 text-center"><p className="text-gray-500 text-sm mb-2">Aucun ingrédient trouvé</p><button type="button" onClick={() => setShowAddIngredientModal(true)} className="text-[#1A3A4A] font-medium text-sm">Créer "{currentIng.searchText}"</button></div>}
                </div>
              )}
            </div>
            <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Quantité</label><input type="number" step="any" value={currentIng.quantity} onChange={(e) => setCurrentIng({ ...currentIng, quantity: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité recette</label><select value={currentIng.unit} onChange={(e) => setCurrentIng({ ...currentIng, unit: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300">{UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
              <div><label className="block text-sm font-medium text-gray-700 mb-1">Coeff. perte</label><input type="number" step="0.01" value={currentIng.wasteCoeff} onChange={(e) => setCurrentIng({ ...currentIng, wasteCoeff: parseFloat(e.target.value) || 1 })} className="w-full px-3 py-2 rounded-lg border border-gray-300" /></div>
              <div className="flex items-end"><button type="button" onClick={() => addIngredientToRecipe()} disabled={!currentIng.ingredientId || !currentIng.quantity} className={`w-full py-2 rounded-lg font-medium ${currentIng.ingredientId && currentIng.quantity ? "bg-[#1A3A4A] text-white" : "bg-gray-300 text-gray-500 cursor-not-allowed"}`}>Ajouter</button></div>
            </div>

          {formData.recipeType === "final" && (
            <div className="bg-slate-50 rounded-lg p-4 border border-slate-200">
              <h4 className="font-medium text-gray-700 mb-3">Ajouter une recette de base</h4>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Filtrer les recettes de base par sous-catégorie</label>
                  <select value={currentBase.categoryFilter} onChange={(e) => setCurrentBase({ ...currentBase, categoryFilter: e.target.value, baseRecipeId: "", searchText: "" })} className="w-full px-3 py-2 rounded-lg border border-gray-300">
                    <option value="Tous">Toutes</option>
                    {SERVICE_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                  </select>
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Rechercher une recette de base</label>
                  <div className="relative">
                    <input type="text" value={currentBase.searchText} onChange={(e) => setCurrentBase({ ...currentBase, searchText: e.target.value, baseRecipeId: "" })} placeholder="Tapez pour chercher..." className="w-full px-3 py-2 rounded-lg border border-gray-300" />
                    {currentBase.searchText && !currentBase.baseRecipeId && (
                      <div className="absolute z-10 w-full mt-1 bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">
                        {filteredBaseRecipesForPicker.length > 0 ? filteredBaseRecipesForPicker.map(rec => (
                          <button key={rec.id} type="button" onClick={() => setCurrentBase({ ...currentBase, baseRecipeId: rec.id, searchText: rec.name, unit: rec.outputUnit || currentBase.unit })} className="w-full text-left px-4 py-2 hover:bg-slate-50 flex justify-between"><span>{rec.name}</span><span className="text-sm text-gray-500">{rec.categories.join(", ")}</span></button>

                      </div>

                  </div>

                <div><label className="block text-sm font-medium text-gray-700 mb-1">Unité utilisée</label><select value={currentBase.unit} onChange={(e) => setCurrentBase({ ...currentBase, unit: e.target.value })} className="w-full px-3 py-2 rounded-lg border border-gray-300">{UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}</select></div>
                <div className="flex items-end"><button type="button" onClick={() => addBaseComponentToRecipe()} disabled={!currentBase.baseRecipeId || !currentBase.quantity} className={`w-full py-2 rounded-lg font-medium ${currentBase.baseRecipeId && currentBase.quantity ? "bg-slate-700 text-white" : "bg-gray-300 text-gray-500 cursor-not-allowed"}`}>Ajouter la base</button></div>
              </div>

                  {formData.directIngredients.map((ing, idx) => <div key={idx} className="flex items-center justify-between bg-amber-50 px-4 py-2 rounded-lg"><span className="font-medium">{ing.name} - {ing.quantity} {ing.unit}</span><button type="button" onClick={() => setFormData({ ...formData, directIngredients: formData.directIngredients.filter((_, i) => i !== idx) })} className="text-red-500">✕</button></div>)}
                </div>
              </div>
              {formData.recipeType === "final" && (
                <div>
                  <h4 className="font-medium text-gray-700 mb-2">Recettes de base liées ({formData.baseComponents.length})</h4>
                  <div className="space-y-2">
                    {formData.baseComponents.map((component, idx) => <div key={idx} className="flex items-center justify-between bg-slate-50 px-4 py-2 rounded-lg border border-slate-200"><span className="font-medium">{component.name} - {component.quantity} {component.unit}</span><button type="button" onClick={() => setFormData({ ...formData, baseComponents: formData.baseComponents.filter((_, i) => i !== idx) })} className="text-red-500">✕</button></div>)}
                  </div>
                </div>
              )}
            </div>

        </form>

      {!showForm && (

                  {recipe.recipeType === "final" && <p>{recipe.baseComponents.length} recette(s) de base liée(s)</p>}
                  <p>Rendement : {recipe.outputQuantity} {recipe.outputUnit}</p>
                  {isChef && (costStatus.valid ? <p className="text-lg font-bold text-[#C8956C]">{Number(totalCost || 0).toFixed(2)}€ <span className="text-sm font-normal text-gray-500 ml-2">({recipe.covers > 0 ? (Number(totalCost || 0) / recipe.covers).toFixed(2) : "0.00"}€/couvert)</span></p> : <p className="text-sm text-red-600 font-medium">Coût indisponible</p>)}
                </div>
                <div className="flex space-x-2">
                  <button onClick={() => setDetailRecipe(recipe)} className="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg text-sm font-medium">Voir détail</button>
                  <button onClick={() => setAdaptRecipe(recipe)} className="flex-1 bg-[#C8956C] bg-opacity-10 text-[#C8956C] py-2 rounded-lg text-sm font-medium">Adapter</button>
                  {isChef && <><button onClick={() => handleEdit(recipe)} className="p-2 text-gray-600 bg-gray-50 rounded-lg">✎</button><button onClick={() => window.confirm("Supprimer cette recette ?") && setRecipes(recipes.filter(r => Number(r.id) !== Number(recipe.id)))} className="p-2 text-gray-600 bg-gray-50 rounded-lg">🗑</button></>}
                </div>
              </div>
            </div>
          );
          })}
        </div>
      )}
    </div>
  );
};


const ProducersView = ({ ingredients, suppliersRuntime }) => {
  const legacyProducers = Array.from(new Set((ingredients || []).map(ing => (ing.supplier || "").trim()).filter(Boolean))).sort((a, b) => a.localeCompare(b, "fr"));
  const producers = suppliersRuntime?.canaryActive ? suppliersRuntime.data : legacyProducers;
  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <div className="mb-6">
        <h2 className="text-2xl font-bold text-[#1A3A4A]">Fournisseurs</h2>
        <p className="text-sm text-gray-500 mt-1">Liste alimentée automatiquement depuis les fournisseurs renseignés dans les ingrédients.</p>
      </div>
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        {producers.length === 0 ? (
          <div className="p-6 text-gray-500">Aucun fournisseur renseigné pour le moment.</div>
        ) : (
          <table className="w-full">
            <thead className="bg-gray-50 border-b border-gray-200">
              <tr><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fournisseur</th></tr>
            </thead>
            <tbody className="divide-y divide-gray-200">
              {producers.map((producer, idx) => (
                <tr key={idx} className="hover:bg-gray-50"><td className="px-6 py-4 text-[#1A3A4A] font-medium">{producer}</td></tr>
              ))}
            </tbody>
          </table>
        )}
      </div>
    </div>
  );
};

const CostsView = ({ recipes, ingredients }) => {
  const normalizedRecipes = recipes.map(normalizeRecipe);
  const enriched = normalizedRecipes.map(recipe => ({ ...recipe, totalCost: calculateRecipeTotalCost(recipe, normalizedRecipes, new Set(), ingredients), status: getCostStatus(recipe, normalizedRecipes, ingredients) }));
  const validRecipes = enriched.filter(r => r.status.valid && r.totalCost != null);
  const avgCostPerRecipe = validRecipes.length ? validRecipes.reduce((sum, r) => sum + Number(r.totalCost || 0), 0) / validRecipes.length : 0;
  const mostExpensive = validRecipes.length ? validRecipes.reduce((max, r) => Number(r.totalCost || 0) > Number(max.totalCost || 0) ? r : max, validRecipes[0]) : null;
  const cheapest = validRecipes.length ? validRecipes.reduce((min, r) => Number(r.totalCost || 0) < Number(min.totalCost || 0) ? r : min, validRecipes[0]) : null;
  return (
    <div className="p-6 max-w-7xl mx-auto fade-in">
      <h2 className="text-2xl font-bold text-[#1A3A4A] mb-6">Analyse des Coûts</h2>
      <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Coût moyen</h3><p className="text-3xl font-bold text-[#1A3A4A]">{avgCostPerRecipe.toFixed(2)}€</p></div>
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Plus chère</h3><p className="text-lg font-bold truncate text-[#1A3A4A]">{mostExpensive?.name || "-"}</p><p className="text-2xl font-bold text-red-600">{mostExpensive ? Number(mostExpensive.totalCost || 0).toFixed(2) : "0.00"}€</p></div>
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Moins chère</h3><p className="text-lg font-bold truncate text-[#1A3A4A]">{cheapest?.name || "-"}</p><p className="text-2xl font-bold text-green-600">{cheapest ? Number(cheapest.totalCost || 0).toFixed(2) : "0.00"}€</p></div>
        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200"><h3 className="text-sm font-medium text-gray-500 mb-4">Ingrédients</h3><p className="text-3xl font-bold text-[#1A3A4A]">{ingredients.length}</p></div>
      </div>
      <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
        <div className="px-6 py-4 border-b border-gray-200"><h3 className="text-lg font-semibold text-[#1A3A4A]">Détail des coûts</h3></div>
        <table className="w-full">
          <thead className="bg-gray-50"><tr><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Recette</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Type</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Sous-catégories</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût total</th><th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût/couvert</th></tr></thead>
          <tbody className="divide-y divide-gray-200">{enriched.map(recipe => <tr key={recipe.id} className="hover:bg-gray-50"><td className="px-6 py-4 font-medium text-[#1A3A4A]">{recipe.name}</td><td className="px-6 py-4 text-gray-600">{recipe.recipeType === "base" ? "Base" : "Finale"}</td><td className="px-6 py-4 text-gray-600">{recipe.categories.join(", ")}</td><td className="px-6 py-4 font-bold text-[#C8956C]">{recipe.status.valid ? `${Number(recipe.totalCost || 0).toFixed(2)}€` : "N/A"}</td><td className="px-6 py-4 text-gray-600">{recipe.status.valid && recipe.covers > 0 ? `${(Number(recipe.totalCost || 0) / recipe.covers).toFixed(2)}€` : "N/A"}</td></tr>)}</tbody>
        </table>
      </div>
    </div>
  );
};

const App = () => {
  const [user, setUser] = useLocalStorage("arpege_user", null);
  const [ingredients, setIngredients] = useLocalStorage("arpege_ingredients", INITIAL_INGREDIENTS);
  const [recipes, setRecipes] = useLocalStorage("arpege_recipes", INITIAL_RECIPES);
  const [activeTab, setActiveTab] = useState("ingredients");

  useEffect(() => {
    if (!window.ArpegeLegacyMigration || !window.ArpegeMigrationReport || !window.ArpegeVersionedStorage || !window.ArpegeParallelRead) return;
    try {
      const result = window.ArpegeLegacyMigration.migrateLegacyData({ ingredients, recipes });
      const shadowReport = window.ArpegeMigrationReport.buildMigrationReport(result);
      window.ArpegeMigrationReport.printMigrationReport(shadowReport);
      const persistResult = window.ArpegeVersionedStorage.persistVersionedData({ migrationResult: result, storage: window.localStorage });
      const writeReport = window.ArpegeVersionedStorage.buildWriteReport({ migrationResult: result, persistResult });
      const v1Data = window.ArpegeParallelRead.readV1Data(window.localStorage);
      const crossCheckReport = window.ArpegeParallelRead.buildCrossCheckReport({ legacyData: { ingredients, recipes }, migrationResult: result, v1Data });
      const switchReadiness = window.ArpegeParallelRead.evaluateSwitchReadiness(crossCheckReport);
      const featureFlags = window.ArpegeParallelRead.getFeatureFlags(window.localStorage);
      window.__ARPEGE_SHADOW_MIGRATION__ = { result, shadowReport };
      window.__ARPEGE_V1_WRITE_REPORT__ = writeReport;
      window.__ARPEGE_V1_CROSS_CHECK_REPORT__ = crossCheckReport;
      window.__ARPEGE_V1_SWITCH_READINESS__ = switchReadiness;
      window.__ARPEGE_FEATURE_FLAGS__ = featureFlags;
    } catch (error) {
      console.error("[Shadow Migration] Échec de la migration en mémoire", error);
    }
  }, [ingredients, recipes]);

  if (!user) return <Login onLogin={setUser} />;
  const isChef = user.role === "chef";
  const suppliersRuntime = window.ArpegeRuntimeDataSource
    ? window.ArpegeRuntimeDataSource.resolveDataSourcesRuntime({
        legacyIngredients: ingredients,
        storage: window.localStorage,
        crossCheckReport: window.__ARPEGE_V1_CROSS_CHECK_REPORT__ || null,
        switchReadiness: window.__ARPEGE_V1_SWITCH_READINESS__ || { ready: false },
      }).suppliers
    : { source: "legacy", canaryActive: false, reason: "RUNTIME_DATA_SOURCE_UNAVAILABLE", data: [] };
  return (
    <div className="min-h-screen bg-gray-50">
      <Header user={user} onLogout={() => setUser(null)} activeTab={activeTab} setActiveTab={setActiveTab} />
      <main className="pb-12">
        {activeTab === "ingredients" && <IngredientsManager ingredients={ingredients} setIngredients={setIngredients} isChef={isChef} />}
        {activeTab === "baseRecipes" && <RecipesManager ingredients={ingredients} setIngredients={setIngredients} recipes={recipes} setRecipes={setRecipes} isChef={isChef} sectionType="base" />}
        {activeTab === "finalRecipes" && <RecipesManager ingredients={ingredients} setIngredients={setIngredients} recipes={recipes} setRecipes={setRecipes} isChef={isChef} sectionType="final" />}
        {activeTab === "producers" && <ProducersView ingredients={ingredients} suppliersRuntime={suppliersRuntime} />}
        {activeTab === "couts" && isChef && <CostsView recipes={recipes} ingredients={ingredients} />}
      </main>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
