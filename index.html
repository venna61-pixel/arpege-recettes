<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arpège - Gestion des Recettes</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .procedure-text { white-space: pre-wrap; line-height: 1.6; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useContext, createContext, useMemo } = React;
        
        const AuthContext = createContext(null);
        
        const INITIAL_INGREDIENTS = [
            { id: 1, category: "Laitage", name: "Crème fraîche", price: 2.50, unit: "Litre", supplier: "Laiterie du Nord" },
            { id: 2, category: "Boucherie", name: "Filet de bœuf", price: 28.00, unit: "Kg", supplier: "Boucherie Martin" },
            { id: 3, category: "Légumes", name: "Carottes", price: 1.20, unit: "Kg", supplier: "Maraîcher Local" },
            { id: 4, category: "Épicerie", name: "Huile d'olive", price: 8.50, unit: "Litre", supplier: "Oliviers du Sud" },
            { id: 5, category: "Boulangerie", name: "Pain de campagne", price: 3.20, unit: "Pièce", supplier: "Boulangerie Dupont" }
        ];

        const INITIAL_RECIPES = [
            {
                id: 1,
                category: "Entrée",
                name: "Velouté de potiron",
                covers: 4,
                ingredients: [
                    { ingredientId: 3, name: "Carottes", quantity: 0.5, unit: "Kg", wasteCoeff: 1.0, pricePerUnit: 1.20, unitPrice: "Kg" },
                    { ingredientId: 1, name: "Crème fraîche", quantity: 0.2, unit: "Litre", wasteCoeff: 1.05, pricePerUnit: 2.50, unitPrice: "Litre" }
                ],
                procedure: "1. Éplucher et couper le potiron en dés\n2. Faire revenir les oignons dans du beurre\n3. Ajouter le potiron et couvrir d'eau\n4. Laisser mijoter 25 minutes\n5. Mixer et ajouter la crème\n6. Assaisonner et servir chaud",
                wasteCoeff: 1.05,
                totalCost: 2.12
            }
        ];

        const UNITS = [
            "Bac", "Bib", "Barquette", "Bidon", "Bobine", "Bocal", "Boîte", "Boîte 1/4", "Boîte 1/8", 
            "Boîte 2/1", "Boîte 3/1", "Boîte 3/4", "Boîte 4/4", "Boîte 5/1", "Bombe", "Botte", "Bouteille", 
            "Brick", "Coffret", "Colis", "Distribute", "Étui", "Flacon", "Fut", "Kg", "Lot", "Litre", "Pack", 
            "Pain", "Paire", "Paquet", "Pièce", "Plaque", "Plateau", "Poche", "Pot", "Rouleau", "Sac", "Sachet", 
            "Seau", "Tablette", "Terrine", "Tube", "Tubo", "Unité", "Carton", "Cl", "Part", "Portion", "Gramme", "Ml"
        ];

        const CATEGORIES_ING = ["Laitage", "Boucherie", "Charcuterie", "Poissonnerie", "Fruits", "Légumes", "Épicerie", "Boulangerie", "Boissons", "Condiments", "Herbes", "Épices"];
        const CATEGORIES_REC = ["Entrée", "Plat", "Dessert", "Amuse-bouche", "Soupe", "Salade", "Boisson"];

        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });

            const setValue = (value) => {
                try {
                    const valueToStore = value instanceof Function ? value(storedValue) : value;
                    setStoredValue(valueToStore);
                    window.localStorage.setItem(key, JSON.stringify(valueToStore));
                } catch (error) {
                    console.error(error);
                }
            };

            return [storedValue, setValue];
        };

        const Login = ({ onLogin }) => {
            const [username, setUsername] = useState("");
            const [password, setPassword] = useState("");
            const [error, setError] = useState("");

            const handleSubmit = (e) => {
                e.preventDefault();
                if (username === "chef" && password === "chef123") {
                    onLogin({ role: "chef", name: "Chef Arpège" });
                } else if (username === "employe" && password === "employe123") {
                    onLogin({ role: "employe", name: "Employé" });
                } else {
                    setError("Identifiants incorrects. Essayez chef/chef123 ou employe/employe123");
                }
            };

            return (
                <div className="min-h-screen gradient-bg flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md fade-in">
                        <div className="text-center mb-8">
                            <div className="w-20 h-20 bg-gradient-to-br from-purple-600 to-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i data-lucide="utensils" className="w-10 h-10 text-white"></i>
                            </div>
                            <h1 className="text-3xl font-bold text-gray-800">Arpège</h1>
                            <p className="text-gray-500 mt-2">Gestion des Recettes</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Identifiant</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                                    placeholder="chef ou employe"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-2">Mot de passe</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600 focus:border-transparent transition-all"
                                    placeholder="••••••••"
                                />
                            </div>
                            {error && (
                                <div className="bg-red-50 text-red-600 px-4 py-3 rounded-lg text-sm">
                                    {error}
                                </div>
                            )}
                            <button
                                type="submit"
                                className="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-semibold hover:shadow-lg transform hover:-translate-y-0.5 transition-all"
                            >
                                Se connecter
                            </button>
                        </form>

                        <div className="mt-6 text-center text-sm text-gray-500">
                            <p>Comptes de démo :</p>
                            <p className="mt-1">Chef: chef / chef123</p>
                            <p>Employé: employe / employe123</p>
                        </div>
                    </div>
                </div>
            );
        };

        const Header = ({ user, onLogout, activeTab, setActiveTab }) => {
            const tabs = [
                { id: "recettes", label: "Recettes", icon: "book-open", roles: ["chef", "employe"] },
                { id: "ingredients", label: "Ingrédients", icon: "shopping-basket", roles: ["chef"] },
                { id: "couts", label: "Coûts", icon: "calculator", roles: ["chef"] },
            ];

            return (
                <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-50">
                    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                        <div className="flex justify-between items-center h-16">
                            <div className="flex items-center space-x-3">
                                <div className="w-10 h-10 bg-gradient-to-br from-purple-600 to-blue-600 rounded-lg flex items-center justify-center">
                                    <i data-lucide="utensils" className="w-5 h-5 text-white"></i>
                                </div>
                                <span className="text-xl font-bold bg-gradient-to-r from-purple-600 to-blue-600 bg-clip-text text-transparent">
                                    Arpège
                                </span>
                            </div>

                            <nav className="hidden md:flex space-x-1">
                                {tabs.filter(tab => tab.roles.includes(user.role)).map(tab => (
                                    <button
                                        key={tab.id}
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`flex items-center space-x-2 px-4 py-2 rounded-lg transition-all ${
                                            activeTab === tab.id
                                                ? "bg-purple-100 text-purple-700 font-medium"
                                                : "text-gray-600 hover:bg-gray-100"
                                        }`}
                                    >
                                        <i data-lucide={tab.icon} className="w-4 h-4"></i>
                                        <span>{tab.label}</span>
                                    </button>
                                ))}
                            </nav>

                            <div className="flex items-center space-x-4">
                                <div className="flex items-center space-x-2">
                                    <div className={`w-2 h-2 rounded-full ${user.role === "chef" ? "bg-purple-500" : "bg-blue-500"}`}></div>
                                    <span className="text-sm font-medium text-gray-700">{user.name}</span>
                                    <span className="text-xs px-2 py-1 rounded-full bg-gray-100 text-gray-600 uppercase">
                                        {user.role}
                                    </span>
                                </div>
                                <button
                                    onClick={onLogout}
                                    className="p-2 text-gray-400 hover:text-red-600 transition-colors"
                                >
                                    <i data-lucide="log-out" className="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </header>
            );
        };

        const IngredientsManager = ({ ingredients, setIngredients, isChef }) => {
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [formData, setFormData] = useState({
                category: CATEGORIES_ING[0],
                name: "",
                price: "",
                unit: "Kg",
                supplier: ""
            });

            const filteredIngredients = ingredients.filter(ing => 
                ing.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                ing.category.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const handleSubmit = (e) => {
                e.preventDefault();
                if (editingId) {
                    setIngredients(ingredients.map(ing => 
                        ing.id === editingId ? { ...formData, id: editingId, price: parseFloat(formData.price) } : ing
                    ));
                } else {
                    const newId = Math.max(...ingredients.map(i => i.id), 0) + 1;
                    setIngredients([...ingredients, { ...formData, id: newId, price: parseFloat(formData.price) }]);
                }
                resetForm();
            };

            const resetForm = () => {
                setFormData({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "" });
                setEditingId(null);
                setShowForm(false);
            };

            const handleEdit = (ing) => {
                setFormData(ing);
                setEditingId(ing.id);
                setShowForm(true);
            };

            const handleDelete = (id) => {
                if (window.confirm("Êtes-vous sûr de vouloir supprimer cet ingrédient ?")) {
                    setIngredients(ingredients.filter(ing => ing.id !== id));
                }
            };

            return (
                <div className="p-6 max-w-7xl mx-auto fade-in">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-gray-800">Gestion des Ingrédients</h2>
                        {isChef && (
                            <button
                                onClick={() => setShowForm(!showForm)}
                                className="flex items-center space-x-2 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors"
                            >
                                <i data-lucide="plus" className="w-4 h-4"></i>
                                <span>Nouvel ingrédient</span>
                            </button>
                        )}
                    </div>

                    <div className="mb-6 relative">
                        <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input
                            type="text"
                            placeholder="Rechercher un ingrédient..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600 focus:border-transparent"
                        />
                    </div>

                    {showForm && (
                        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-purple-100">
                            <h3 className="text-lg font-semibold mb-4 text-gray-800">
                                {editingId ? "Modifier l'ingrédient" : "Nouvel ingrédient"}
                            </h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                    >
                                        {CATEGORIES_ING.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nom</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Prix/Unité (€)</label>
                                    <input
                                        type="number"
                                        step="0.01"
                                        value={formData.price}
                                        onChange={(e) => setFormData({...formData, price: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Unité</label>
                                    <select
                                        value={formData.unit}
                                        onChange={(e) => setFormData({...formData, unit: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                    >
                                        {UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Fournisseur</label>
                                    <input
                                        type="text"
                                        value={formData.supplier}
                                        onChange={(e) => setFormData({...formData, supplier: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                    />
                                </div>
                            </div>
                            <div className="mt-4 flex space-x-3">
                                <button type="submit" className="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700">
                                    {editingId ? "Mettre à jour" : "Ajouter"}
                                </button>
                                <button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                                    Annuler
                                </button>
                            </div>
                        </form>
                    )}

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Catégorie</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nom</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Prix</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Unité</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Fournisseur</th>
                                    {isChef && <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>}
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {filteredIngredients.map(ing => (
                                    <tr key={ing.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4 whitespace-nowrap">
                                            <span className="px-2 inline-flex text-xs leading-5 font-semibold rounded-full bg-purple-100 text-purple-800">
                                                {ing.category}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 whitespace-nowrap font-medium text-gray-900">{ing.name}</td>
                                        <td className="px-6 py-4 whitespace-nowrap text-gray-600">{ing.price.toFixed(2)} €</td>
                                        <td className="px-6 py-4 whitespace-nowrap text-gray-600">{ing.unit}</td>
                                        <td className="px-6 py-4 whitespace-nowrap text-gray-600">{ing.supplier}</td>
                                        {isChef && (
                                            <td className="px-6 py-4 whitespace-nowrap text-sm font-medium">
                                                <button onClick={() => handleEdit(ing)} className="text-indigo-600 hover:text-indigo-900 mr-3">
                                                    <i data-lucide="edit" className="w-4 h-4"></i>
                                                </button>
                                                <button onClick={() => handleDelete(ing.id)} className="text-red-600 hover:text-red-900">
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </td>
                                        )}
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const AddIngredientModal = ({ isOpen, onClose, onAdd }) => {
            const [formData, setFormData] = useState({
                category: CATEGORIES_ING[0],
                name: "",
                price: "",
                unit: "Kg",
                supplier: ""
            });

            if (!isOpen) return null;

            const handleSubmit = (e) => {
                e.preventDefault();
                const newId = Date.now();
                const newIngredient = {
                    ...formData,
                    id: newId,
                    price: parseFloat(formData.price)
                };
                onAdd(newIngredient);
                onClose();
                setFormData({ category: CATEGORIES_ING[0], name: "", price: "", unit: "Kg", supplier: "" });
            };

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-lg w-full slide-in">
                        <div className="p-6 border-b border-gray-200">
                            <div className="flex justify-between items-center">
                                <h3 className="text-xl font-bold text-gray-800">Nouvel ingrédient</h3>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                            </div>
                            <p className="text-sm text-gray-500 mt-1">Cet ingrédient sera ajouté à la base de données et à votre recette</p>
                        </div>
                        
                        <form onSubmit={handleSubmit} className="p-6 space-y-4">
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Catégorie *</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        required
                                    >
                                        {CATEGORIES_ING.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nom *</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        placeholder="Ex: Saumon frais"
                                        required
                                    />
                                </div>
                            </div>
                            
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Prix par unité (€) *</label>
                                    <input
                                        type="number"
                                        step="0.01"
                                        min="0"
                                        value={formData.price}
                                        onChange={(e) => setFormData({...formData, price: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        placeholder="0.00"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Unité de base *</label>
                                    <select
                                        value={formData.unit}
                                        onChange={(e) => setFormData({...formData, unit: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        required
                                    >
                                        {UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}
                                    </select>
                                </div>
                            </div>
                            
                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">Fournisseur</label>
                                <input
                                    type="text"
                                    value={formData.supplier}
                                    onChange={(e) => setFormData({...formData, supplier: e.target.value})}
                                    className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                    placeholder="Nom du fournisseur (optionnel)"
                                />
                            </div>

                            <div className="flex space-x-3 pt-4">
                                <button
                                    type="submit"
                                    className="flex-1 bg-purple-600 text-white py-3 rounded-lg font-medium hover:bg-purple-700 transition-colors"
                                >
                                    Ajouter et sélectionner
                                </button>
                                <button
                                    type="button"
                                    onClick={onClose}
                                    className="px-6 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition-colors"
                                >
                                    Annuler
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const RecipeDetailModal = ({ recipe, isOpen, onClose, isChef }) => {
            if (!isOpen || !recipe) return null;

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto slide-in">
                        <div className="p-6 border-b border-gray-200">
                            <div className="flex justify-between items-center">
                                <div>
                                    <span className="px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-800 mb-2 inline-block">
                                        {recipe.category}
                                    </span>
                                    <h3 className="text-2xl font-bold text-gray-800">{recipe.name}</h3>
                                </div>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600">
                                    <i data-lucide="x" className="w-6 h-6"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div className="p-6 space-y-6">
                            {/* Ingrédients */}
                            <div>
                                <h4 className="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                                    <i data-lucide="shopping-basket" className="w-5 h-5 mr-2 text-purple-600"></i>
                                    Ingrédients ({recipe.covers} couverts)
                                </h4>
                                <div className="bg-gray-50 rounded-lg p-4">
                                    <table className="w-full">
                                        <thead>
                                            <tr className="text-left text-xs font-medium text-gray-500 uppercase">
                                                <th className="pb-2">Ingrédient</th>
                                                <th className="pb-2">Quantité</th>
                                                {isChef && <th className="pb-2 text-right">Coût</th>}
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-200">
                                            {recipe.ingredients.map((ing, idx) => (
                                                <tr key={idx}>
                                                    <td className="py-2 font-medium text-gray-800">{ing.name}</td>
                                                    <td className="py-2 text-gray-600">{ing.quantity} {ing.unit}</td>
                                                    {isChef && (
                                                        <td className="py-2 text-right text-purple-600 font-medium">
                                                            {(ing.quantity * ing.pricePerUnit * ing.wasteCoeff).toFixed(2)}€
                                                        </td>
                                                    )}
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            {/* Procédé */}
                            <div>
                                <h4 className="text-lg font-semibold text-gray-800 mb-3 flex items-center">
                                    <i data-lucide="list-ordered" className="w-5 h-5 mr-2 text-purple-600"></i>
                                    Procédé / Préparation
                                </h4>
                                <div className="bg-yellow-50 rounded-lg p-4 border-l-4 border-yellow-400">
                                    {recipe.procedure ? (
                                        <div className="procedure-text text-gray-800">
                                            {recipe.procedure.split('\n').map((step, idx) => (
                                                <p key={idx} className="mb-2">{step}</p>
                                            ))}
                                        </div>
                                    ) : (
                                        <p className="text-gray-500 italic">Aucun procédé renseigné</p>
                                    )}
                                </div>
                            </div>

                            {/* Coûts */}
                            {isChef && (
                                <div className="bg-purple-50 rounded-lg p-4">
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="font-semibold text-purple-900">Coût total:</span>
                                        <span className="text-2xl font-bold text-purple-600">{recipe.totalCost?.toFixed(2)}€</span>
                                    </div>
                                    <div className="flex justify-between items-center text-sm text-purple-700">
                                        <span>Coût par couvert:</span>
                                        <span>{(recipe.totalCost / recipe.covers).toFixed(2)}€</span>
                                    </div>
                                    <div className="mt-2 text-xs text-purple-600">
                                        Coefficient de perte: {recipe.wasteCoeff || 1}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const RecipesManager = ({ ingredients, setIngredients, recipes, setRecipes, isChef }) => {
            const [showForm, setShowForm] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [searchTerm, setSearchTerm] = useState("");
            const [selectedRecipe, setSelectedRecipe] = useState(null);
            const [adaptMode, setAdaptMode] = useState(false);
            const [adaptParams, setAdaptParams] = useState({ covers: 4, quantity: 1, budget: null });
            const [showAddIngredientModal, setShowAddIngredientModal] = useState(false);
            const [showDetailModal, setShowDetailModal] = useState(false);
            const [detailRecipe, setDetailRecipe] = useState(null);
            
            const [formData, setFormData] = useState({
                category: CATEGORIES_REC[0],
                name: "",
                covers: 4,
                ingredients: [],
                procedure: "",
                wasteCoeff: 1.05
            });

            const [currentIng, setCurrentIng] = useState({
                ingredientId: "",
                quantity: "",
                unit: "Gramme",
                wasteCoeff: 1.0,
                searchText: ""
            });

            const filteredRecipes = recipes.filter(recipe => 
                recipe.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                recipe.category.toLowerCase().includes(searchTerm.toLowerCase())
            );

            const filteredIngredientsForSearch = ingredients.filter(ing => 
                ing.name.toLowerCase().includes(currentIng.searchText.toLowerCase())
            );

            const addIngredientToRecipe = (ingredientId = null) => {
                const finalIngredientId = ingredientId || currentIng.ingredientId;
                if (!finalIngredientId || !currentIng.quantity) return;
                
                const ing = ingredients.find(i => i.id === parseInt(finalIngredientId));
                if (!ing) return;
                
                setFormData({
                    ...formData,
                    ingredients: [...formData.ingredients, {
                        ingredientId: parseInt(finalIngredientId),
                        name: ing.name,
                        quantity: parseFloat(currentIng.quantity),
                        unit: currentIng.unit,
                        wasteCoeff: parseFloat(currentIng.wasteCoeff),
                        pricePerUnit: ing.price,
                        unitPrice: ing.unit
                    }]
                });
                setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
            };

            const handleAddNewIngredient = (newIngredient) => {
                setIngredients([...ingredients, newIngredient]);
                setFormData({
                    ...formData,
                    ingredients: [...formData.ingredients, {
                        ingredientId: newIngredient.id,
                        name: newIngredient.name,
                        quantity: parseFloat(currentIng.quantity) || 0,
                        unit: currentIng.unit || "Gramme",
                        wasteCoeff: parseFloat(currentIng.wasteCoeff) || 1.0,
                        pricePerUnit: newIngredient.price,
                        unitPrice: newIngredient.unit
                    }]
                });
                setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
            };

            const removeIngredientFromRecipe = (index) => {
                setFormData({
                    ...formData,
                    ingredients: formData.ingredients.filter((_, i) => i !== index)
                });
            };

            const calculateCost = (recipe, params = null) => {
                let totalCost = 0;
                const multiplier = params ? (params.covers / recipe.covers) * params.quantity : 1;
                
                recipe.ingredients.forEach(ing => {
                    const baseCost = (ing.quantity * ing.pricePerUnit) * multiplier;
                    const wasteCost = baseCost * (ing.wasteCoeff || 1);
                    totalCost += wasteCost;
                });
                
                return totalCost * (recipe.wasteCoeff || 1);
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (formData.ingredients.length === 0) {
                    alert("Ajoutez au moins un ingrédient");
                    return;
                }
                
                const cost = calculateCost({ ...formData, ingredients: formData.ingredients });
                
                if (editingId) {
                    setRecipes(recipes.map(r => 
                        r.id === editingId ? { ...formData, id: editingId, totalCost: cost } : r
                    ));
                } else {
                    const newId = Math.max(...recipes.map(r => r.id), 0) + 1;
                    setRecipes([...recipes, { ...formData, id: newId, totalCost: cost }]);
                }
                resetForm();
            };

            const resetForm = () => {
                setFormData({ category: CATEGORIES_REC[0], name: "", covers: 4, ingredients: [], procedure: "", wasteCoeff: 1.05 });
                setEditingId(null);
                setShowForm(false);
                setCurrentIng({ ingredientId: "", quantity: "", unit: "Gramme", wasteCoeff: 1.0, searchText: "" });
            };

            const handleEdit = (recipe) => {
                setFormData(recipe);
                setEditingId(recipe.id);
                setShowForm(true);
            };

            const handleDelete = (id) => {
                if (window.confirm("Êtes-vous sûr de vouloir supprimer cette recette ?")) {
                    setRecipes(recipes.filter(r => r.id !== id));
                }
            };

            const openAdapt = (recipe) => {
                setSelectedRecipe(recipe);
                setAdaptParams({ covers: recipe.covers, quantity: 1, budget: null });
                setAdaptMode(true);
            };

            const openDetail = (recipe) => {
                setDetailRecipe(recipe);
                setShowDetailModal(true);
            };

            const getAdaptedIngredients = () => {
                if (!selectedRecipe) return [];
                const multiplier = (adaptParams.covers / selectedRecipe.covers) * adaptParams.quantity;
                return selectedRecipe.ingredients.map(ing => ({
                    ...ing,
                    adaptedQuantity: ing.quantity * multiplier
                }));
            };

            const adaptedCost = selectedRecipe ? calculateCost(selectedRecipe, adaptParams) : 0;

            return (
                <div className="p-6 max-w-7xl mx-auto fade-in">
                    <AddIngredientModal 
                        isOpen={showAddIngredientModal}
                        onClose={() => setShowAddIngredientModal(false)}
                        onAdd={handleAddNewIngredient}
                    />

                    <RecipeDetailModal 
                        recipe={detailRecipe}
                        isOpen={showDetailModal}
                        onClose={() => setShowDetailModal(false)}
                        isChef={isChef}
                    />

                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-gray-800">Gestion des Recettes</h2>
                        {isChef && (
                            <button
                                onClick={() => setShowForm(!showForm)}
                                className="flex items-center space-x-2 bg-purple-600 text-white px-4 py-2 rounded-lg hover:bg-purple-700 transition-colors"
                            >
                                <i data-lucide="plus" className="w-4 h-4"></i>
                                <span>Nouvelle recette</span>
                            </button>
                        )}
                    </div>

                    <div className="mb-6 relative">
                        <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                        <input
                            type="text"
                            placeholder="Rechercher une recette..."
                            value={searchTerm}
                            onChange={(e) => setSearchTerm(e.target.value)}
                            className="w-full pl-10 pr-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600 focus:border-transparent"
                        />
                    </div>

                    {showForm && (
                        <form onSubmit={handleSubmit} className="bg-white rounded-xl shadow-lg p-6 mb-6 border border-purple-100">
                            <h3 className="text-lg font-semibold mb-4 text-gray-800">
                                {editingId ? "Modifier la recette" : "Nouvelle recette"}
                            </h3>
                            
                            <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
                                    <select
                                        value={formData.category}
                                        onChange={(e) => setFormData({...formData, category: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                    >
                                        {CATEGORIES_REC.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                    </select>
                                </div>
                                <div className="md:col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Nom de la recette</label>
                                    <input
                                        type="text"
                                        value={formData.name}
                                        onChange={(e) => setFormData({...formData, name: e.target.value})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        required
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Couverts de base</label>
                                    <input
                                        type="number"
                                        value={formData.covers}
                                        onChange={(e) => setFormData({...formData, covers: parseInt(e.target.value)})}
                                        className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        min="1"
                                        required
                                    />
                                </div>
                            </div>

                            {/* Section Ingrédients */}
                            <div className="bg-gray-50 rounded-lg p-4 mb-4">
                                <h4 className="font-medium text-gray-700 mb-3 flex items-center">
                                    <i data-lucide="shopping-basket" className="w-4 h-4 mr-2"></i>
                                    Ingrédients
                                </h4>
                                
                                <div className="relative mb-3">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Rechercher un ingrédient</label>
                                    <div className="relative">
                                        <i data-lucide="search" className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400 w-4 h-4"></i>
                                        <input
                                            type="text"
                                            value={currentIng.searchText}
                                            onChange={(e) => setCurrentIng({...currentIng, searchText: e.target.value})}
                                            placeholder="Tapez pour chercher..."
                                            className="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        />
                                    </div>
                                    
                                    {currentIng.searchText && (
                                        <div className="absolute z-10 w-full mt-1 bg-white rounded-lg shadow-lg border border-gray-200 max-h-60 overflow-y-auto">
                                            {filteredIngredientsForSearch.length > 0 ? (
                                                filteredIngredientsForSearch.map(ing => (
                                                    <button
                                                        key={ing.id}
                                                        type="button"
                                                        onClick={() => {
                                                            setCurrentIng({...currentIng, ingredientId: ing.id, searchText: ing.name});
                                                        }}
                                                        className="w-full text-left px-4 py-2 hover:bg-purple-50 flex justify-between items-center"
                                                    >
                                                        <span className="font-medium">{ing.name}</span>
                                                        <span className="text-sm text-gray-500">{ing.price}€/{ing.unit}</span>
                                                    </button>
                                                ))
                                            ) : (
                                                <div className="p-4 text-center">
                                                    <p className="text-gray-500 text-sm mb-2">Aucun ingrédient trouvé</p>
                                                    <button
                                                        type="button"
                                                        onClick={() => setShowAddIngredientModal(true)}
                                                        className="text-purple-600 font-medium text-sm hover:text-purple-800 flex items-center justify-center space-x-1"
                                                    >
                                                        <i data-lucide="plus-circle" className="w-4 h-4"></i>
                                                        <span>Créer "{currentIng.searchText}"</span>
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    )}
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-4 gap-3">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Quantité</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            placeholder="Ex: 200"
                                            value={currentIng.quantity}
                                            onChange={(e) => setCurrentIng({...currentIng, quantity: e.target.value})}
                                            className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Unité</label>
                                        <select
                                            value={currentIng.unit}
                                            onChange={(e) => setCurrentIng({...currentIng, unit: e.target.value})}
                                            className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        >
                                            {UNITS.map(unit => <option key={unit} value={unit}>{unit}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Coeff. perte</label>
                                        <input
                                            type="number"
                                            step="0.01"
                                            placeholder="1.0"
                                            value={currentIng.wasteCoeff}
                                            onChange={(e) => setCurrentIng({...currentIng, wasteCoeff: parseFloat(e.target.value)})}
                                            className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                        />
                                    </div>
                                    <div className="flex items-end">
                                        <button
                                            type="button"
                                            onClick={() => addIngredientToRecipe()}
                                            disabled={!currentIng.ingredientId || !currentIng.quantity}
                                            className={`w-full py-2 rounded-lg font-medium transition-colors ${
                                                currentIng.ingredientId && currentIng.quantity
                                                    ? "bg-purple-600 text-white hover:bg-purple-700"
                                                    : "bg-gray-300 text-gray-500 cursor-not-allowed"
                                            }`}
                                        >
                                            Ajouter
                                        </button>
                                    </div>
                                </div>

                                <button
                                    type="button"
                                    onClick={() => setShowAddIngredientModal(true)}
                                    className="mt-3 text-sm text-purple-600 hover:text-purple-800 font-medium flex items-center space-x-1"
                                >
                                    <i data-lucide="plus-circle" className="w-4 h-4"></i>
                                    <span>Créer un nouvel ingrédient qui n'existe pas</span>
                                </button>
                            </div>

                            {/* Section Procédé */}
                            <div className="bg-yellow-50 rounded-lg p-4 mb-4 border-l-4 border-yellow-400">
                                <h4 className="font-medium text-gray-700 mb-3 flex items-center">
                                    <i data-lucide="list-ordered" className="w-4 h-4 mr-2"></i>
                                    Procédé / Préparation
                                </h4>
                                <textarea
                                    value={formData.procedure}
                                    onChange={(e) => setFormData({...formData, procedure: e.target.value})}
                                    placeholder="Décrivez ici les étapes de préparation de la recette...&#10;1. Préchauffer le four à 180°C&#10;2. Mélanger les ingrédients secs&#10;3. Ajouter les ingrédients liquides&#10;4. Enfourner pendant 30 minutes..."
                                    className="w-full h-40 px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600 focus:border-transparent resize-none"
                                />
                                <p className="text-xs text-gray-500 mt-2">
                                    <i data-lucide="info" className="w-3 h-3 inline mr-1"></i>
                                    Décrivez les étapes de préparation, les temps de cuisson, les températures, les astuces...
                                </p>
                            </div>

                            {formData.ingredients.length > 0 && (
                                <div className="mb-4">
                                    <h4 className="font-medium text-gray-700 mb-2">Ingrédients de la recette ({formData.ingredients.length})</h4>
                                    <div className="space-y-2">
                                        {formData.ingredients.map((ing, idx) => (
                                            <div key={idx} className="flex items-center justify-between bg-purple-50 px-4 py-3 rounded-lg">
                                                <div className="flex-1">
                                                    <span className="font-medium text-gray-800">{ing.name}</span>
                                                    <span className="text-gray-600 ml-2">- {ing.quantity} {ing.unit}</span>
                                                    {isChef && (
                                                        <span className="text-purple-600 ml-2 text-sm">
                                                            ({(ing.quantity * ing.pricePerUnit * ing.wasteCoeff).toFixed(2)}€)
                                                        </span>
                                                    )}
                                                </div>
                                                <button
                                                    type="button"
                                                    onClick={() => removeIngredientFromRecipe(idx)}
                                                    className="text-red-500 hover:text-red-700 p-1"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            <div className="flex items-center space-x-4 mb-4 bg-gray-50 p-3 rounded-lg">
                                <label className="text-sm font-medium text-gray-700">Coefficient de perte global:</label>
                                <input
                                    type="number"
                                    step="0.01"
                                    value={formData.wasteCoeff}
                                    onChange={(e) => setFormData({...formData, wasteCoeff: parseFloat(e.target.value)})}
                                    className="w-24 px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                />
                                <span className="text-sm text-gray-500">(ex: 1.05 pour 5% de perte)</span>
                            </div>

                            <div className="flex space-x-3">
                                <button type="submit" className="bg-purple-600 text-white px-6 py-2 rounded-lg hover:bg-purple-700 font-medium">
                                    {editingId ? "Mettre à jour la recette" : "Créer la recette"}
                                </button>
                                <button type="button" onClick={resetForm} className="bg-gray-200 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-300">
                                    Annuler
                                </button>
                            </div>
                        </form>
                    )}

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filteredRecipes.map(recipe => (
                            <div key={recipe.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
                                <div className="p-6">
                                    <div className="flex justify-between items-start mb-4">
                                        <span className="px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-800">
                                            {recipe.category}
                                        </span>
                                        <span className="text-sm text-gray-500">{recipe.covers} couverts</span>
                                    </div>
                                    <h3 className="text-lg font-bold text-gray-800 mb-2">{recipe.name}</h3>
                                    <div className="space-y-1 mb-4">
                                        <p className="text-sm text-gray-600">{recipe.ingredients.length} ingrédient(s)</p>
                                        {recipe.procedure && (
                                            <p className="text-xs text-yellow-600 flex items-center">
                                                <i data-lucide="check-circle" className="w-3 h-3 mr-1"></i>
                                                Procédé renseigné
                                            </p>
                                        )}
                                        {isChef && (
                                            <div className="mt-2 p-2 bg-purple-50 rounded-lg">
                                                <p className="text-lg font-bold text-purple-600">
                                                    {recipe.totalCost?.toFixed(2)}€
                                                    <span className="text-sm font-normal text-gray-500 ml-2">
                                                        ({(recipe.totalCost / recipe.covers).toFixed(2)}€/couvert)
                                                    </span>
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                    <div className="flex space-x-2">
                                        <button
                                            onClick={() => openDetail(recipe)}
                                            className="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition-colors text-sm font-medium"
                                        >
                                            Voir détail
                                        </button>
                                        <button
                                            onClick={() => openAdapt(recipe)}
                                            className="flex-1 bg-blue-50 text-blue-600 py-2 rounded-lg hover:bg-blue-100 transition-colors text-sm font-medium"
                                        >
                                            Adapter
                                        </button>
                                        {isChef && (
                                            <>
                                                <button
                                                    onClick={() => handleEdit(recipe)}
                                                    className="p-2 text-gray-600 hover:text-purple-600 bg-gray-50 rounded-lg"
                                                >
                                                    <i data-lucide="edit" className="w-4 h-4"></i>
                                                </button>
                                                <button
                                                    onClick={() => handleDelete(recipe.id)}
                                                    className="p-2 text-gray-600 hover:text-red-600 bg-gray-50 rounded-lg"
                                                >
                                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                </button>
                                            </>
                                        )}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>

                    {adaptMode && selectedRecipe && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto">
                                <div className="p-6 border-b border-gray-200">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-xl font-bold text-gray-800">Adapter: {selectedRecipe.name}</h3>
                                        <button onClick={() => setAdaptMode(false)} className="text-gray-400 hover:text-gray-600">
                                            <i data-lucide="x" className="w-6 h-6"></i>
                                        </button>
                                    </div>
                                </div>
                                <div className="p-6">
                                    <div className="grid grid-cols-3 gap-4 mb-6">
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Couverts</label>
                                            <input
                                                type="number"
                                                value={adaptParams.covers}
                                                onChange={(e) => setAdaptParams({...adaptParams, covers: parseInt(e.target.value)})}
                                                className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                                min="1"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Quantité</label>
                                            <input
                                                type="number"
                                                value={adaptParams.quantity}
                                                onChange={(e) => setAdaptParams({...adaptParams, quantity: parseInt(e.target.value)})}
                                                className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                                min="1"
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Budget max (€)</label>
                                            <input
                                                type="number"
                                                value={adaptParams.budget || ""}
                                                onChange={(e) => setAdaptParams({...adaptParams, budget: e.target.value ? parseFloat(e.target.value) : null})}
                                                className="w-full px-3 py-2 rounded-lg border border-gray-300 focus:ring-2 focus:ring-purple-600"
                                                placeholder="Optionnel"
                                            />
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 rounded-lg p-4 mb-6">
                                        <h4 className="font-semibold text-gray-700 mb-3">Ingrédients adaptés</h4>
                                        <div className="space-y-2">
                                            {getAdaptedIngredients().map((ing, idx) => (
                                                <div key={idx} className="flex justify-between items-center py-2 border-b border-gray-200 last:border-0">
                                                    <span className="font-medium">{ing.name}</span>
                                                    <span className="text-gray-600">
                                                        {ing.adaptedQuantity.toFixed(2)} {ing.unit}
                                                    </span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="bg-purple-50 rounded-lg p-4 mb-6">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="font-semibold text-purple-900">Coût total estimé:</span>
                                            <span className="text-2xl font-bold text-purple-600">{adaptedCost.toFixed(2)}€</span>
                                        </div>
                                        <div className="flex justify-between items-center text-sm text-purple-700">
                                            <span>Coût par couvert:</span>
                                            <span>{(adaptedCost / adaptParams.covers).toFixed(2)}€</span>
                                        </div>
                                        {adaptParams.budget && (
                                            <div className={`mt-2 text-sm font-medium ${adaptedCost <= adaptParams.budget ? 'text-green-600' : 'text-red-600'}`}>
                                                {adaptedCost <= adaptParams.budget ? "✓ Dans le budget" : "✗ Dépasse le budget"}
                                            </div>
                                        )}
                                    </div>

                                    <button
                                        onClick={() => setAdaptMode(false)}
                                        className="w-full bg-purple-600 text-white py-3 rounded-lg hover:bg-purple-700 font-medium"
                                    >
                                        Fermer
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CostsView = ({ recipes, ingredients }) => {
            const totalRecipesCost = recipes.reduce((sum, r) => sum + (r.totalCost || 0), 0);
            const avgCostPerRecipe = recipes.length ? totalRecipesCost / recipes.length : 0;
            const mostExpensiveRecipe = recipes.length ? recipes.reduce((max, r) => (r.totalCost > max.totalCost ? r : max), recipes[0]) : null;
            const cheapestRecipe = recipes.length ? recipes.reduce((min, r) => (r.totalCost < min.totalCost ? r : min), recipes[0]) : null;

            return (
                <div className="p-6 max-w-7xl mx-auto fade-in">
                    <h2 className="text-2xl font-bold text-gray-800 mb-6">Analyse des Coûts</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-sm font-medium text-gray-500">Coût moyen/recette</h3>
                                <i data-lucide="trending-up" className="w-5 h-5 text-purple-600"></i>
                            </div>
                            <p className="text-3xl font-bold text-gray-800">{avgCostPerRecipe.toFixed(2)}€</p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-sm font-medium text-gray-500">Recette la plus chère</h3>
                                <i data-lucide="arrow-up-circle" className="w-5 h-5 text-red-600"></i>
                            </div>
                            <p className="text-lg font-bold text-gray-800 truncate">{mostExpensiveRecipe?.name || "-"}</p>
                            <p className="text-2xl font-bold text-red-600">{mostExpensiveRecipe?.totalCost?.toFixed(2) || "0"}€</p>
                        </div>
                        
                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-sm font-medium text-gray-500">Recette la moins chère</h3>
                                <i data-lucide="arrow-down-circle" className="w-5 h-5 text-green-600"></i>
                            </div>
                            <p className="text-lg font-bold text-gray-800 truncate">{cheapestRecipe?.name || "-"}</p>
                            <p className="text-2xl font-bold text-green-600">{cheapestRecipe?.totalCost?.toFixed(2) || "0"}€</p>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                            <div className="flex items-center justify-between mb-4">
                                <h3 className="text-sm font-medium text-gray-500">Total ingrédients</h3>
                                <i data-lucide="shopping-basket" className="w-5 h-5 text-blue-600"></i>
                            </div>
                            <p className="text-3xl font-bold text-gray-800">{ingredients.length}</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="px-6 py-4 border-b border-gray-200">
                            <h3 className="text-lg font-semibold text-gray-800">Détail des coûts par recette</h3>
                        </div>
                        <table className="w-full">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Recette</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Catégorie</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Couverts</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût total</th>
                                    <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Coût/couvert</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {recipes.map(recipe => (
                                    <tr key={recipe.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4 font-medium text-gray-900">{recipe.name}</td>
                                        <td className="px-6 py-4 text-gray-600">{recipe.category}</td>
                                        <td className="px-6 py-4 text-gray-600">{recipe.covers}</td>
                                        <td className="px-6 py-4 font-bold text-purple-600">{recipe.totalCost?.toFixed(2)}€</td>
                                        <td className="px-6 py-4 text-gray-600">({(recipe.totalCost / recipe.covers).toFixed(2)}€</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [user, setUser] = useLocalStorage("arpege_user", null);
            const [ingredients, setIngredients] = useLocalStorage("arpege_ingredients", INITIAL_INGREDIENTS);
            const [recipes, setRecipes] = useLocalStorage("arpege_recipes", INITIAL_RECIPES);
            const [activeTab, setActiveTab] = useState("recettes");

            useEffect(() => {
                lucide.createIcons();
            }, [user, activeTab, ingredients, recipes]);

            const handleLogin = (userData) => {
                setUser(userData);
            };

            const handleLogout = () => {
                setUser(null);
            };

            if (!user) {
                return <Login onLogin={handleLogin} />;
            }

            const isChef = user.role === "chef";

            return (
                <div className="min-h-screen bg-gray-50">
                    <Header 
                        user={user} 
                        onLogout={handleLogout} 
                        activeTab={activeTab} 
                        setActiveTab={setActiveTab}
                    />
                    
                    <main className="pb-12">
                        {activeTab === "ingredients" && isChef && (
                            <IngredientsManager 
                                ingredients={ingredients} 
                                setIngredients={setIngredients}
                                isChef={isChef}
                            />
                        )}
                        
                        {activeTab === "recettes" && (
                            <RecipesManager 
                                ingredients={ingredients}
                                setIngredients={setIngredients}
                                recipes={recipes}
                                setRecipes={setRecipes}
                                isChef={isChef}
                            />
                        )}
                        
                        {activeTab === "couts" && isChef && (
                            <CostsView recipes={recipes} ingredients={ingredients} />
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
